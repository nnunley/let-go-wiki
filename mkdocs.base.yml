site_name: let-go-wiki
site_description: Developing and using let-go — a Clojure dialect on a Go bytecode VM.
theme:
  name: material
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: { icon: material/weather-night, name: Dark }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: { icon: material/weather-sunny, name: Light }
  features: [navigation.tabs, navigation.tabs.sticky, navigation.sections, navigation.top, search.suggest, content.code.copy]
extra_css: [assets/css/house.css]
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - toc: { permalink: true }
