site_name: let-go-wiki
site_description: Developing and using let-go — a Clojure dialect on a Go bytecode VM.
theme:
  name: material
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: { icon: material/weather-night, name: Dark }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: { icon: material/weather-sunny, name: Light }
  features: [navigation.tabs, navigation.tabs.sticky, navigation.sections, navigation.top, search.suggest, content.code.copy]
extra_css: [assets/css/house.css]
markdown_extensions:
  - admonition
  # Mermaid diagrams: ```mermaid fences render as diagrams (and natively on
  # GitHub). The format sentinel is swapped for the real
  # !!python/name:pymdownx.superfences.fence_code_format tag in build_site.py,
  # since safe_load/safe_dump cannot round-trip that YAML tag.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: __MERMAID_FENCE_FORMAT__
  # Auto-link bare URLs (e.g. citation URLs on their own line). python-markdown
  # does not do this by default the way GitHub does.
  - pymdownx.magiclink
  - toc: { permalink: true }
