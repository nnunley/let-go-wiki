<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
:root{
  --bg:#f4ecdb; --fg:#1d180f; --muted:#877a5e; --rule:#d6c8a8; --accent:#b45309;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --serif:"Boldonse","Iowan Old Style",Georgia,serif;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#1a1610; --fg:#ede1c4; --muted:#7a6d52; --rule:#34291c; --accent:#f5b041; }
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--mono);display:flex;flex-direction:column;height:100vh}
header{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1rem;border-bottom:1px solid var(--rule)}
header .title strong{font-family:var(--serif)}
.muted{color:var(--muted)}
.controls input,.controls select,.controls button{font-family:var(--mono);background:transparent;color:var(--fg);border:1px solid var(--rule);border-radius:4px;padding:.3rem .5rem;margin-left:.4rem}
.controls button:hover{border-color:var(--accent);color:var(--accent)}
main{display:flex;flex:1;min-height:0}
#graph{flex:2;min-width:0}
#detail{flex:1;max-width:420px;border-left:1px solid var(--rule);padding:1rem;overflow:auto}
#detail h1{font-family:var(--serif);color:var(--accent);font-size:1.2rem}
.type-chip{display:inline-block;padding:.1rem .4rem;border:1px solid var(--rule);border-radius:4px;color:var(--muted);font-size:.72rem}
.frontmatter dt{color:var(--muted);font-size:.72rem;letter-spacing:.04em;margin-top:.5rem}
a{color:var(--accent)}
hr{border:0;border-top:1px solid var(--rule)}

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>
window.BUNDLE_NAME = "let-go-wiki";
window.BUNDLE = {"nodes": [{"data": {"id": "concepts/stack-vm", "label": "Stack VM", "type": "Concept", "description": "The stack-based virtual machine that executes let-go bytecode.", "resource": "https://github.com/nooga/let-go/tree/main/pkg/vm", "tags": ["vm", "bytecode", "runtime"], "color": "#877a5e", "size": 32}}, {"data": {"id": "entities/let-go", "label": "let-go", "type": "Entity", "description": "A Clojure dialect with a bytecode compiler and stack VM, written in Go.", "resource": "https://github.com/nooga/let-go", "tags": ["clojure", "go", "vm", "wasm"], "color": "#b45309", "size": 33}}, {"data": {"id": "references/clojure.core/apply", "label": "apply", "type": "Function", "description": "Applies a function to a sequence of arguments, unpacking the final argument list.", "resource": "https://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg", "tags": ["clojure", "stdlib", "lisp", "concept", "runtime"], "color": "#877a5e", "size": 32}}, {"data": {"id": "references/clojure.core/defn", "label": "defn", "type": "Macro", "description": "Defines a named function and binds it to the current namespace.", "resource": "https://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg", "tags": ["clojure", "stdlib", "lisp", "concept", "runtime"], "color": "#877a5e", "size": 33}}, {"data": {"id": "references/clojure.core/fn", "label": "fn", "type": "Macro", "description": "Creates an anonymous function with specified parameters and body.", "resource": "https://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg", "tags": ["clojure", "stdlib", "lisp", "concept", "runtime"], "color": "#877a5e", "size": 33}}, {"data": {"id": "references/clojure.core/let", "label": "let", "type": "Macro", "description": "Binds local variables to values within a limited scope.", "resource": "https://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg", "tags": ["clojure", "stdlib", "lisp", "concept", "runtime"], "color": "#877a5e", "size": 32}}, {"data": {"id": "references/clojure.core/when", "label": "when", "type": "Macro", "description": "Evaluates body forms only if the condition is truthy, otherwise returns nil.", "resource": "https://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg", "tags": ["clojure", "stdlib", "lisp", "concept", "runtime"], "color": "#877a5e", "size": 32}}], "edges": [{"data": {"id": "concepts/stack-vm__entities/let-go", "source": "concepts/stack-vm", "target": "entities/let-go"}}, {"data": {"id": "entities/let-go__concepts/stack-vm", "source": "entities/let-go", "target": "concepts/stack-vm"}}, {"data": {"id": "references/clojure.core/defn__references/clojure.core/fn", "source": "references/clojure.core/defn", "target": "references/clojure.core/fn"}}, {"data": {"id": "references/clojure.core/fn__references/clojure.core/apply", "source": "references/clojure.core/fn", "target": "references/clojure.core/apply"}}], "bodies": {"concepts/stack-vm": "\n# Stack VM\n\nThe let-go compiler emits bytecode that runs on a stack-based virtual machine.\nValues are pushed and popped from an operand stack; instructions operate on the\ntop of the stack. This is the execution substrate for [let-go](../entities/let-go.md)\nprograms after compilation.\n\n> status: speculative \u2014 verify details against `pkg/vm` before promoting to stable.\n\n# Citations\n\n[1] [pkg/vm](https://github.com/nooga/let-go/tree/main/pkg/vm)\n", "entities/let-go": "\n# let-go\n\nlet-go is a Clojure dialect implemented as a bytecode compiler and stack-based\nvirtual machine in Go. It produces a single ~12MB binary with ~8ms cold start,\nno JVM, and passes the jank-lang Clojure test suite. It supports AOT compilation\nto standalone binaries and self-contained WASM web pages, two-way Go interop, and\nmost of Clojure (persistent data structures, lazy seqs, transducers, protocols,\nrecords, multimethods, core.async, BigInts).\n\nSee the [stack VM](../concepts/stack-vm.md) for how compiled bytecode executes.\n\n# Citations\n\n[1] [let-go repository](https://github.com/nooga/let-go)\n", "references/clojure.core/apply": "\n`apply` takes a function and a sequence of arguments, unpacking the sequence as the final arguments to the function. Use it when you have arguments collected in a list or vector and need to pass them to a function as individual parameters.\n\n# Signature\n\n```clojure\n(apply [f args] [f x args] [f x y args] [f x y z args] [f a b c d & args])\n```\n\n# Examples\n\n```clojure\n(apply + [1 2 3])\n;; => 6\n```\n\n```clojure\n(apply list 1 [2 3])\n;; => (1 2 3)\n```\n\n```clojure\n(apply str \"Hello\" [\" \" \"World\"])\n;; => \"Hello World\"\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/defn": "\n`defn` defines a named function and binds it in the current namespace. Use it to create reusable functions that can be called by name throughout your program. It combines [fn](fn.md) for function creation with binding to a name in the current scope.\n\n# Signature\n\n```clojure\n(defn name doc-string? [params*] body)\n(defn name doc-string? ([params*] body)+)\n```\n\n# Examples\n\n```clojure\n(do (defn square [x] (* x x)) (square 5))\n;; => 25\n```\n\n```clojure\n(do (defn add [x y] (+ x y)) (add 2 3))\n;; => 5\n```\n\n```clojure\n(do (defn greet [name] (str \"Hello, \" name \"!\")) (greet \"World\"))\n;; => \"Hello, World!\"\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/fn": "\n`fn` creates an anonymous function or named function. Use it to define functions inline without assigning them to a name (useful for higher-order functions like [apply](apply.md) or [map](map.md)), or define a named function for recursion. `fn` supports both single-arity and multi-arity definitions.\n\n# Signature\n\n```clojure\n(fn [params*] body)\n(fn name [params*] body)\n(fn ([params*] body) ([params*] body) ...)\n```\n\n# Examples\n\n```clojure\n((fn [x] (+ x 1)) 5)\n;; => 6\n```\n\n```clojure\n((fn [x y] (* x y)) 3 4)\n;; => 12\n```\n\n```clojure\n(let [adder (fn [x y] (+ x y))]\n  (adder 10 20))\n;; => 30\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/let": "\n`let` creates a new lexical scope and binds symbols to values for use within that scope. Use it to define intermediate variables, break down complex expressions, or avoid repeating calculations.\n\n# Signature\n\n```clojure\n(let [bindings & body])\n```\n\n# Examples\n\n```clojure\n(let [x 5] (+ x 3))\n;; => 8\n```\n\n```clojure\n(let [a 2 b 3] (* a b))\n;; => 6\n```\n\n```clojure\n(let [x 10 y 20 sum (+ x y)] sum)\n;; => 30\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/when": "\n`when` is a conditional macro that evaluates its body only when the condition is truthy. Use it for single-branch conditionals where you want to execute side effects or return a value based on a condition, with nil as the implicit else case.\n\n# Signature\n\n```clojure\n(when test & body)\n```\n\n# Examples\n\n```clojure\n(when true 42)\n;; => 42\n```\n\n```clojure\n(when false 42)\n;; => nil\n```\n\n```clojure\n(let [x 5]\n  (when (> x 3)\n    (str \"x is greater than 3\")))\n;; => \"x is greater than 3\"\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n"}, "types": ["Concept", "Entity", "Function", "Macro"], "palette": {"Entity": "#b45309", "Concept": "#877a5e", "Reference": "#10b981", "Project": "#3b82f6", "Idea": "#8b5cf6", "Function": "#877a5e", "Macro": "#877a5e", "Namespace": "#b45309", "Package": "#3b82f6"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
