<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.34.0/dist/cytoscape.min.js"></script>
<!-- fcose force layout (needs layout-base -> cose-base first) -->
<script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.umd.min.js"></script>
<style>
:root{
  --bg:#f4ecdb; --fg:#1d180f; --muted:#877a5e; --rule:#d6c8a8; --accent:#b45309;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --serif:"Boldonse","Iowan Old Style",Georgia,serif;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#1a1610; --fg:#ede1c4; --muted:#7a6d52; --rule:#34291c; --accent:#f5b041; }
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--mono);display:flex;flex-direction:column;height:100vh}
header{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1rem;border-bottom:1px solid var(--rule)}
header .title strong{font-family:var(--serif)}
.muted{color:var(--muted)}
.controls input,.controls select,.controls button{font-family:var(--mono);background:transparent;color:var(--fg);border:1px solid var(--rule);border-radius:4px;padding:.3rem .5rem;margin-left:.4rem}
.controls button:hover{border-color:var(--accent);color:var(--accent)}
main{display:flex;flex:1;min-height:0}
#graph{flex:2;min-width:0}
#detail{flex:1;max-width:420px;border-left:1px solid var(--rule);padding:1rem;overflow:auto}
#detail h1{font-family:var(--serif);color:var(--accent);font-size:1.2rem}
.type-chip{display:inline-block;padding:.1rem .4rem;border:1px solid var(--rule);border-radius:4px;color:var(--muted);font-size:.72rem}
.frontmatter dt{color:var(--muted);font-size:.72rem;letter-spacing:.04em;margin-top:.5rem}
a{color:var(--accent)}
.home{margin-right:.5rem;text-decoration:none}
.home:hover{text-decoration:underline}
.open-page{display:inline-block;margin-top:.3rem;padding:.1rem .4rem;border:1px solid var(--rule);border-radius:4px;background:transparent;font-size:.72rem;text-decoration:none}
.open-page:hover{border-color:var(--accent);color:var(--accent)}
hr{border:0;border-top:1px solid var(--rule)}

</style>
</head>
<body>
<header>
  <div class="title">
    <a class="home" href="." target="_top">← let-go-wiki</a>
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="fcose">fcose (force)</option>
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

{"id": "references/clojure.core/fn__references/clojure.core/apply", "source": "references/clojure.core/fn", "target": "references/clojure.core/apply"}}, {"data": {"id": "references/clojure.core/inc__references/clojure.core/fn", "source": "references/clojure.core/inc", "target": "references/clojure.core/fn"}}, {"data": {"id": "references/clojure.core/inc__references/clojure.core/map", "source": "references/clojure.core/inc", "target": "references/clojure.core/map"}}, {"data": {"id": "references/clojure.core/map__references/clojure.core/fn", "source": "references/clojure.core/map", "target": "references/clojure.core/fn"}}, {"data": {"id": "references/clojure.core/mapv__references/clojure.core/fn", "source": "references/clojure.core/mapv", "target": "references/clojure.core/fn"}}, {"data": {"id": "references/clojure.core/partial__references/clojure.core/fn", "source": "references/clojure.core/partial", "target": "references/clojure.core/fn"}}, {"data": {"id": "references/testing-conformance__entities/let-go", "source": "references/testing-conformance", "target": "entities/let-go"}}], "bodies": {"concepts/bytecode-compiler": "\n# Bytecode Compiler\n\nThe let-go compiler transforms source code into bytecode that runs on the [stack VM](concepts/stack-vm/). The pipeline reads Clojure source, lowers it through an Indexed-RPN intermediate form, applies optimizations, and emits bytecode. Compiled bytecode is serialized to `.lgb` files, bundled into standalone binaries with `lg -b`, or compiled to WASM with `lg -w`.\n\n## Compilation Pipeline\n\n**Reader \u2192 AST \u2192 Indexed-RPN IR \u2192 Optimizations \u2192 Bytecode Emission**\n\n1. **Reader** (`pkg/compiler/reader.go`): Parses Clojure source into `vm.Value` AST nodes. Supports reader macros, `:lg` conditionals for let-go-only code, and syntax validation. Returns symbols, keywords, lists, vectors, and maps that drive compilation.\n\n2. **Indexed-RPN IR** (`pkg/ir` via `.lg` source): Source is lowered to an SSA-equivalent intermediate form using indexed reverse Polish notation. Each operation's identity is its position on an implicit evaluation stack; values flow exactly once from producer to consumer, enabling efficient analysis without explicit variable renaming. This is the canonical form for optimization and code generation. See [Indexed-RPN IR](concepts/indexed-rpn-ir/) for details.\n\n3. **Optimizations**: The IR is analyzed and transformed:\n   - Constant folding: evaluate pure operations with constant operands at compile time\n   - Dead code elimination: remove operations with no consumers\n   - Common subexpression elimination (CSE): hoist redundant computations\n   - Dominance analysis and type inference: guide dispatch decisions\n   - Inlining: expand small functions inline when profitable\n\n4. **Bytecode Emission** (`pkg/bytecode`): IR is lowered to stack machine instructions. A `CodeChunk` groups bytecode, local variable slots, and a constant pool. Opcodes like `OP_LOAD_CONST`, `OP_INVOKE`, `OP_TAIL_CALL`, and `OP_RETURN` drive the [stack VM](concepts/stack-vm/) interpreter. The emitter manages stack depth, closure capture, and frame reuse for tail calls.\n\n5. **Serialization** (`pkg/bytecode/encoder.go`): Bytecode, constants, and metadata are encoded to binary format. Constants include scalars, persistent collections, symbols, and function closures; they are interned to a shared constant pool. The serialized form is a `.lgb` module file.\n\n## Invocation Paths\n\n**`lg -c app.lgb app.lg`**: Compile source to bytecode  \nReads the source file, runs the full pipeline, and writes a `.lgb` file. This bytecode can be run standalone without recompilation: `lg app.lgb`.\n\n**`lg -b myapp app.lg`**: Bundle into a standalone binary  \nCompiles to bytecode as above, then appends the bytecode (and resource files) to a copy of the `lg` executable using a trailer format. The binary is self-contained and runs anywhere. Trailer versions (legacy, v2 with resources, v3 with storage IDs) are in `pkg/bundle/bundle.go`.\n\n**`lg -w site app.lg`**: Compile to a self-contained WASM web app  \nCompiles to bytecode and bundles it into a `index.html` file. The WASM blob is inlined and gzipped (~6MB). A service worker handles COOP/COEP headers for SharedArrayBuffer. Programs using the `term` namespace get xterm.js terminal emulation. Run via `open site/index.html` in the browser.\n\n**`lg app.lg`**: Direct evaluation  \nSource is compiled in-memory and executed immediately in the VM. REPL compilation follows the same pipeline.\n\n# Citations\n\n[1] **pkg/compiler**: Reader, compilation context, and source evaluation  \nhttps://github.com/nooga/let-go/tree/main/pkg/compiler\n\n[2] **pkg/bytecode**: Encoder/decoder, module serialization, `.lgb` format  \nhttps://github.com/nooga/let-go/tree/main/pkg/bytecode\n\n[3] **pkg/bundle**: Standalone binary and WASM bundling  \nhttps://github.com/nooga/let-go/tree/main/pkg/bundle\n\n[4] **docs/guide/usage.md**: Compilation flags and build modes  \nhttps://github.com/nooga/let-go/blob/main/docs/guide/usage.md\n\n[5] **Indexed-RPN IR** (this wiki)  \n[indexed-rpn-ir.md](concepts/indexed-rpn-ir/)\n\n[6] **Stack VM** (this wiki)  \n[stack-vm.md](concepts/stack-vm/)\n\n---\n\nSee also: [let-go](entities/let-go/)\n", "concepts/concurrency-model": "\n## Overview\n\nlet-go runs Lisp code on real Go goroutines (`future`, `pmap`, async go-blocks, channel pipes). The **concurrency & dynamic binding model** ensures three guarantees:\n\n1. **Per-namespace thread-safety:** each `Namespace` carries an internal `sync.RWMutex`, preventing data races on concurrent `def`/`require`/resolve across goroutines.\n2. **Goroutine-local dynamic bindings:** dynamic vars (like `*ns*`, `*out*`, user-defined) are thread-local, not process-global \u2014 so `(binding [*ns* ...] ...)` on one goroutine is invisible to others. Every execution carries an `ExecContext` with its own binding stack; goroutine boundaries propagate it explicitly.\n3. **Scoped async supervision:** a `with-scope` resource block spawns child goroutines that inherit the parent's bindings and scope, and can be cancelled independently via a structured concurrency tree.\n\nTogether, these resolve two critical concurrency defects (F-1: namespace races, F-4: global `*ns*` mutation) and enable safe, deterministic cleanup of concurrent work.\n\n## Namespace Thread-Safety (Part A)\n\n### The Problem\n\nThe `Namespace` type holds four unprotected maps (`registry`, `refers`, `aliases`, `excludes`) that are mutated by `Def`, `LookupOrAdd`, `Refer`, `Alias`, and read by `Lookup`. Under concurrent `pmap`/`future` spawns from different namespaces, reads and writes race without synchronization, causing map corruption or panics.\n\n### The Solution\n\nEach `Namespace` carries an unexported `sync.RWMutex`. The governing invariant is: **never hold one namespace's lock while acquiring another's.** This prevents deadlock because:\n\n- `Lookup` reads other namespaces' registries (for refers/aliases) but *composes* individual read operations without holding a lock across them.\n- Accessors (`localVar`, `referFor`, `aliasFor`, `isExcluded`) each acquire their namespace's `RLock`, return copies/pointers, and release.\n- Writers (`Def`, `DefStub`, `Refer`, `Alias`, `ImportVar`) each acquire their own `Lock`, modify one map, and release \u2014 fast, fits bulk-load.\n\nNo lock is held across a multi-namespace hop, so readers see a consistent chain of snapshots; no cycle forms.\n\n### Trade-offs\n\n- **Write-heavy bulk-load fits:** `Lock` is cheap (single map op), not a copy-on-write clone.\n- **Hot path (compiled code):** doesn't call `Lookup` \u2014 compiled bytecode holds direct `*Var` references, so the runtime rarely consults namespaces.\n- **Deadlock-free by design:** only multi-namespace interaction is read-only (following refers/aliases) and never holds a lock across the next acquisition.\n\n## Goroutine-Local Dynamic Bindings (Part B)\n\n### The Problem\n\nThe old model was a process-global `Var.bindings` stack guarded by a global `bindingsMu`. A `(binding [*ns* ...] ...)` on goroutine A was *visible to goroutine B*, violating Clojure's thread-local semantics. Also, `NewCompiler` and resolver code mutated the *root* of `*ns*`, clobbering every goroutine's current namespace \u2014 F-4.\n\n### The New Model: ExecContext-Threaded Binding Stacks\n\nInstead of goroutine-ID keying (the earlier design), the implementation threads an **`ExecContext`** through every execution: the VM's `Frame`, every builtin call, and every goroutine spawn. The `ExecContext` owns both the dynamic-var binding stack *and* the structured-concurrency scope.\n\n- **Storage:** each `ExecContext` carries a `bindingStack` (an immutable, persistent stack of (var, value) pairs). The stack is owned by the context; no internal lock needed for single-writer access.\n- **Hot path (eval loop):** `OP_LOAD_VAR` / `OP_SET_VAR` call `f.ec.deref(v)` where `f` is the `Frame` and `ec` is its `ExecContext`. The deref path: checks `isDynamic.Load()` (an atomic), and if true, walks the binding stack in `ec.bindings`. If no active binding, returns the var's root value. No goroutine-ID lookup, no map indirection.\n- **Entry points:** the interpreter loop always has a frame with an `ec`; hand-written builtins receive `ec` via the `InvokeCtx` interface (a small set of context-aware natives); lowered `.lg` functions receive `ec` as a threaded parameter.\n- **Context inheritance:** when a frame calls another frame within the same goroutine, the child frame inherits the parent's `ec` pointer. Binding operations (push/pop) mutate the same stack; only goroutine spawn creates a fresh context.\n\n### Conveyance (Scope.Go and Spawn Integration)\n\nWhen a parent goroutine spawns a child (via `Scope.Go`, the single integration point), the child is handed an `ExecContext` seeded from a snapshot of the parent's:\n\n```\nsnap := parent.ec.BindingSnapshot()    // parent reads its OWN context (no race)\ngo func() {\n    childEC := NewExecContextFrom(snap) // child gets a fresh context with parent's bindings snapshot\n    fn(childEC)                         // run the thunk with explicit context\n}()\n```\n\n- The parent reads its own context, so there's no race.\n- The child receives a fresh `ExecContext` with the parent's bindings snapshotted in \u2014 no goroutine-ID parse on spawn.\n- Each goroutine's `ExecContext` is stack-local to it (returned to GC when the goroutine exits); no global registry to leak.\n\n### Resolution of F-4\n\n- `NewCompiler` and resolver no longer call `rt.CurrentNS.SetRoot(...)` (global mutation).\n- They set the **goroutine-local** `*ns*` binding instead (via `binding [*ns* ...]` macro).\n- The constructor side effect is now goroutine-scoped, so it doesn't clobber other goroutines.\n- The global root of `*ns*` remains the bootstrap default; conveyance snapshots the parent's binding for scoped spawns.\n\n### Performance\n\n- **Hot path carries no goroutine-ID cost.** The eval loop's `OP_LOAD_VAR`/`OP_SET_VAR` call `f.ec.deref()` which is: `isDynamic.Load()` (atomic), then if true, a binding stack walk. Non-dynamic vars or a nil binding skip to root in the atomic check.\n- **No global registry.** Each `ExecContext` is stack-local; the root context is process-global but binding operations on it are serialized by the goroutine that drives the frame.\n- **Portability:** no `runtime.Stack` parsing in the hot path. Threading `ec` through the `Frame` is the core idea, and it generalizes to WASM and other runtimes.\n\n## Scoped Async Supervision (Part C)\n\n### The Problem\n\nThe VM has a goroutine supervision tree (`Scope`), but blocking async ops (`<!`, `>!`, `alts!`, `sleep`) consult the *global root* context, and all spawns go into the root. Cancelling a sub-scope has no effect on goroutines parked inside it.\n\n### The Solution: with-scope Resource Block\n\nA `with-scope` is a structured-concurrency resource block. Its lifecycle:\n\n```clojure\n(with-scope [s]\n  (go (println \"got\" (<! ch))))   ; s is the child scope; parked under s\n;; exit: cancel s \u2192 parked (<! ch) unblocks; goroutine exits\n```\n\n- **Open:** `(scope-open)` creates a child scope of the current scope and installs it on the running `ExecContext` for the dynamic extent.\n- **Body:** goroutines spawned inside (via `go*` or `future*`) and blocking ops inside them all read the current scope from the `ExecContext`.\n- **Close (finally):** `(scope-close! s timeout-ms)` cancels the scope's context (cascading to the subtree), awaits the goroutines up to `timeout-ms`, logs a warning if stragglers remain, and restores the prior scope. **Bounded teardown:** no hang.\n\n### Explicit Scope Threading (Part of ExecContext)\n\nThe `ExecContext` carries the scope; when code needs to know its current scope, it reads it from `ec.Scope()` (which normalizes `nil` to the root `Goroutines` scope). When a goroutine spawns a child, it captures the current scope from its `ExecContext` and hands it to the child's fresh context.\n\n- **No registry lookup.** A goroutine doesn't parse its ID to discover its scope; the `ExecContext` it's executing in already knows it.\n- **Two operation paths:** synchronous `with-scope` (same goroutine, same frame, but changing `ec.scope` for the dynamic extent), and asynchronous spawn (child gets a fresh `ExecContext` with the parent's scope copied to it).\n\n### Guarantees\n\n1. **Independence:** goroutines under one sub-scope are cancelled independently; siblings and root keep running.\n2. **No orphans:** every scope is owned by exactly one `with-scope` and cleaned up on block exit. No unbounded `children` growth; no leaked context-tree `cancel`.\n3. **No hangs:** bounded drain with timeout; stragglers are logged and left running (leak is visible and bounded).\n\n### Rewiring the Ops\n\n| Lisp operation | Change |\n|---|---|\n| `go*` / `future*` | spawn with `Scope.Go(child_ec)` where `child_ec` carries the parent scope |\n| `<!` / `>!` / `alts!` / `sleep` | select on `ec.Context()` (from the `ExecContext`) instead of root context |\n\nThe pipeline CSP internals (`async.go`) remain root-wired (no user-facing scope); bulk root drain stays correct.\n\n## Implementation Hook Points\n\n- **ExecContext:** `pkg/vm/exec_context.go` \u2014 the unified context carrying bindings + scope; `deref()`, `pushBinding()`, `popBinding()`, threading through spawns.\n- **Binding:** `pkg/rt/core/core.lg` \u2014 `binding` macro (line ~582), `bound-fn*` macro; operates on the `ExecContext` passed by the eval loop.\n- **Scope:**  `pkg/rt/lang.go` \u2014 `scope-open` and `scope-close!` native functions; `go*` and `future*` rewired to spawn via `Scope.Go(childEC)`.\n- **Frame & eval loop:** `pkg/vm/vm.go` \u2014 `Frame.ec *ExecContext` field; `OP_LOAD_VAR` / `OP_SET_VAR` call `f.ec.deref()`.\n- **Binding stack:** `pkg/vm/binding_stack.go` \u2014 immutable stack data structure, snapshots for conveyance.\n- **Scope tree:** `pkg/vm/scope.go` \u2014 `Scope`, `Scope.Go()`, `Scope.Context()` for cancellation; wired to `ExecContext.Scope()`.\n\n## Testing Strategy\n\n- **Go race tests:** `-race` flag on namespace concurrent `Def`/`Lookup`, binding isolation (each goroutine sees only its own value), conveyance (child inherits parent, siblings don't leak), and concurrent compile.\n- **Lisp conformance:** `pmap`/`future` rebind `*ns*` per worker and assert isolation; `with-scope` / `sleep` / `go*` tests assert cancellation and bounded drain.\n- **Performance gate:** `make test-race` target; bench-ratchet regression tests on dynamic-var-heavy benchmarks.\n\n## Citations\n\n- **ExecContext (core impl):** [pkg/vm/exec_context.go](https://github.com/nooga/let-go/blob/main/pkg/vm/exec_context.go) \u2014 the unified `ExecContext` struct carrying bindings and scope, threading through execution.\n- **Frame & eval loop:** [pkg/vm/vm.go](https://github.com/nooga/let-go/blob/main/pkg/vm/vm.go) (`Frame` struct, `OP_LOAD_VAR` / `OP_SET_VAR` opcodes) \u2014 how `ec` is carried through interpretation.\n- **Binding macros:** [pkg/rt/core/core.lg](https://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg) (`binding` macro ~line 582, `bound-fn*`) \u2014 the user-facing binding APIs.\n- **Design history:** [docs/design/exec-context-threading.md](local, 2026-06-13) \u2014 the design decision to replace goroutine-ID keying with explicit `ExecContext` threading. Supersedes the earlier goroutine-local scope registry design.\n- **Original specs:** [docs/superpowers/specs/2026-06-05-concurrent-namespaces-and-dynamic-bindings-design.md](local) and [docs/superpowers/specs/2026-05-30-scoped-async-supervision-design.md](local) \u2014 the initial design approach using goroutine-ID keying, revised by the exec-context-threading design.\n", "concepts/debug-info": "\n# Debug Info & Source Maps\n\nWhen the [stack VM](concepts/stack-vm/) encounters an error or crash, a readable stack trace must answer four questions: **which source file?** **which function?** **which line?** **which local variables were in scope?** Debug info (source maps, symbol tables, and forms indices) enable [bytecode](concepts/bytecode-compiler/) to remain self-describing under bundle execution\u2014especially in WASM and precompiled `.lgb` artifacts where the original source is not available at runtime.\n\nThe system is organized in tiers by cost, sensitivity, and deployment model:\n\n## Tier 0: Always In \u2014 File, Function, Line (+ Local Names Captured)\n\nTier 0 debug data (source file, function name, line/column) is serialized into every `.lgb` bundle by default. This costs approximately 20 KB per core bundle (+4.7%) and exposes only identifiers, not values.\n\nAs of PR #131 (merged 2026-06-01), **local variable names** are also captured and stored, enabling future rendering in error traces. The data layer is complete; rendering is planned.\n\n**Implementation:**\n- **SourceInfo** (`pkg/vm/source.go`): Struct tracking file, line, column, and optional symbol (variable name). Populated at read time by `vm.FormSource`, keyed by form object identity.\n- **SourceMap** (`pkg/vm/source.go`): Maps bytecode instruction-pointer (IP) offsets to SourceInfo entries. The VM's `Lookup(ip)` finds the nearest source location for any instruction.\n- **Local variable tables** (PR #131, `pkg/bytecode`): Each `CodeChunk` carries a table of **(slot, name)** pairs. A slot maps to a runtime stack frame position; the name is the original identifier from source. Serialized under `FlagLocalVars` in the `.lgb` format, decoded and reconstructed into each chunk at bundle load time. Available via `CodeChunk.LocalVars()`, but not yet rendered by error formatters.\n\n**Usage in Error Reporting:**\nTier 0 data is fully captured and serialized: local variable names are stored in each `CodeChunk` via `LocalVars()` (populated by PR #131). However, rendering these names into stack traces is not yet implemented. Currently, the VM's `FormatError` function (in `pkg/vm/errfmt.go`) displays source location, file, line, and function name when rendering a frame, but does not yet query the `LocalVars` table. Wiring local-variable rendering into `FormatError` is a planned next step: the design doc describes it as \"a natural next increment after #131.\"\n\n**Planned rendering** (not yet shipped):\n```\nfunction div/2 at app.lg:42:8\n  locals: numerator, denominator\n  42 | (/ numerator denominator)\n       ^\n```\n\nTier 0 data capture is enabled by default and requires no deployment changes. Tier 0 rendering (displaying locals in error output) is planned.\n\n## Tier 1: Opt-In \u2014 Forms Index, Source Text, Build-ID Matching (Design)\n\nTier 1 (under design as of 2026-05-30) adds richer context for offline symbolization: a **forms index** (byte offsets and extents for each top-level form), optional compressed source text, and stable **build-id** linking to ensure traces are symbolized with the correct debug data.\n\n**Planned Design:**\n\nA **.lgsym sidecar** (debug-only artifact, shipped separately from the `.lgb`) carries:\n- **Magic + version header** for forward compatibility\n- **Build-id** (16-byte content hash of the bundle code + constants): Must match the bundle's build-id; the symbolizer refuses to symbolize on mismatch, preventing mismatched traces.\n- **Forms index**: One entry per top-level form, recording start line, start column, byte offset in the source blob, and end byte. Keyed by chunk reference (chunk index / function ID).\n- **Source blob**: Compressed via `flate` (single shared stream across all form texts for better compression than per-entry deflate). Indexed by form byte ranges, sliced by the forms index.\n\n**Symbolizer tool** (planned): Takes a raw trace (chunk index + IP, or function ID) and the `.lgsym`, verifies build-id, and renders rich traces offline. Mirrors JavaScript source-map recovery or native `atos`/`addr2line` workflows.\n\n**Deployment:**\n- `lg -c` (compile) or `lgbgen`/`buildWasm` gains `--debug` flag:\n  - `--debug`: embed Tier 1 inline in `.lgb` (rich live traces, no sidecar needed)\n  - default: emit lean `.lgb` + separate `.lgsym` sidecar (keep source code out of shipped artifact)\n  - `--no-symmap`: omit Tier 1 entirely (smallest bundle, no offline symbolization)\n\n**Rationale for a custom binary format (not ZIP):**\n- **Compression:** Single shared `flate` stream over concatenated form texts compresses ~3.8\u00d7; per-entry deflate yields ~2.9\u00d7, plus per-entry headers add up (30 B local + 46 B central-dir per entry). Custom format achieves denser packing.\n- **Integration:** Reuses `.lgb` Reader/Writer primitives, varint encoding, string-table interning, and build-id/versioning machinery\u2014no parallel mechanism needed.\n- **Granularity:** ZIP forces per-file entries; custom format keeps compression at the level of the entire form corpus.\n\nThe forms index makes source **highlighting** practical: store a base line/column per form, express all inner `SourceInfo` relative to that base, and slice the exact form text from the blob\u2014no need to load or search the whole source file.\n\nTier 1 is not yet shipped; the design awaits implementation.\n\n## Tier \"Values\": Never Default\n\nVariable **values** in traces are a well-known security footgun: a frame holding `password`, `api_key`, or a token leaks it into logs and error trackers. By design:\n\n- Default output shows **names only** (e.g., `locals: numerator, denominator, ratio`).\n- **Values are never rendered by default.** If ever surfaced, it requires an explicit flag **and** a redaction pass:\n  - Deny-list name patterns (`*pass*`, `*secret*`, `*token*`).\n  - Length and entropy caps to block large or suspicious values.\n\nThe `.lgsym` sidecar is kept private (not shipped), so production operators cannot reconstruct the program from traces\u2014debug data is joined to stack traces offline only by trusted processes.\n\n## Integration with Crash Reporting\n\nWhen a bundle-loaded program crashes (WASM or precompiled bytecode), the exception handler produces a **raw trace**: bytecode offsets, chunk indices, and frame stack. The raw trace is small and safe (no source exposure).\n\nIf Tier 1 debug info is available (either embedded or via `.lgsym`), a **symbolizer** (or integrated error reporter) enriches the raw trace with:\n1. Verify build-id (bundle \u2194 `.lgsym` match).\n2. Resolve chunk index \u2192 function name (already in Tier 0).\n3. Resolve IP \u2192 line/column in source file (Tier 0, SourceMap).\n4. Slice the top-level form from the source blob (Tier 1, forms index + source blob).\n5. Highlight the relevant line and column in the form's context (Tier 1, relative line/column).\n6. Render named local bindings (Tier 0, local-var tables).\n\nResult: a readable, context-rich trace indistinguishable from source-level debugging\u2014without embedding source in the shipped binary.\n\n## Security & Deployment Trade-offs\n\n| Tier | Contents | Status | Cost | In Bundle? | Sensitivity | Use Case |\n|---|---|---|---|---|---|---|\n| **0 (file, function, line)** | source location | shipped | ~20 KB (+4.7%) | always | low | live REPL, self-describing errors |\n| **0 (local names, data layer)** | local var names captured | shipped (PR #131) | included | always | low | future trace rendering |\n| **0 (local names, rendering)** | display locals in errors | planned | \u2014 | \u2014 | \u2014 | richer live debugging |\n| **1 (forms index, source text)** | forms index, source blob | planned | ~50\u2013100 KB | opt-in / sidecar | medium | offline symbolization, web deployment |\n| **values** | variable values | never (out of scope) | varies | never | high | redaction / explicit flag only |\n\nProduction deployments typically ship a lean `.lgb` (Tier 0 only) + keep `.lgsym` private. Local development and REPLs benefit from embedded Tier 1 for instant, detailed traces.\n\n# Citations\n\n[1] **Debug Info & Symbol Maps \u2014 Design Doc**  \n`docs/superpowers/specs/2026-05-30-debug-info-and-symmap-design.md` (local, 2026-07-02)\n\n[2] **SourceInfo and SourceMap \u2014 Core Types**  \nhttps://github.com/nooga/let-go/blob/main/pkg/vm/source.go\n\n[3] **Bytecode Decoder \u2014 Local Variable Deserialization**  \nhttps://github.com/nooga/let-go/blob/main/pkg/bytecode/decoder.go\n\n[4] **Local Variable Tables \u2014 Roundtrip Tests**  \nhttps://github.com/nooga/let-go/blob/main/pkg/bytecode/localvars_test.go\n\n[5] **Error Formatting \u2014 Trace Rendering**  \nhttps://github.com/nooga/let-go/blob/main/pkg/vm/errfmt.go\n\n[6] **Bytecode Compiler** (this wiki)  \n[bytecode-compiler.md](concepts/bytecode-compiler/)\n\n[7] **Stack VM** (this wiki)  \n[stack-vm.md](concepts/stack-vm/)\n\n---\n\nSee also: [let-go](entities/let-go/)\n", "concepts/deftype-and-protocols": "\n# deftype & Protocols\n\n## When it matters\n\n**deftype** and **defprotocol** are let-go's primary tools for defining custom types and protocol-based polymorphism, mirroring Clojure's abstractions. Protocols enable open extension\u2014any type can implement any protocol via `extend-type`\u2014while deftypes bundle immutable structured data with inline method implementations. Together, they form the foundation for libraries that rely on type-driven dispatch (malli validators, dynaload-style delays, custom callables).\n\nThe work to **native-lower deftype/defprotocol** to Go types and interfaces is in-flight and foundational: it moves protocol dispatch from boxed runtime tables to compiled Go method calls where the concrete type is known, and makes IR ops themselves deftypes to eliminate hand-duplicated op handlers scattered across the compiler pipeline.\n\n## Deftype: typed fields + methods\n\n```clojure\n(deftype Square [side]\n  Shape\n  (area [this] (* side side)))\n\n(area (->Square 3))  ; => 9\n```\n\n`deftype` creates three artifacts:\n\n1. **The type itself** \u2014 a value representing the type for protocol dispatch.\n2. **Constructor `->TypeName`** \u2014 a positional function `(fn [fields...] ...)` creating instances.\n3. **Method implementations** \u2014 any protocols named in the form receive inline implementations, rewritten by the macro to wire field access via receiver.\n\nFields are **immutable** and accessed via `.field-name` syntax (a get method, not mutation). Mutable fields (marked `^:mutable` or `^:unsynchronized-mutable`) are read via bare symbols in method bodies (rewritten to `.field recv`) and mutated with `(set! field v)` (rewritten to `(set-field! recv 'field v)`).\n\n**Closure** \u2014 method bodies capture the receiver's fields, shadowing any outer bindings with the same name. For example, in `(area [this] (* side side))`, the bare `side` refers to the field, not an outer variable.\n\n## Defrecord: typed fields + map API\n\n```clojure\n(defrecord Point [x y])\n\n(->Point 1 2)       ; positional ctor\n(map->Point {:x 1 :y 2})  ; map ctor\n```\n\n`defrecord` is like `deftype` but adds **map semantics**: instances are also maps, supporting `(x point-val)` keyword lookup, `assoc`, `seq`, and `count`. It generates both a positional constructor (`->`) and a map constructor (`map->`).\n\nRecords are lighter-weight than arbitrary maps when you need both structured data and occasional map operations; deftypes are used when you need only the structure and methods, not map interface.\n\n## Defprotocol: open method dispatch\n\n```clojure\n(defprotocol Shape\n  (area [this]))\n\n(extend-type Square Shape\n  (area [this] (* (.x this) (.y this))))\n```\n\n`defprotocol` defines a protocol\u2014a named set of method signatures. Implementing a protocol on a type happens in two ways:\n\n1. **Inline** (in the deftype/defrecord form): `(deftype Square [...] Shape (area [this] ...))`\n2. **Open extension** (anywhere, anytime): `(extend-type Square Shape (area [this] ...))`\n\nAt a dispatch site like `(area (->Square 3))`, the VM looks up the type of the receiver and dispatches to the implementing method. For **known-concrete types** (e.g., the ctor is a literal `->Square`), the compiler can emit a **direct native call** when lowering to Go; for dynamic types, it routes through the runtime protocol table.\n\n## Reify: anonymous inline types\n\n```clojure\n(reify\n  Shape\n  (area [this] 42))\n```\n\n`reify` creates a nameless type on-the-fly, implementing the named protocols. Each call to `reify` produces a fresh type. Useful for one-off implementations, particularly in higher-order functions.\n\n## IFn & IDeref protocols (standard library)\n\nTwo core indirection protocols are provided:\n\n- **`IFn`** \u2014 `(-invoke [this args])`. A type implementing IFn is callable: `(x arg1 arg2)` dispatches to `(-invoke x [arg1 arg2])`. This enables custom callables and libraries like malli to ship validators as functions.\n- **`IDeref`** \u2014 `(-deref [this])`. A type implementing IDeref works with `@x` / `(deref x)`, enabling delays, promises, and custom lazy-evaluation types.\n\nBoth are wired by the runtime after core loads. See [value-representation](concepts/value-representation/) for how the VM coerces invokable/derefable custom types into native Go function/reference wrappers on the bytecode path.\n\n## Native lowering (in-flight)\n\nThe compiler is being restructured to lower deftype/defprotocol to Go structs and interfaces, replacing runtime table dispatch with compiled code. This happens in three stages:\n\n1. **S0** \u2014 `deftype` \u2192 Go `struct` + field access + constructor.\n2. **S1** \u2014 `defprotocol` \u2192 Go `interface`; protocol methods become Go methods; `extend-type` routes to interface implementations.\n3. **S2** \u2014 Typeinfer learns \"satisfies protocol P\" to devirtualize broad call sites.\n\nCurrently **S0+S1 are in the walking-skeleton phase**: a single protocol (Shape) and type (Square) are being proven end-to-end through the bytecode **and** native (`-tags gogen_ir`) paths in parallel. The IR op-catalog unification (moving all 27 IR ops into deftypes with protocol-based behavior facets) rides on S0+S1 to eliminate the currently-scattered op handlers.\n\n## Citations\n\n[core.lg](https://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg) \u2014 macro implementations of `deftype`, `defrecord`, `defprotocol`, `extend-type`, `reify`. Also defines core protocols `IFn` and `IDeref`.\n", "concepts/exec-context": "\n# Execution Context and Threading\n\nThe let-go runtime maintains per-execution state: structured concurrency (cancellation trees), dynamic-variable bindings (like `*out*`, `*err*`, `*ns*`), and the current namespace. Historically, this state was stored in goroutine-ID-keyed maps. This design moves to an **explicitly-threaded `ExecContext`** carried through the call stack, eliminating goroutine-ID lookups and fixing goid reuse hazards.\n\n## The Problem with Goroutine-ID Keying\n\nThe original design had two parallel goroutine-ID-keyed stores:\n\n1. **Scope GLS** (`pkg/vm/scope_gls.go`): carries the cancellation tree and `context.Context` for blocking operations.\n2. **Dynamic-variable binding store** (`pkg/vm/binding_frames.go`): carries the stack of bindings for `Var.Deref` and binding pushes.\n\nGoroutine IDs have inherent problems:\n\n- **The goid footgun**: When a goroutine exits with a live binding (panic without recover, or a binding meant to outlive it), the frame leaks. Go reuses goids, so a later goroutine on that ID sees the dead one's state, causing silent corruption.\n- **Cost**: `goID()` parses a stack trace on every miss\u2014expensive on the fast path.\n- **Duplication**: Two parallel maps solve the same problem twice.\n\nPer-goroutine binding isolation is **load-bearing**: `pmap` (parallel map) and lgbgen's concurrent lowering workers each bind registries and type caches via dynamic bindings. Without per-goroutine isolation, parallel workers corrupt each other's registries, causing nondeterministic lowering.\n\n## The Design: One ExecContext, Explicitly Threaded\n\nReplace the two goid-keyed maps with a single `ExecContext` that carries both concerns:\n\n```go\ntype ExecContext struct {\n    scope    *Scope           // structured concurrency + cancellation tree\n    bindings *bindingStack    // dynamic-variable stack (not goid-keyed)\n}\n```\n\n**Threading**: The `ExecContext` lives on the VM eval `Frame` (already threaded through the interpreter loop). Child frames inherit the pointer. When a new dynamic extent occurs (a `binding` form, `with-scope`), it pushes onto the carried stacks. Goroutine spawns capture a snapshot and seed the child frame's `ExecContext`; the child's context dies with the goroutine\u2014no map entry to forget, no goid reuse hazard, no leak.\n\n## How Builtins Access the Context\n\n`Fn.Invoke([]Value)` is context-free. Only ~17 builtins (plus scope ops) need context; hundreds are pure. So the migration is **additive**:\n\n```go\ntype CtxFn interface { \n    InvokeCtx(ec *ExecContext, args []Value) (Value, error) \n}\n```\n\n- The VM calls `InvokeCtx(currentEC, args)` when the function implements `CtxFn`, else falls back to `Invoke(args)`.\n- Pure builtins need **zero changes**.\n\nThe consolidation already in place (PR #206) groups I/O operations behind three chokepoints: `WriteToOut(ec, s)`, `WriteToErr(ec, s)`, and `resolveIOHandleVar(ec, name)`. This shrinks the dig-in significantly: only the ~5 print builtins need to forward `ec`, not scattered across 17 sites.\n\n## Three Surfaces\n\n| Surface | Mechanism | Artifact? |\n|---|---|---|\n| Interpreter eval loop | `ec` on the `Frame` | No (VM) |\n| Hand-written NativeFns (~17) | `InvokeCtx` convention | No (VM) |\n| Lowered gogen_ir functions | `ec` threaded through emitted signatures | **Yes (IR lowering)** |\n\nLowered code (gogen_ir functions) is native Go. When lowered let-go code reads a dynamic var or calls a context-needing builtin, it too needs `ec`. The lowering must thread `ec` through lowered function signatures: `func f(ec *vm.ExecContext, ...)` emitted by `lower_go.lg`, forwarded at call sites.\n\n## Why It Matters\n\nExplicit threading replaces goroutine-local state with call-stack plumbing. This:\n\n- **Eliminates goid reuse hazards**: No leaked frames, no corruption from ID reuse.\n- **Improves performance**: A threaded pointer is cheaper than a `goID()` parse.\n- **Enables correctness**: Parallel workers (lowering, pmap) work without global state corruption.\n- **Enables determinism**: The type cache for parallel lowering relies on context isolation.\n\nThe change is mechanical for most code (pure builtins see no change), and the blast radius is proportional to the actual set of context-dependent operations, not the whole function surface.\n\n# Citations\n\n[1] **pkg/vm/exec_context.go**: Execution-context threading and per-goroutine scope  \nhttps://github.com/nooga/let-go/blob/main/pkg/vm/exec_context.go\n\n[2] **pkg/vm/binding_stack.go**: Dynamic-binding stack storage  \nhttps://github.com/nooga/let-go/blob/main/pkg/vm/binding_stack.go\n\n[3] **pkg/rt/iort.go**: I/O routing through `WriteToOut`, `WriteToErr`  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/iort.go\n\n[4] **pkg/vm/value.go**: `Fn.Invoke` calling convention  \nhttps://github.com/nooga/let-go/blob/main/pkg/vm/value.go\n\n[5] **PR #206**: Print and error routing through I/O vars  \nhttps://github.com/nooga/let-go/pull/206\n\n---\n\nSee also: [Stack VM](concepts/stack-vm/), [IO/Host Decoupling](concepts/io-host-decoupling/), [IR Pipeline](concepts/ir-pipeline/)\n", "concepts/go-interop": "\n# Go Interop\n\nlet-go provides two-way interoperability with Go: embed let-go as a scripting layer in Go programs, call Go functions from let-go code, pass Go structs as records, and share channels between systems. The interop layer uses Go reflection and type registration to bridge the two runtimes seamlessly.\n\n## Embedding let-go in Go\n\nUse `pkg/api.NewLetGo` to create a let-go runtime instance, define Go values as let-go variables, and execute let-go code:\n\n```go\nimport \"github.com/nooga/let-go/pkg/api\"\n\nc, _ := api.NewLetGo(\"myapp\")\n\n// Define Go functions and values\nc.Def(\"greet\", func(name string) string {\n    return \"Hello, \" + name\n})\nc.Def(\"x\", 42)\n\n// Execute let-go code against these definitions\nv, _ := c.Run(`(greet \"world\")`)  // => \"Hello, world\"\nv, _ := c.Run(`(+ x 8)`)           // => 50\n```\n\nEach `LetGo` instance has its own namespace (`\"myapp\"`), constant pool, and compiler context. Multiple instances can run concurrently in different goroutines (with caveats; see below).\n\n## Go Functions as let-go Functions\n\nGo functions passed via `Def` are wrapped as let-go native functions. They are callable using the normal invocation syntax:\n\n```clojure\n(defn compute [a b]\n  (my-fn a b))\n\n(my-fn 10 20)\n```\n\nThe let-go runtime uses Go reflection to:\n- Inspect the function signature (arity, parameter types)\n- Convert let-go arguments to Go types on the call\n- Box the Go result back to a let-go `Value`\n\nType conversions follow these rules:\n- Numeric types (`int`, `float64`, `int64`, etc.) convert bidirectionally\n- Strings convert to/from let-go strings\n- Slices of `T` convert to/from let-go sequences; lazy seqs are realized automatically\n- Maps convert to/from let-go maps (keyed by string or keyword)\n\n## Go Structs as Records\n\nRegister a Go struct type once, then pass instances to let-go and work with them as records:\n\n```go\ntype Item struct {\n    Name  string\n    Price float64\n    Qty   int\n}\n\nvm.RegisterStruct[Item](\"myapp/Item\")\n\nc.Def(\"item\", Item{Name: \"Widget\", Price: 9.99, Qty: 5})\n```\n\nIn let-go:\n```clojure\n(:name item)           ; => \"Widget\"\n(:price item)          ; => 9.99\n(assoc item :qty 10)   ; => new record with Qty=10\n(count item)           ; => 3 (field count)\n(contains? item :name) ; => true\n```\n\n**Unmutated roundtrip**: When a struct is passed to let-go and returned unchanged, it is unboxed directly via `Unbox()` (fast path).\n\n**Mutated roundtrip**: When a struct is modified in let-go (e.g., via `assoc`), the resulting record is reconstructed back to Go via `vm.ToStruct[T]` on the Go side:\n\n```go\nv, _ := c.Run(`(assoc item :qty 10)`)\nmutated, _ := vm.ToStruct[Item](v.(*vm.Record))\nfmt.Println(mutated.Qty) // 10\n```\n\n## Go Channels as let-go Channels\n\nGo channels and let-go channels are mutually transparent. Define a channel in Go and use it in let-go's `go` / `<!` / `>!`:\n\n```go\ninch := make(chan int)\noutch := make(vm.Chan)\nc.Def(\"in\", inch)\nc.Def(\"out\", outch)\n\nc.Run(`\n  (go (loop [i (<! in)]\n        (when i\n          (>! out (inc i))\n          (recur (<! in)))))\n`)\n\ngo func() {\n    for i := range 10 {\n        inch <- i\n    }\n    close(inch)\n}()\n\nfor v := range outch {\n    fmt.Println(v)  // 1, 2, 3, ..., 10\n}\n```\n\nChannels are first-class in let-go's `core.async` and integrate naturally with goroutines spawned by `go` blocks.\n\n## I/O Customization\n\nThe `pkg/api` Options pattern allows embedders to customize I/O and runtime behavior per instance:\n\n- `WithStdout(w)` / `WithStderr(w)`: Route output to custom writers (capture, logging, etc.)\n- `WithEmit(fn)`: Handle `(js/emit event-name data)` calls from guest code\n- `WithKeySource(ks)`: Supply keyboard input for terminal programs without a real terminal\n- `WithStorage(store)`: Provide backend storage for `(storage/...)` calls\n\nEach option is pushed as a dynamic binding during `Run()` and popped afterward. This allows different embedder instances to have different I/O routing without global state.\n\n### Concurrency Caveat\n\nlet-go's `Var` bindings are stored in a process-global binding stack. If two goroutines call `Run` on different `LetGo` instances concurrently, their I/O bindings will interleave on the same stack. For deterministic isolation, serialize `Run` calls or run instances in separate processes.\n\n## lginterop Code Generator\n\nFor large Go packages, hand-wrapping every function and struct is tedious. The `lginterop` tool generates let-go bindings from Go source:\n\n```\nlginterop -pkg mypackage -output mypackage.lg\n```\n\nThis produces a `.lg` file with wrapped functions and struct registrations, reducing boilerplate.\n\n# Citations\n\n[1] **pkg/api** \u2014 embedding API and options  \nhttps://github.com/nooga/let-go/tree/main/pkg/api\n\n[2] **pkg/api/interop_test.go** \u2014 comprehensive interop examples  \nhttps://github.com/nooga/let-go/blob/main/pkg/api/interop_test.go\n\n[3] **docs/guide/embedding-in-go.md** \u2014 embedding guide  \nhttps://github.com/nooga/let-go/blob/main/docs/guide/embedding-in-go.md\n\n[4] **pkg/vm** \u2014 type registration and struct roundtripping  \nhttps://github.com/nooga/let-go/tree/main/pkg/vm\n\n[5] **README.md** \u2014 interop overview  \nhttps://github.com/nooga/let-go#embedding-in-go\n\n---\n\nSee also: [let-go](entities/let-go/), [Stack VM](concepts/stack-vm/)\n", "concepts/go-structs": "\n# Go Structs via defgostruct\n\n`defgostruct` is a Lisp macro that bridges Go-defined struct types into let-go, generating compile-time bridge code that creates field accessors, constructors, predicates, and setters. Rather than hand-writing hundreds of lines of Go bridge code, you declare the struct once in Lisp and the compiler produces the full interop layer.\n\n## Problem & Design\n\nGo structs (like `*ir.Function`, `*ir.Block`, `*ir.Inst`) need Lisp-side primitives to access and modify their fields. Before `defgostruct`, these primitives were hand-written in Go \u2014 error-prone and brittle when struct definitions changed. The macro inverts this: **the Lisp declaration is the source of truth; the Go code is generated from it**.\n\nThis applies the same pattern that let-go already uses for IR operations (`examples/go-gen/ir_ops.lg` \u2192 `pkg/ir/op_generated.go`).\n\n## Usage: Declaring a Go Struct\n\nDefine a Go struct in the `defgostruct` macro by specifying:\n- The fully-qualified Go type\n- A Lisp namespace and short-name for generated primitives\n- Field map in kebab-case (auto-converted to PascalCase for Go)\n- Optional mutable fields and extra methods\n\n```clojure\n(defgostruct ir.Function\n  :type \"github.com/nooga/let-go/pkg/ir.Function\"\n  :ns \"ir\"\n  :short-name \"fn\"\n  \n  :fields\n    {:name          String\n     :arity         Int\n     :is-variadic   Bool\n     :insts         [Inst]\n     :blocks        [Block]\n     :entry         BlockID}\n  \n  :mutable [:insts :blocks]\n  \n  :extras [{:name \"dump\" :args (Self) :returns (String) :calls \"ir.Dump\"}\n           {:name \"add-block\" :args (Self) :returns (Int) :calls \"AddBlock\"}])\n```\n\n## Generated Primitives\n\nThe macro generates primitives on the declared namespace (`:ns \"ir\"`) with the short-name prefix (`:short-name \"fn\"`):\n\n| Primitive                    | Kind       | Maps to Go                              |\n|------------------------------|------------|------------------------------------------|\n| `ir/new-fn`                  | constructor| `ir.NewFunction(name, arity, variadic, nil)` |\n| `ir/fn?`                     | predicate  | Type check: `_, ok := v.Unbox().(*ir.Function)` |\n| `ir/fn-name`                 | getter     | `f.Name` \u2192 string                       |\n| `ir/fn-arity`                | getter     | `f.Arity` \u2192 int                         |\n| `ir/fn-variadic?`            | getter     | `f.IsVariadic` \u2192 boolean                |\n| `ir/fn-insts`                | getter     | `f.Insts` \u2192 vector of boxed `*Inst`     |\n| `ir/fn-blocks`               | getter     | `f.Blocks` \u2192 vector of boxed `*Block`   |\n| `ir/fn-entry`                | getter     | `int(f.Entry)`                          |\n| `ir/fn-set-insts!`           | setter     | `f.Insts = newSlice; f.MarkUsesDirty()` |\n| `ir/fn-set-blocks!`          | setter     | `f.Blocks = newSlice; f.MarkUsesDirty()` |\n| `ir/fn-dump`                 | extra      | `ir.Dump(f)`                            |\n| `ir/fn-add-block`            | extra      | `f.AddBlock()`                          |\n\n**Boolean field naming**: Fields with Go type `bool` automatically get a `?` suffix in the Lisp name (`IsVariadic` \u2192 `ir/fn-variadic?`).\n\n**Slice access helpers**: For slice-of-struct fields like `:insts [Inst]`, the macro also emits:\n- `ir/fn-inst-at` \u2014 getter by index: `(ir/fn-inst-at f 3)` \u2192 boxed `*Inst` for `f.Insts[3]`\n- `ir/fn-inst-count` \u2014 length: `len(f.Insts)`\n\nWhen a slice field is in `:mutable`, also generates:\n- `ir/fn-add-inst!` \u2014 append a new `*Inst` to the slice\n\n## Type Conversions\n\n**Simple types** (`String`, `Int`, `Bool`, `Float`) convert directly between Go and [value-representation](concepts/value-representation/).\n\n**Go type aliases** (`type BlockID int32`) are handled as primitive integers. The macro accepts them as field types and translates them to integers on the Lisp side.\n\n**Slice fields** (`[Inst]`) are returned as Lisp vectors of boxed pointers, enabling iteration with `map`, `reduce`, etc.\n\n## Field Mutability and Side Effects\n\nFields marked in `:mutable` get setter primitives (e.g., `ir/fn-set-insts!`) that:\n1. Replace the Go field with a new slice\n2. Call `MarkUsesDirty()` on the struct if it tracks changes\n\nThis bridges let-go's immutable semantics (setters return modified values) to Go's mutable structs (fields are replaced in-place).\n\n## Extra Methods\n\nThe `:extras` list adds primitives for methods that don't map to single fields. Each entry specifies:\n- `:name` \u2014 the Lisp function name suffix\n- `:args` \u2014 Go types (use sentinel `Self` for the receiver)\n- `:returns` \u2014 Go return types (supports `(T1 error)` for error returns)\n- `:calls` \u2014 the Go expression to invoke (bare name = method; dotted = function)\n\nExample:\n```clojure\n{:name \"dump\" :args (Self) :returns (String) :calls \"ir.Dump\"}\n; generates: (ir/fn-dump f) \u2192 calls ir.Dump(f)\n```\n\nThe generator automatically unboxes/boxes arguments and results based on type.\n\n## Current State\n\nThe feature is **speculative** (design awaiting approval, not yet shipped). When implemented:\n\n1. The macro and generator will live in `examples/go-gen/ir_bridge.lg`\n2. A new `make generate-ir-bridge` target will regenerate `pkg/rt/ir_bridge_generated.go`\n3. Hand-written bridge code in `pkg/rt/lang.go` will be replaced with a call to the generated `installIRBridgeBuiltins()` function\n\nThe IR types (`Function`, `Block`, `Inst`) are the initial scope; the macro is designed to extend to other Go structs later.\n\n## Relationship to Clojure Interop\n\nAs part of the clojure-interop alignment effort, let-go also gains `.getBytes()` method support on strings and improved hex literal handling, enabling cross-platform code sharing between let-go and Clojure JVM. (See sources for design doc details.)\n\n# Citations\n\n[1] **defgostruct design** \u2014 spec for codegen-driven Go-struct \u2194 Lisp bimap  \n(local, 2026-05-22)\n\n[2] **lginterop generator** \u2014 Go package reflection and wrapper generation  \nhttps://github.com/nooga/let-go/blob/main/scripts/lginterop.lg\n\n[3] **clojure-interop-alignment design** \u2014 Clojure JVM compatibility improvements  \n(local, 2026-05-21)\n\n---\n\nSee also: [Go Interop](concepts/go-interop/), [lginterop](concepts/lginterop/), [value-representation](concepts/value-representation/), [let-go](entities/let-go/)\n", "concepts/indexed-rpn-ir": "\n# Indexed-RPN IR\n\nThe let-go compiler generates an intermediate representation using **indexed reverse Polish notation (RPN)** \u2014 a postfix encoding where a value's identity is determined by its position (index) on the RPN evaluation stack. This is an SSA-equivalent form: each value flows exactly once from producer to consumer, enabling program analysis without resorting to explicit SSA renaming. Control flow is managed through **block parameters**, which provide an SSA-style channel for values crossing block boundaries. Together, indexed-RPN encoding and block-parameter control flow form a compact, analyzable IR suitable for bytecode generation and Go code emission.\n\n## Encoding\n\nIndexed-RPN encodes computation as a sequence of operations that work on an implicit postfix stack during a single linear walk. Each operation pops a fixed number of operand values (its **stack-in** arity) and pushes either zero or one result value. A value's identity is its **position** \u2014 the index of the instruction that produced it \u2014 not an explicit name. This indexing scheme gives indexed-RPN its SSA-equivalence: the producer of a value is implicit (the defining instruction), and consumers simply reference the index.\n\nEach operation in let-go's IR is catalogued in `pkg/ir/ir_ops.lg` and generated into `pkg/ir/op_generated.go`. The catalogue defines four properties per operation:\n\n- **`name`** \u2014 human-readable operation kind (e.g., `Add`, `Call`, `Return`)\n- **`stackIn`** \u2014 number of operand values popped from the stack (or `-1` for variable arity)\n- **`stackOut`** \u2014 number of result values pushed (0 or 1)\n- **`pure`** \u2014 boolean flag controlling whether this operation is eligible for common subexpression elimination (CSE), constant folding, or loop hoisting\n\n### Representative Operations\n\n**OpConst** (stack-in: 0, stack-out: 1, pure: true)  \nPushes a constant value. The constant itself is stored in the operation's `Aux` field as a `vm.Value`. Lowering materializes it as `OP_LOAD_CONST` with an interned pool index.\n\n**OpAdd, OpSub, OpMul** (stack-in: 2, stack-out: 1, pure: true)  \nBinary arithmetic operations. Pop two operands from the stack, push their computed result. Marked `pure` so optimization passes may fold constant operands, hoist invariant arithmetic out of loops, or eliminate redundant computations via CSE.\n\n**OpCall** (stack-in: -1, stack-out: 1, pure: false)  \nInvokes a function with a variable number of arguments. The function operand and arguments are in `Refs`; the arity is in `Aux`. Marked not pure (side-effecting), so optimization passes will not eliminate or relocate calls.\n\n**OpReturn, OpBranch, OpBranchIf** (stack-out: 0, terminator: true)  \nControl-flow operations that end basic blocks. `OpReturn` pops a value and exits the function; `OpBranch` and `OpBranchIf` direct control to successor blocks (potentially with arguments).\n\n## Block-Parameter Control Flow\n\nWhile indexed-RPN encoding provides value numbering within a block, **block parameters** handle values that cross block boundaries. When a block is branched into, its entry parameters receive values from the predecessor's branch arguments. This mirrors SSA \u03c6 functions but is expressed structurally: a block's parameter list is a sequence of entry points, each bound to an argument passed by a branching predecessor.\n\nIn contrast to the indexed-RPN encoding (where producers and consumers are in the same linear sequence), block parameters create a distinct channel: a value produced in block A may flow to block B via a branch with arguments, where it is bound as a parameter in B's entry sequence and accessed via `OpBlockArg`. This design cleanly separates **intra-block computation** (indexed RPN) from **inter-block value flow** (block parameters), both grounded in SSA principles but avoiding the explicit renaming overhead of full SSA.\n\n## Citations\n\n[1] **Burak Emir, \"Indexed Reverse Polish Notation\"**  \nhttps://burakemir.ch  \nThe foundational design for positional value numbering in postfix form.\n\n[2] **Carbon Language Semantic IR**  \nhttps://github.com/carbon-language/carbon-lang/tree/trunk/toolchain/sem_ir  \nA reference implementation of block-parameter SSA.\n\n[3] **Swift SIL, Cranelift, MLIR**  \nAll employ block-parameter control flow for cross-block SSA-style value threading.\n\n[4] **let-go IR source (op catalogue)**  \n[pkg/ir/ir_ops.lg](https://github.com/nooga/let-go/blob/main/pkg/ir/ir_ops.lg) \u2014 the operations are defined here (in let-go), and generated into `pkg/ir/op_generated.go` (which carries the design-references header).\n\n---\n\nSee also: [Stack VM](concepts/stack-vm/), [let-go](entities/let-go/)\n", "concepts/io-host-decoupling": "\n# Runtime I/O and Host Decoupling\n\nThe let-go runtime originally hardcoded I/O to platform-specific sinks: `os.Stdout` on native, `fs.writeSync` shims in WASM. This coupling required each host to maintain its own shims. The design decouples I/O by exposing **seams**\u2014small, typed boundaries where each host binds the concrete stream.\n\n## The Problem: Parallel I/O Paths\n\nThere were four distinct paths for \"write a string from `.lg` code\":\n\n- **native `lg`** \u2192 `os.Stdout` \u2192 terminal\n- **`lg -w` bundle** \u2192 `os.Stdout` \u2192 `fs.writeSync` shim \u2192 `LetGoHost._output` \u2192 the page\n- **WASM track** \u2192 `os.Stdout` \u2192 `wasm_exec.js` default \u2192 DevTools console\n- **`lg -b` native** (third-party CLIs) \u2192 `os.Stdout` \u2192 terminal\n\nEach host inserted itself at a different layer and maintained its own shim. The solution: finish what was half-built\u2014make the runtime consult dynamic variables for I/O instead of hardcoding sinks.\n\n## The Model: One Contract, Multiple Bindings\n\nThe runtime already had the right abstraction partially in place: `*in*`, `*out*`, `*err*` are dynamic variables holding an `IOHandle`, which wraps an `io.Writer` and/or `io.Reader`. The design finishes it:\n\n- **native** \u2192 the handle wraps `os.Stdout` / `os.Stdin`\n- **embedder** (Go via `pkg/api`) \u2192 constructor options (`WithStdout`, `WithStderr`) push per-`Run` bindings\n- **WASM** \u2192 a `HostWriter` / `HostReader` adapter forwards to the JS host\n\nTwo rules keep the boundary honest:\n\n1. **Host-bound capabilities live in `pkg/rt`, never `pkg/vm`**: The guest names the capability (`println`, `read-key`, `emit`); the host supplies the backend. The VM core stays host-agnostic.\n2. **The seam is as thin as the operation allows**: Output is a byte stream (`io.Writer`); input is a small capability set; no richer interface earns its keep.\n\n## I/O Seams Shipped\n\nThe decoupling is complete as of 2026-06-17:\n\n| Step | Seam | State |\n|---|---|---|\n| print \u2192 `*out*` | Print fns consult dynamic binding, not `os.Stdout` | #206 (merged) |\n| embedder options | `WithStdout` / `WithStderr` per-`Run` bindings | #207 (merged) |\n| ANSI ops \u2192 `*out*` | Terminal control ops join the same path | #223 (merged) |\n| WASM host writer | `*out*` / `*err*` bound to `HostWriter`; `fs` shim retired | #231 (merged) |\n| input seam | `read-key` / `key-pending?` via `KeySource` / `HostReader` | #244 (merged) |\n| emit seam | `js/emit` via typed `HostEmitter`, off raw `_lgEmit` | #241 (merged) |\n\nOutput, input, and emit now reach the host through one configurable seam per stream. The browser bundle no longer intercepts file descriptors.\n\n## Design Decisions\n\n**Input shape**: `read-key` / `key-pending?` are capability ops backed by a host-supplied `KeySource` (a small interface), not a generic `io.Reader`. Interactive keys are event-shaped (one keystroke = one unit), blocking, and need interruption; `io.Reader` fits them awkwardly. Generic stdin (byte streaming) is a separate, later seam.\n\n**Blocking + wake**: The native runtime interrupts a blocked `read-key` with a self-pipe wake-byte (returns `BEL` on resize). This is explicit in the seam: \"a blocked read is interruptible by resize/EOF/stop.\" Both platforms already solve the interrupt, so codifying it is cheaper than rewriting.\n\n**ANSI plain-vs-color**: Gated at emission (ops consult an `*ansi?*` flag), not stripped downstream. This avoids generating-then-parsing-out escapes. The host can set the flag automatically by checking `isatty` at startup.\n\n**Terminal seam minimalism**: Keep output as an `io.Writer`; input as a small capability set. A rich TUI library like ratatui can sit on top of the writer seam, not replace it.\n\n**Adapters in `pkg/rt`**: Build-tagged JS-aware adapters (`HostWriter`, `HostReader`, emit bridge) stay in `pkg/rt` as thin shims. The seam is the `io.Writer`/`io.Reader` boundary; adapters bridge host-specific code to it.\n\n## Why It Matters\n\nDecoupling I/O enables:\n\n- **One runtime, multiple hosts**: The same bytecode runs natively, in WASM, and on custom hosts without modification.\n- **No downstream shims**: Embedders don't maintain `fs.writeSync` patches; the host binds a stream at startup.\n- **Composability**: A TUI library, analytics layer, or shell can wrap the writer seam without touching the runtime.\n- **Client ownership**: Projects like xsofy can provide their own shells and I/O backends without patches to let-go.\n\nThe pattern generalizes: peer capabilities (graphics, audio, input) follow the same shape\u2014guest-named, host-supplied, decoupled.\n\n# Citations\n\n[1] **pkg/rt/iort.go**: I/O routing and `IOHandle`  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/iort.go\n\n[2] **pkg/api**: Embedder API with `WithStdout` / `WithStderr`  \nhttps://github.com/nooga/let-go/blob/main/pkg/api\n\n[3] **PR #206**: Print and error routing through `*out*` / `*err*`  \nhttps://github.com/nooga/let-go/pull/206\n\n[4] **PR #231**: WASM host writer (`HostWriter`)  \nhttps://github.com/nooga/let-go/pull/231\n\n[5] **PR #244**: Input seam (`KeySource`, `HostReader`)  \nhttps://github.com/nooga/let-go/pull/244\n\n[6] **PR #241**: Emit seam (`HostEmitter`)  \nhttps://github.com/nooga/let-go/pull/241\n\n[7] **nooga/let-go#255**: Peer capabilities (graphics, audio, controller)  \nhttps://github.com/nooga/let-go/issues/255\n\n---\n\nSee also: [WASM Compilation](concepts/wasm-compilation/), [Execution Context](concepts/exec-context/), [Stack VM](concepts/stack-vm/)\n", "concepts/ir-optimizations": "\n## What they are\n\nLambda lifting and higher-order specialization are two complementary IR optimization passes designed to eliminate the overhead of dynamic dispatch and closure allocation in higher-order combinator code. Together, they transform code that passes functions as values (common in parser combinators and DSLs) into efficient direct-call recursive descent.\n\n**Lambda lifting** hoists inner function literals (`:make-closure` closures over IR.Function templates) to top-level IR.Functions, making them nameable and eligible for direct-call registry entry. Lifted functions remain semantically identical but become independently callable.\n\n**Higher-order specialization** (via inlining and partial evaluation) then inlines small combinator functions when their function-typed arguments are statically known, unrolling variadic loops over known argument sequences and replacing dynamic trampoline dispatch with straight-line recursive-descent calls.\n\n## When they matter\n\nCombinator-based code\u2014particularly parser combinators and DSLs that build parse trees from small, reusable building blocks\u2014suffers from two structural overheads:\n\n1. **Dynamic dispatch** \u2014 Rules passed as opaque function values via `call` trampolines (evaluating a rule re-allocates the entire combinator tree per invocation)\n2. **Per-node closure allocation** \u2014 Every combinator invocation allocates a fresh closure-wrapped function value\n\nThe yamlstar YAML parser (212 grammar rules implemented as closures) is a proving corpus: interpreted at ~36 ms, but naive native lowering still ~55 ms (slower than interpreted!) because lowering the rule bodies to native Go left the hot path untouched\u2014the dispatch-bound combinator invocation cost dominates.\n\nThese passes apply only to Go-target (AOT) compilation; bytecode VM paths are unchanged.\n\n## Lambda Lifting\n\nLambda lifting runs inside `compile-form*`, between `ir.build/build-fn` (source \u2192 IR) and `optimize-fn` (optimization pipeline).\n\n### Transform per function\n\n1. **Find candidates:** `:make-closure` instructions whose `:ref[0]` is a function-template `:const`.\n2. **Compute free variables** \u2014 values referenced via `:load-closed`:\n   - **Capture-free** (e.g., yamlstar rule bodies referencing only `parser`) \u2014 lift the body verbatim to a new top-level IR.Function.\n   - **Capturing** \u2014 lift with captured values as explicit leading parameters; update every use-site to pass those captured arguments. (Yamlstar mostly hits capture-free.)\n3. **Rewrite closure sites:**\n   - **Direct calls** \u2192 direct call to the lifted sibling with captured args.\n   - **Escapes as a value** (stored in `def`, passed to combinators) \u2192 reference to the lifted sibling (if capture-free) or a thin partial-application closure (if capturing). The lifted function is now independently direct-callable.\n4. **Deterministic naming:** `<outer-go-name>__lifted<ordinal>`, ordered by build-deterministic first-occurrence of the `:make-closure` instruction. No global gensym counter (avoids known nondeterminism).\n\n### Multi-decl threading\n\nLifted functions are lowered independently through the optimization pipeline and lowering, producing one `{:status :lowered :decl \u2026}` result per function. These are emitted as a `:multi-fn-template`-shaped result (reusing the existing multi-arity flattening path), so the framework's existing `registry-entry-from-result` registers each lifted sibling in the direct-call registry, making it callable across sites.\n\n## Higher-Order Specialization (Inlining + Partial Evaluation)\n\nSpecialization runs inside `optimize-fn`, before type inference, so inlined bodies are type-inferred and become direct-callable.\n\n### Three mechanisms\n\n1. **Inline-eligible call inlining.** When the callee resolves to a known IR.Function (lifted sibling or registered `defn`) and passes eligibility gates, inline the body with arguments substituted.\n2. **Partial evaluation / loop unrolling over known sequences.** Combinators loop over variadic `& funcs` arguments. When that arg list is statically known (typical for literal combinator expressions), unroll into a fixed sequence of straight-line iterations. After unrolling, each `(call p f)` has a known target \u2192 rewrites to a direct call.\n3. **Constant folding of matcher arguments** \u2014 delegated to the existing `constfold` pass (e.g., `(first \"-\")` \u2192 character constant).\n\n### Eligibility (automatic, no user annotations)\n\nDerived from existing analyses:\n\n- **Safety gate** (`mutability.lg` `rebinds-var-roots?`) \u2014 callee must not mutate var roots (same gate as direct calls).\n- **Purity** (`purity.lg`) \u2014 informs whether post-inline cleanup (constant folding, common-subexpression elimination, dead-code elimination) is safe.\n- **Size/recursion heuristic** \u2014 small, non-recursive (or boundedly recursive), and inlining enables a direct call.\n- **`name*` transparency** falls out automatically: small wrappers inline and fold by the same rule\u2014no special case needed.\n\nNothing in these criteria names yamlstar; yamlstar benefits because its combinators are small and its grammar is static\u2014the exact profile these passes target.\n\n### Seeing through `call`\n\nThe `call` trampoline is large (state push/pop, receivers, trace, meta, trampoline-on-returned-value, boolean type check). The inliner does **not** wholesale-inline `call`. Once a `(call p f)` has a statically-known `f`, it rewrites to a **direct call to `f`** wrapped only in the semantically-required envelope (return-value trampoline and boolean check). Receiver/trace/state-stack bookkeeping (event/debug machinery) is trimmed in a later stage.\n\n## Multi-Block Inlining (Redesign)\n\nOriginal inlining handled single-block callees. Multi-block callees (those with loops or branches) require handling the cross-block-ref invariant: a reference must be in the same block, except via block parameters and cheap loads (`:const`/`:load-arg`/`:load-closed`, not `:load-var`). Values must flow through positional block `:params` + branch-target `:args` (indexed-RPN model).\n\n### Tail-position multi-block inlining\n\nInline a multi-block callee when the call result feeds the caller's `:return` (tail position):\n\n1. **Precondition check:** the caller block's terminator is `:return` whose operand is the call result (tail position).\n2. **Clone callee blocks:** for each callee block, create fresh blocks; record block and instruction maps.\n3. **Remap intra-block refs** through the instruction map.\n4. **Entry wiring:** the callee entry block's `:load-arg i` instructions become `:block-arg i`; terminate the caller block with a `:branch` to the cloned entry, passing call operands as branch `:args`.\n5. **Terminator remap:** each cloned terminator's branch targets go through the block map; `add-pred!` for each edge.\n6. **Return rewiring:** each cloned `:return v` becomes the caller's `:return` (callee returns become caller returns).\n7. **Validate:** `validate-fn!` ensures the cross-block-ref invariant is satisfied.\n\nWhy tail-position is safe: there is no continuation block and no value defined-before-call-used-after, so no live-across threading. The invariant is satisfied purely by remapping intra-callee refs and routing operands via entry block-args.\n\n### Fold-over-rest specialization and loop unrolling\n\nAt a call to a variadic fold-over-rest combinator with N known rest operands:\n\n1. **Recognize the idiom:** structurally match a tail-loop whose sole loop variable initializes to the rest-arg, each iteration consumes `(first loopvar)` and recurs with `(rest loopvar)`, terminating on `(empty? loopvar)`.\n2. **Specialize to fixed arity:** replace the rest-seq `:load-arg` with N explicit parameters; unroll the fold loop into N straight-line iterations (e.g., `any` \u2192 `(if (call\u2080) true (if (call\u2081) true (if (call\u2082) false)))`).\n3. **Unroll cap:** bounded by `max-unroll`; over-cap leaves the call generic (no silent truncation).\n4. **Inline the specialized clone** via tail-position multi-block inlining (now acyclic and tail-shaped at the rule site).\n5. **Direct calls emerge:** each unrolled iteration's `((first xs) p)` becomes a direct call to the rule sub-function.\n\nFor `any`/`all`, the unrolling is straightforward pure short-circuit logic. `rep` (min/max-bounded repetition) is harder and may be a follow-on.\n\n## Verification and Determinism\n\nEvery PR must:\n- `make generate` + `make check-generated` clean (regenerates `core_compiled.lgb` + `core_go_lowered/` + checksums).\n- **gogen-parity** \u2014 lowered Go output runs identically to interpreted.\n- **Determinism test** \u2014 lifted-sibling names and inlining order driven by structural order, never hash-map iteration.\n- Full `go test ./pkg/ir/ -v` green (these passes mutate IR; broad regression scope).\n- **yamlstar parse benchmark** \u2014 measured native parse time vs 36 ms interpreted baseline.\n\n## Citations\n\n**Resource:** [pkg/rt/core/ir/passes/pipeline.lg](https://github.com/nooga/let-go/blob/main/pkg/rt/core/ir/passes/pipeline.lg) \u2014 pass orchestrator and integration point for lifting and specialization.\n\n**Related passes** (in `pkg/rt/core/ir/passes/`):\n- `mutability.lg` \u2014 mutation analysis (inlining safety gate)\n- `purity.lg` \u2014 effect analysis (cleanup eligibility, loop unroll safety)\n- `constfold.lg` \u2014 constant folding (post-inline cleanup)\n- `cse.lg` \u2014 common-subexpression elimination (post-inline cleanup)\n- `dce.lg` \u2014 dead-code elimination (post-inline cleanup)\n- `typeinfer.lg` \u2014 type inference (refines types after inlining)\n- `licm.lg` \u2014 loop-invariant code motion (reference for block-parameter threading)\n\n**Design docs** (local, planning/approval stage):\n- `docs/superpowers/specs/2026-06-28-lambda-lift-and-higher-order-specialization-design.md` \u2014 stages 1+2, lambda lifting and single-block inlining\n- `docs/superpowers/specs/2026-06-28-multiblock-inliner-and-loop-unroll-design.md` \u2014 redesign of stage 2 for multi-block inlining and loop unrolling\n\n**Related concepts** (this wiki):\n- [IR Passes](concepts/ir-passes/) \u2014 the optimization pass pipeline and DSL\n- [IR Pipeline](concepts/ir-pipeline/) \u2014 build, optimize, lower architecture\n- [Indexed-RPN IR](concepts/indexed-rpn-ir/) \u2014 the IR data model\n- [Bytecode Compiler](concepts/bytecode-compiler/) \u2014 lowering to bytecode\n", "concepts/ir-passes": "\n## What they are\n\nIR optimization passes are a pipeline of Lisp-implemented transformations that operate on [let-go](entities/let-go/)'s semantic intermediate representation (sem-IR). Each pass is a self-contained optimization: constant folding, dead-code elimination, loop hoisting, type inference. They run sequentially on a Function, mutating it in place, before the IR is lowered to bytecode or Go.\n\nIndividual pass implementations live in `/pkg/rt/core/ir/passes/` (constfold.lg, cse.lg, dce.lg, licm.lg, etc.), with the core DSL definition `passes.lg` at `/pkg/rt/core/ir/passes.lg`. All are written entirely in let-go's own dialect \u2014 a departure from the bytecode compiler (which is Go), and a step toward self-hosting.\n\n## When they matter\n\nOptimizations improve runtime performance by eliminating redundant computation. A trivial form like `(+ 1 2)` folds to the constant `3` at compile time. A loop that loads the same value repeatedly has that value hoisted outside the loop. Dead instructions from aggressive inlining get pruned away. Collectively, these passes can reduce the bytecode output significantly and improve the quality of the [indexed-rpn-ir](concepts/indexed-rpn-ir/) that feeds the [stack-vm](concepts/stack-vm/).\n\nOptimization is mandatory in the production pipeline: every function built via compile-form* unconditionally chains `ir.build/build-fn` with `optimize-fn` (see `pkg/rt/core/ir/passes/pipeline.lg` lines 455, 466, 479). There is no runtime flag to disable passes for debugging.\n\n## Pass DSL and structure\n\nAll passes use a unified macro called `(defpass ...)`, defined in `passes.lg`. The macro abstracts away the zipper-based traversal logic and provides three helpers:\n\n- `(replace-refs! refs)` \u2014 rewrite an instruction's operand references\n- `(replace-aux! aux)` \u2014 change auxiliary data (constants, jump targets, etc.)\n- `(remove!)` \u2014 drop the current instruction from its block\n\nA pass author writes only the pattern-matching and rewrite logic:\n\n```clojure\n(defpass my-optimization\n  \"One-sentence summary.\"\n  [inst]                    ; inst is the current InstId\n  (let [f  ir.passes/*current-fn*\n        op (ir/op inst f)]\n    (when (= op :some-op)\n      ;; analyze inst, then mutate it via helpers above\n      )))\n```\n\nInside the body, three dynamic variables are bound: `*current-fn*` (the Function being transformed), `*current-inst*` (the InstId of this instruction), and `*current-zip*` (the zipper cursor for multi-block traversals).\n\n## The standard pipeline\n\nThe production optimization pipeline (`optimize-fn` in `passes/pipeline.lg`) runs in this order:\n\n1. **Type inference** (`typeinfer` + `infer-arg-types`) \u2014 abstract-interpret types across the function\n2. **Constant folding** \u2014 fold arithmetic over constants and apply algebraic identities like `(+ x 0) \u2192 x`\n3. **Common-subexpression elimination (CSE)** \u2014 within a block, reuse the result of identical expressions\n4. **Constant folding** (again) \u2014 CSE may expose new foldable patterns\n5. **Loop-invariant code motion (LICM)** \u2014 hoist pure instructions out of loops to pre-headers\n6. **Constant folding** (again) \u2014 LICM rearrangement may enable new folds\n7. **Dead-code elimination (DCE)** \u2014 remove effect-free instructions with no uses\n8. **Type inference** (again) \u2014 refine types after all rewriting\n\nMultiple constant-folding passes exploit a key insight: CSE and LICM rearrange code in ways that create new folding opportunities. Running fold multiple times catches these cascading optimizations without explicit fixed-point iteration.\n\n## Key passes\n\n### Constant folding\n\nReduces Const-to-Const operations at compile time. Three strategies, tried in order:\n\n1. **Primitive fold**: `(+ 3 5)` \u2192 `8`\n2. **Algebraic identities**: `(* x 1)` \u2192 `x`, `(+ x 0)` \u2192 `x`, `(* x 0)` \u2192 `0`\n3. **Commutative canonicalization**: `(+ 5 x)` \u2192 `(+ x 5)` (constants shift right for stable comparison)\n\nImplemented in `passes/constfold.lg`.\n\n### Dead-code elimination (DCE)\n\nRemoves effect-free instructions that have no uses. DCE is iterative: removing one instruction can make its operands dead. Uses the purity analysis (`purity.lg`) to determine which instructions are safe to remove.\n\nImplemented in `passes/dce.lg`.\n\n### Common-subexpression elimination (CSE)\n\nWithin a single block
