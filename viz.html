, if two instructions have the same opcode and operands, only compute once and reuse the result. CSE deliberately stays within block boundaries \u2014 cross-block CSE would require dominance-based analysis and is deferred.\n\nImplemented in `passes/cse.lg`.\n\n### Loop-invariant code motion (LICM)\n\nFor instructions whose operands never change within a loop, hoist them to the loop pre-header (the unique block that dominates the loop entry and is not part of the loop). LICM uses dominance analysis and is the key proof that block-arg threading (cross-block value threading via branch arguments) works correctly.\n\nImplemented in `passes/licm.lg` and requires dominance computation from `dominance.lg`.\n\n### Type inference\n\nAbstract-interprets the types of values through the function, tracking whether each instruction is an integer, function, vector, etc. Type inference is two-phase: first pass over block arguments to infer parameter types, then a general forward pass. Results are stored in each instruction's `:type` field and inform other passes (e.g., DCE uses type stability to determine if a load is safe to remove).\n\nImplemented in `passes/typeinfer.lg` and `passes/infer-arg-types.lg` with lattice operations in `lattice.lg`.\n\n## IR mutation invariants\n\nAll passes obey these rules:\n\n- **Instruction identity is stable.** Once `ir/add-inst` assigns an InstId, that ID never refers to a different instruction in the same Function. Removals mark the slot invalid but don't compact the array (following the Carbon language design).\n- **Uses cache invalidates on mutation.** Any mutation (rewrite, remove) flips a dirty flag. The next call to `ir/uses` rebuilds the def\u2192use index.\n- **Span union on replacement.** When an instruction is replaced, its source-info spans are merged with the spans of the new instruction (preserving debugging fidelity).\n- **Mutations are side-effects in place.** IR is mutable; passes return the same Function atom, now transformed.\n\n## IR data layer\n\nPasses interact with the IR through accessor functions defined in `data.lg` and exposed under the `ir/` namespace:\n\n- **Inspection**: `ir/op`, `ir/refs`, `ir/aux`, `ir/blocks`, `ir/block-insts`, `ir/block-params`, `ir/block-preds`\n- **Mutation**: `ir/replace-op!`, `ir/set-refs!`, `ir/set-aux!`, `ir/replace-all-uses!`, `ir/remove-inst!`\n- **Uses index**: `ir/uses`, `ir/invalidate-uses!`\n\nThe Function is represented as a Lisp atom holding a map with `:name`, `:arity`, `:insts` (vector of instructions), `:blocks` (vector of blocks), and metadata. Each instruction is a tuple `[op refs aux block source-infos type]`.\n\n## Design notes\n\nThe pass pipeline was redesigned (spec in `2026-05-22-sem-ir-passes-design.md`) to solve a critical limitation in the prior implementation: block-arg threading. The old design couldn't express cross-block value flow (e.g., a loop-hoisted instruction used in multiple blocks). The new design makes block arguments first-class in the IR, allowing passes like LICM to express their transformations correctly and for Lower to emit correct bytecode.\n\nWriting passes in Lisp (not Go) is part of a longer self-hosting trajectory: eventually, the entire compilation pipeline (Build, passes, lowering) will live in let-go's dialect, with Go providing only the VM substrate and interop bridges.\n\n# Citations\n\n**Resource**: [pkg/rt/core/ir/passes/pipeline.lg](https://github.com/nooga/let-go/blob/main/pkg/rt/core/ir/passes/pipeline.lg) \u2014 the main pipeline driver and pass composition.\n\n**Passes** (each in `pkg/rt/core/ir/passes/`):\n- `constfold.lg` \u2014 constant folding + algebraic identities\n- `cse.lg` \u2014 per-block common-subexpression elimination\n- `dce.lg` \u2014 dead-code elimination (iterative)\n- `licm.lg` \u2014 loop-invariant code motion with dominance\n- `typeinfer.lg` and `infer-arg-types.lg` \u2014 type inference\n- `purity.lg` \u2014 effect analysis (used by DCE and others)\n\n**Infrastructure**:\n- `passes.lg` \u2014 `defpass` macro and pass-author helpers\n- `data.lg` \u2014 IR data structure and accessor functions\n- `zipper.lg` \u2014 block-order cursor over instructions\n- `dominance.lg` \u2014 immediate dominators and postdominators\n- `dump.lg` \u2014 debugging dump format\n\n**Design doc**: `docs/superpowers/specs/2026-05-22-sem-ir-passes-design.md` (local, 2026-07-02) \u2014 comprehensive spec covering architecture, per-pass detail, phasing, and testing strategy.\n", "concepts/ir-pipeline": "\n# IR Pipeline\n\nlet-go's intermediate representation (IR) sits between the source compiler and the bytecode VM. It is an SSA-equivalent form with block-parameter-style control flow, and **the entire IR framework is written in let-go**\u2014demonstrating the language's capability for meta-programming and compiler construction.\n\nThe pipeline transforms source forms through IR stages, applies optimizations, and emits bytecode. Go provides only a small substrate (op table, chunk emission, value constructors) via bridge primitives in the `ir/` namespace; all algorithms and data structures live in Lisp.\n\n## Pipeline Overview\n\n```\n    forms\n      \u2502\n      \u25bc\nir.build/build-fn  \u2500\u2500\u25ba  Lisp-atom IR Function  \u2500\u2500\u25ba  ir.passes.pipeline/optimize-fn\n                                                           \u2502\n                                                           \u25bc\n                                                    optimized IR Function\n                                                           \u2502\n                                                           \u25bc\n                                                      ir.lower/lower\n                                                           \u2502\n                                                           \u25bc\n                                                     vm.CodeChunk (bytecode)\n```\n\n## Architecture\n\nThe IR framework spans multiple let-go files in `pkg/rt/core/ir/`:\n\n| File | Role |\n|------|------|\n| `data.lg` | IR data layer: Function/Block/Inst atom shape, constructors, structural mutators, def\u2192use cache |\n| `data/generated.lg` | Mechanical field accessors (generated from Go spec) |\n| `zipper.lg` | Fn-scoped cursor over instructions in block-order |\n| `build.lg` | `ir.build/build-fn` \u2014 transforms source Lisp form to IR Function |\n| `dump.lg` | Text dump for debugging |\n| `dominance.lg` | Cooper/Harvey/Kennedy immediate-dominator analysis |\n| `lower.lg` | IR \u2192 bytecode via chunk-emission bridge primitives |\n| `passes.lg` | `defpass` DSL; binds `*current-fn*`, `*current-inst*`, `*current-zip*` |\n| `passes/dce.lg` | Dead-code elimination |\n| `passes/constfold.lg` | Constant folding + algebraic identities + commutative canonicalization |\n| `passes/cse.lg` | Per-block common-subexpression elimination |\n| `passes/licm.lg` | Loop-invariant code motion |\n| `passes/thread-block-args.lg` | Pre-lower fixup for cross-block direct refs |\n| `passes/typeinfer.lg` | Abstract-interpretation type inference |\n| `passes/pipeline.lg` | Orchestrates passes; defines `compile-form` (end-to-end entry point) |\n\n## Compilation Pipeline\n\n**Step 1: Build**\n\n```clojure\n(ir.build/build-fn '(defn add [a b] (+ a b)))\n; => Lisp atom with :name :arity :entry :blocks :insts :consts fields\n```\n\nThe builder lowers Clojure forms into IR primitives: constants, block arguments, arithmetic ops, calls, and control-flow terminators.\n\n**Step 2: Optimize**\n\n```clojure\n(ir.passes.pipeline/optimize-fn f)\n; Applies: dce, constfold, cse, licm, typeinfer, thread-block-args in sequence\n; Returns: optimized IR Function (same atom)\n```\n\nEach pass is defined with the `defpass` DSL, which binds a cursor over instructions and provides helpers like `replace-refs!`, `replace-aux!`, and `remove!`. Passes run in a fixed order, with some iterating until a fixed point.\n\n**Step 3: Lower**\n\n```clojure\n(ir.lower/lower f)\n; => boxed *vm.CodeChunk (bytecode)\n```\n\nLowers the optimized IR to stack-machine bytecode via chunk-emission primitives (`ir/chunk-emit`, `ir/chunk-emit-with-arg`, etc.).\n\n## Passes (via defpass DSL)\n\nEach pass is a let-go function using the `defpass` macro:\n\n```clojure\n(defpass my-pass\n  \"Brief description.\"\n  [inst]  ; binds inst to the current InstId\n  (let [f  ir.passes/*current-fn*\n        op (ir/op inst f)]\n    (when (= op :add)\n      ;; mutate or replace the current inst\n      )))\n```\n\nThe `defpass` macro binds:\n- `*current-fn*` \u2014 the IR Function being optimized\n- `*current-inst*` \u2014 the instruction ID\n- `*current-zip*` \u2014 cursor for in-order block traversal\n\nHelpers available:\n- `replace-refs!` \u2014 change operand references\n- `replace-aux!` \u2014 change auxiliary data\n- `remove!` \u2014 delete the instruction\n\nBuilt-in passes include:\n\n- **DCE** \u2014 Remove unused instructions (marked non-pure, or with no consumers)\n- **Constant Folding** \u2014 Evaluate pure ops with constant operands at compile time\n- **CSE** \u2014 Eliminate redundant subexpressions within a block\n- **LICM** \u2014 Hoist loop-invariant computations using dominance analysis\n- **Type Inference** \u2014 Abstract-interpret types to guide dispatch decisions\n- **Thread Block Args** \u2014 Pre-lower fixup to handle cross-block references\n\n## IR Data Model\n\nAn IR Function is a Lisp atom:\n\n```clojure\n(ir/fn-name f)          ; => symbol\n(ir/fn-arity f)         ; => int\n(ir/fn-variadic? f)     ; => bool\n(ir/fn-entry f)         ; => block-id (entry block)\n(ir/fn-blocks f)        ; => vector of block-ids\n(ir/block-insts bid f)  ; => vector of instruction-ids in order\n(ir/block-term bid f)   ; => terminator instruction-id\n```\n\nNever reach into `@f` directly; use the accessor functions\u2014they maintain abstraction and enable future optimizations.\n\n## Extension: Adding an Optimization Pass\n\nCreate a new pass file, e.g., `passes/my-optimization.lg`:\n\n```clojure\n(ns ir.passes.my-optimization\n  (:require [ir.passes :refer [defpass replace-refs!]]))\n\n(defpass my-optimization\n  \"My new optimization.\"\n  [inst]\n  (let [f  ir.passes/*current-fn*\n        op (ir/op inst f)]\n    (when (some-condition? op)\n      (replace-refs! [new-ref1 new-ref2]))))\n```\n\nThen add it to `passes/pipeline.lg`:\n\n```clojure\n(defn optimize-fn [f]\n  ...\n  (my-optimization f)\n  ...\n  f)\n```\n\nWire it into the runtime bundle via `pkg/rt/irpasses.go` and `cmd/lgbgen/main.go`.\n\n## Bridge Primitives (Go \u2194 Lisp)\n\nGo provides only the op-table queries and chunk-emission primitives:\n\n- **Op Table**: `ir/op-terminator?`, `ir/op-pure?`, `ir/op-cheap-load?`, `ir/op-stack-out`\n- **Chunk Emission**: `ir/chunk-emit`, `ir/chunk-emit-with-arg`, `ir/chunk-update!`, `ir/chunk-length`, `ir/chunk-max-stack!`\n- **Value Constructors**: `ir/new-fn`, `ir/new-block`, `ir/new-inst`\n\nEverything else (data structures, passes, analysis) is implemented in Lisp.\n\n## Loading Order\n\nThe IR layer's load-time dance is normally invisible but worth knowing:\n\n- `data.lg` is **not** in the precompiled bundle; it loads from source. The intern block at the bottom needs live function values to register accessors.\n- `ir.build` declares `(:require ir.data)`, so loading build automatically triggers data's source load.\n- At precompile time (`lgbgen`), `data.lg` is bootstrapped first so downstream namespaces can resolve `ir/*` symbols.\n\nIf you see \"nil is not a function\" errors during compilation, the most likely cause is that `data.lg` didn't finish loading before the caller compiled. Add `ir.data` to a `:require` clause or load it explicitly.\n\n## Citations\n\n[1] **IR framework README**  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/ir/README.md\n\n[2] **ir/ source code** (let-go implementations)  \nhttps://github.com/nooga/let-go/tree/main/pkg/rt/core/ir\n\n[3] **ir/lower_go.lg** \u2014 IR \u2192 Go AST lowering (for AOT compilation)  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/ir/lower_go.lg\n\n[4] **Indexed-RPN IR** (this wiki)  \n[indexed-rpn-ir.md](concepts/indexed-rpn-ir/)\n\n[5] **Bytecode Compiler** (this wiki)  \n[bytecode-compiler.md](concepts/bytecode-compiler/)\n\n[6] **Stack VM** (this wiki)  \n[stack-vm.md](concepts/stack-vm/)\n\n[7] **let-go** (this wiki)  \n[../entities/let-go.md](entities/let-go/)\n\n---\n\nSee also: [Indexed-RPN IR](concepts/indexed-rpn-ir/), [Bytecode Compiler](concepts/bytecode-compiler/), [Stack VM](concepts/stack-vm/), [let-go](entities/let-go/)\n", "concepts/lg-compile": "\n# lg-compile\n\n`lg-compile` is a let-go script that AOT-compiles a set of `.lg` source files into Go packages. Unlike the standard bytecode compiler (which produces `.lgb` files or standalone binaries), `lg-compile` generates a tree of `.go` files with **direct inter-package function calls** (`pkg.Fn(ec, ...)` in Go) instead of runtime trampoline indirection.\n\nThis is useful for embedding let-go-authored code as native Go libraries, reusing let-go logic from Go programs, or compiling multi-file let-go projects to a Go package hierarchy.\n\n## Usage\n\n```bash\n./lg scripts/lg-compile <out-dir> <import-prefix> <file.lg>...\n```\n\n**Parameters:**\n\n- `<out-dir>` \u2014 output directory for the generated Go package tree\n- `<import-prefix>` \u2014 Go import path prefix (each package is `<import-prefix>/<reldir>`)\n- `<file.lg>...` \u2014 one or more `.lg` files to compile\n\n**Example:**\n\n```bash\n./lg scripts/lg-compile /tmp/out github.com/example/generated-api \\\n  api/core.lg api/handlers.lg\n```\n\nEach `.lg` file's namespace becomes a Go package under `<out-dir>`. For example:\n\n- `api/core.lg` (ns `api.core`) \u2192 `<out-dir>/api/core/core.go` (package `core`)\n- `api/handlers.lg` (ns `api.handlers`) \u2192 `<out-dir>/api/handlers/handlers.go` (package `handlers`)\n\nThe generated Go packages are importable:\n\n```go\nimport \"github.com/example/generated-api/api/core\"\n\n// Call compiled let-go functions directly\nresult, err := core.MyFunction(ec, arg1, arg2)\n```\n\n## Compile Paths Comparison\n\n| Path | Command | Output | Use Case |\n|------|---------|--------|----------|\n| **Bytecode** | `lg -c app.lgb app.lg` | `.lgb` (binary module) | Distribute bytecode, run with `lg app.lgb` |\n| **Standalone binary** | `lg -b myapp app.lg` | Self-contained executable | Single-file distribution, no let-go runtime needed |\n| **WASM** | `lg -w site app.lg` | `index.html` (~6MB, embedded bytecode + WASM) | Web apps, browser deployment |\n| **Go package** | `lg scripts/lg-compile <out> <prefix> app.lg` | `.go` package tree | Embed in Go programs, direct function calls |\n\n## How It Works\n\n`lg-compile` (a let-go script) orchestrates the full-program lowering pipeline:\n\n1. **Parse** each `.lg` file into source forms\n2. **Intern** all namespaces (so cross-namespace symbol resolution works)\n3. **Compile** each form through the standard IR pipeline (`ir.passes.pipeline/compile-form`)\n4. **Lower to Go AST** using `ir.lower-go/lower` (converting IR to Go code)\n5. **Emit `.go` files** organized by namespace/package, with:\n   - Go function stubs for each let-go defn (accepting `*ExecutionContext` as first argument)\n   - Direct inter-package calls where both functions are in the generated tree\n   - Fallback trampolines for functions not eligible for direct calls (e.g., variadic functions)\n   - Necessary imports and Go build scaffolding\n\nThe generated code is valid Go that can be imported and linked into any Go program. Functions accept an `*ExecutionContext` (runtime state) and return `(vm.Value, error)`.\n\n## Cross-Package Calls\n\nWhen function A (in package `api.core`) calls function B (also in the generated tree, in package `api.handlers`), `lg-compile` emits a direct Go call:\n\n```go\nresult, err := handlers.MyFunction(ec, arg1, arg2)  // direct call, not trampoline\n```\n\nThis avoids runtime Var lookups and enables inlining by Go's compiler. Functions not eligible for direct calls (e.g., variadic) fall back to cached-var trampolines at runtime.\n\n## Citations\n\n[1] **lg-compile** \u2014 AOT compiler to Go packages (let-go script)  \nhttps://github.com/nooga/let-go/blob/main/scripts/lg-compile\n\n[2] **ir.lower-go** \u2014 IR \u2192 Go AST lowering (let-go module)  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/ir/lower_go.lg\n\n[3] **Bytecode Compiler** (this wiki)  \n[bytecode-compiler.md](concepts/bytecode-compiler/)\n\n[4] **WASM Compilation** (this wiki)  \n[wasm-compilation.md](concepts/wasm-compilation/)\n\n[5] **let-go** (this wiki)  \n[../entities/let-go.md](entities/let-go/)\n\n---\n\nSee also: [Bytecode Compiler](concepts/bytecode-compiler/), [WASM Compilation](concepts/wasm-compilation/), [let-go](entities/let-go/)\n", "concepts/lgb-bytecode-format": "\n## What is `.lgb`?\n\nThe `.lgb` format is let-go's binary bytecode representation. It encodes compiled modules\u2014code chunks, constants, and namespace tables\u2014in a compact, versioned wire format. The `lg` compiler emits `.lgb` files via the `-c` flag; the runtime loads them via `DecodeToExecUnit` for execution.\n\n## When it matters\n\n- **Startup speed**: Decoding is faster than recompiling. Bytecode caching trades compile time for decode time.\n- **Format stability**: Per-tag versioning lets the decoder refuse incompatible future versions early instead of silently misinterpreting data.\n- **Collection decode efficiency**: v2 batch construction reduces allocation churn for large vectors/maps/sets.\n\n## Structure\n\n### Header\n```\nMagic       [4]byte   \"LGB\\x01\"\nVersion     uint16    = 2\nFlags       uint16    (FlagConstsBase, FlagCapabilities, FlagLocalVars)\n[Capabilities] uint32 (optional, if FlagCapabilities set)\n```\n\nThe optional capability mask allows decoders to reject `.lgb` files with unsupported features:\n```\nif fileCaps & ~decoderCaps != 0 { return error }\n```\nThis reserves capacity bits for future features (varint operands, lazy const loading, SSA metadata) without breaking old decoders.\n\n### Sections (in order)\n1. **String table** \u2014 deduplicated string pool\n2. **Chunks** \u2014 bytecode instructions and metadata for each function\n3. **Consts** \u2014 value constants (literals, functions, types)\n4. **NS table** \u2014 namespace \u2192 chunk index mapping\n5. **Local var tables** (optional) \u2014 debug symbols for slots\n\n### Tag encoding\nEach value's tag byte is `0bVV_TTTTTT`:\n- `VV` (2 bits): tag version. `00` = v1 semantics, `01` = v2, etc.\n- `TTTTTT` (6 bits): tag ID\n\nFor v2.0, all tags are version 0 (unchanged wire bytes from v1). When a tag semantics changes, its version bits increment; old decoders see a new byte value and fail safely instead of misinterpreting.\n\nKnown tag IDs (6-bit):\n- Scalars: nil, true, false, int, float, string, keyword, symbol, char, big-int, void, UUID, instant\n- Code: func, var-ref\n- Collections: empty-list, list, vector, map, set\n- User types: record-type, record, regex, atom\n\nReserved slots: `0x34`\u2013`0x3F` (12 future tags).\n\n## v2 optimizations\n\n### Batch collection construction\nInstead of building maps/sets with O(N log N) per-element `Assoc` calls, v2 decodes collections via batch constructors:\n\n- **Vector**: preallocate slice, populate directly\n- **Map**: accumulate key/value pairs, call `NewPersistentMap` once (builds tree from sorted keys)\n- **Set**: accumulate values, call `NewPersistentSet` once\n\nThis eliminates per-element persistent copies and reduces heap churn measurably for large collections.\n\n### Backward compatibility\nThe decoder is dual-path:\n- v1 `.lgb` files \u2192 frozen `decodeToExecUnitV1()` path (no changes)\n- v2 `.lgb` files \u2192 new `decodeToExecUnitV2()` path (batch decode, tag versioning)\n\nEncoder always writes v2; old files still load.\n\n## Implementation\n\nThe [bytecode package](https://github.com/nooga/let-go/tree/main/pkg/bytecode) provides:\n- `Encode(w, m *Module)` \u2014 serialize to binary\n- `Decode(r io.Reader) (*Module, error)` \u2014 deserialize\n- `DecodeToExecUnit(r, resolve VarResolver) (*ExecUnit, error)` \u2014 decode ready-to-run\n\nThe core library (`pkg/rt/core_compiled.lgb`) is regenerated during compilation via `go generate`.\n\n## Citations\n\n**Resource:** [pkg/bytecode/decoder.go](https://github.com/nooga/let-go/blob/main/pkg/bytecode/decoder.go) \u2014 dual-path v1/v2 decoder with batch collection decode  \n**Related:**\n- [pkg/bytecode/encoder.go](https://github.com/nooga/let-go/blob/main/pkg/bytecode/encoder.go) \u2014 v2 encoder\n- [pkg/bytecode/tags.go](https://github.com/nooga/let-go/blob/main/pkg/bytecode/tags.go) \u2014 tag definitions and version bits\n- [pkg/bytecode/bench_test.go](https://github.com/nooga/let-go/blob/main/pkg/bytecode/bench_test.go) \u2014 startup/decode benchmarks\n\n**Design doc:** Local design spec at `docs/superpowers/specs/2026-05-23-lgb-v2-design.md` details format versioning, migration from v1, and success criteria (allocation reduction, no startup regression).\n", "concepts/lginterop": "\n# lginterop\n\n`lginterop` is a code generator that wraps Go packages so their functions become callable from let-go. Given a Go package path, it inspects the package's public exports and generates a `.go` file with:\n\n1. **Type-aware wrapper functions** for each exported function (converting let-go values to Go types and back)\n2. **Struct registrations** for exported types\n3. **An installer function** that registers everything on a let-go namespace at runtime\n\nThis eliminates hand-wrapping boilerplate when integrating external Go libraries into let-go programs.\n\n## Usage\n\nGenerate interop bindings for a Go package:\n\n```bash\n./lg scripts/lginterop -packages github.com/zeebo/xxh3\n```\n\nThis generates a file (typically named after the package) with wrapper functions and an `install` function. The wrapper is added to the let-go build, and functions become available:\n\n```clojure\n(require '[hash])\n\n(hash/xxh3-64 (byte-array [1 2 3]))  ; => uint64 hash value\n```\n\nUnder the hood, the let-go program calls into wrapped Go functions like `xxh3/Hash`:\n\n```clojure\n(def xxh3-64 xxh3/Hash)  ; wrapper function from lginterop output\n```\n\n## How it Works\n\n**lginterop** (`scripts/lginterop.lg`) is itself a let-go program that:\n\n1. **Reflects over Go packages** using the `go/ast` and `go/types` facilities (bridged from Go)\n2. **Catalogs exports** into a compact vector format:\n   ```clojure\n   [:func \"Hash\" [] [\"[]uint8\" \"uint64\"] false]  ; name, type-params, params, results, variadic?\n   ```\n3. **Generates Go code** using the `gogen` library to emit wrapper functions with type conversions, struct registrations, and an installer\n\nThe generated `.go` file contains:\n\n- **Wrapper functions** (`wrapXxh3Hash`, etc.) that:\n  - Unbox let-go `Value` arguments to Go types (strings \u2192 `string`, numbers \u2192 `int64`, etc.)\n  - Call the original Go function\n  - Box the Go return value back to a let-go `Value`\n\n- **Struct registration** (for types matching let-go's record protocol) using `vm.RegisterStruct`\n\n- **An installer function** (`InstallXxh3`, etc.) that:\n  - Creates a new let-go namespace (e.g., `\"xxh3\"`)\n  - Defines each wrapper function on the namespace\n  - Registers structs\n  - Calls `RegisterNS` to wire it into the runtime\n\nAt runtime, calling `(xxh3/Hash bytes)` from let-go invokes the wrapper, which converts bytes to Go `[]uint8`, calls the real `Hash`, and returns the result as a let-go number.\n\n## Smart Wrappers\n\nWhen all a function's parameters and results are simple types (`string`, `int`, `float64`, `bool`, `error`, or `interface{}`), lginterop can generate a \"smart wrapper\" that uses `vm.NativeFnType` \u2014 a fast-path specialization bypassing reflection at call time.\n\n## Citations\n\n[1] **lginterop** \u2014 Go package interop code generator (let-go script)  \nhttps://github.com/nooga/let-go/blob/main/scripts/lginterop.lg\n\n[2] **interop_xxh3.go** \u2014 generated example (xxh3 package wrapping)  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/interop_xxh3.go\n\n[3] **hash.lg** \u2014 user-facing API wrapping lginterop-generated functions  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/hash.lg\n\n[4] **Go Interop** (this wiki)  \n[go-interop.md](concepts/go-interop/)\n\n---\n\nSee also: [Go Interop](concepts/go-interop/), [let-go](entities/let-go/)\n", "concepts/nrepl-server": "\n# nREPL Server\n\nA network REPL server exposing let-go's compiler and runtime via bencode-framed messages over TCP (127.0.0.1 by default). Enables interactive development in editors, the REPL, and tooling without rebuilding let-go itself.\n\n## Core Implementation\n\nThe base server in `pkg/nrepl/server.go` implements the nREPL 1.0 protocol. A client starts it via `lg -n -p <port>` or calls `NewNreplServer(ctx).Start(port)` directly from Go.\n\nThe server is **single-threaded at the protocol layer** (bencode frames over TCP, one message at a time per connection) but spawns one goroutine per accepted client connection. Each client connection is isolated via a session ID; multiple clients can connect to the same server instance.\n\n### Session Model\n\nEach nREPL session is a lightweight wrapper around a shared `*compiler.Context`:\n\n```go\ntype session struct {\n  id  string                      // UUID\n  ctx *compiler.Context\n}\n```\n\nSessions are created on-demand (via the `clone` operation) and destroyed explicitly. All sessions in a server share the same namespace state (the same `*rt.Namespace` objects), so `def`s in one session are visible to all others\u2014matching Clojure's process-global namespace architecture.\n\n### Wire Format\n\nMessages are bencode dictionaries, each sent as a byte sequence:\n\n```\nd2:id4:abc123:opevaln/a  \u2192 {\"id\": \"abc\", \"op\": \"eval\", ...}\n```\n\nResponses are also bencode dictionaries streamed back to the client. The protocol is synchronous: for each request, the server sends one or more response frames (each a separate bencode message) culminating in a `\"done\"` status.\n\n## Supported Operations\n\n- **`eval`** \u2014 Compile and execute Lisp code. Captures output via dynamic-binding interception of `*out*`, returning stdout frames, value/error results, and a final done frame. Code is evaluated against the session's compiler context, so all top-level forms execute with shared defs.\n- **`load-file`** \u2014 Evaluate a code string (convenience operation; converted to `eval` internally).\n- **`clone`** \u2014 Create a new session with a fresh UUID. The new session shares the parent's namespace.\n- **`close`** \u2014 Destroy a session by ID.\n- **`describe`** \u2014 Advertise supported operations and version info (let-go 1.0, nREPL 1.0).\n- **`completions` / `complete`** \u2014 Symbol completion via fuzzy namespace lookup.\n- **`info` / `lookup`** \u2014 Metadata and binding info for a symbol.\n- **`ls-sessions`** \u2014 List all active session IDs.\n- **`interrupt`** \u2014 Placeholder; returns `session-idle` (no cancellation implemented yet).\n\n## Output Capture\n\nThe `eval` operation captures stdout by binding `*out*` to a per-eval `bytes.Buffer`, executed on the call stack (not OS-level file descriptor swapping). This avoids cross-platform I/O decoupling issues that plagued earlier implementations.\n\n**Concurrency caveat:** The binding stack is process-global, not per-goroutine. Concurrent evals interleave bindings, so stdout from parallel evals can mix. Suitable for interactive single-client loops; not suitable for a multi-client production server without serialization.\n\n## Future Extensions (Design Phase)\n\n### Incremental Lowering\n\n**Status:** design phase (not yet integrated).\n\n**Design goal:** A `--serve` flag in `cmd/lgbgen` would warm-boot the full IR pipeline (Phase-1 compilation of core) once, then keep the compiler context alive and expose it over nREPL. Clients could then re-lower individual namespaces in seconds (vs. the ~76s cold-start cost). Design spec at `/Users/ndn/development/let-go/docs/superpowers/specs/2026-06-14-incremental-lowering-nrepl-server-design.md`. Experimental prototype exists in a development branch; not yet in main.\n\n### Browser Inspector Bridge\n\n**Status:** design only; not yet integrated into `pkg/nrepl/server.go`.\n\nA JSON variant of nREPL for WASM runtimes, streaming structured responses with per-form compilation artifacts (IR, bytecode, lowered Go). See `/Users/ndn/development/let-go/docs/superpowers/specs/2026-06-29-browser-inspector-nrepl-bridge-design.md`.\n\n---\n\n# Citations\n\n[1] [nREPL Server implementation](https://github.com/nooga/let-go/blob/main/pkg/nrepl/server.go) \u2014 bencode protocol, session management, operation dispatch.\n\n[2] Incremental lowering design \u2014 local spec `/Users/ndn/development/let-go/docs/superpowers/specs/2026-06-14-incremental-lowering-nrepl-server-design.md`.\n\n[3] Browser Inspector nREPL bridge design \u2014 local spec `/Users/ndn/development/let-go/docs/superpowers/specs/2026-06-29-browser-inspector-nrepl-bridge-design.md`.\n", "concepts/pods": "\n# Pods\n\nlet-go loads **Babashka pods** \u2014 external processes that expose Clojure functions over a simple EDN-based RPC protocol. Pods open the whole pod ecosystem (SQLite, AWS, Docker, file watching, and more) without requiring JVM interop or shipping as a monolithic binary.\n\n## What are pods?\n\nA pod is an external process speaking the Babashka pods protocol: stdio-based EDN message exchange with a request/response model. The host (let-go) spawns a pod, asks it to describe its exported namespaces and functions, and then invokes those functions on demand. Data flows as EDN (vectors, maps, keywords, symbols) serialized to newline-delimited JSON or EDN.\n\n## Protocol\n\nPods communicate via newline-delimited EDN messages:\n\n- **`:describe` operation** \u2192 pod returns a map of namespaces, each with vars, arglists, and optional metadata.\n- **`:invoke` operation** \u2192 caller sends `{:op :invoke :var \"ns/name\" :args [...] :id N}`, pod responds with `{:id N :value result}` or `{:id N :ex error-type :err message}`.\n- **`:shutdown` operation** \u2192 graceful pod termination.\n\nlet-go maintains request/response correlation by ID, enforces timeouts, and maps results back to let-go values.\n\n## Loading pods\n\n```clojure\n(require '[pods :as pods])\n\n; Load a pod from a local path or URL\n(pods/load \"/path/to/sqlite-pod\")\n\n; Invoke a function from the pod's exposed namespace\n(sqlite/query \"SELECT * FROM table\")\n\n; List active pods\n(pods/list)\n\n; Unload and stop a pod\n(pods/unload \"sqlite-alias\")\n```\n\n## Data mapping\n\n| EDN type | let-go type |\n|----------|-------------|\n| `nil`, booleans, ints, strings, chars | scalars (identity mapping) |\n| Keywords, symbols | keywords, symbols |\n| Vectors, lists | `PersistentVector`, `List` |\n| Maps (string/keyword/symbol keys) | `PersistentHashMap` |\n| Sets | `PersistentHashSet` |\n| Errors | let-go exceptions with pod-provided message and optional data |\n\n## Host architecture\n\n**Pod manager** (`pkg/rt/pods.go`):\n- `Start(path, opts)` spawns the pod process with pipes, sends a `:describe` request, and installs proxy vars.\n- Maintains a background goroutine reading and dispatching responses by ID.\n- Each request carries a timeout context; cancellation sends SIGTERM to the pod.\n- `Stop()` (graceful) and `Kill()` (forceful) handle shutdown.\n\n**Proxy namespace**:\n- For each function described by the pod, a let-go `Var` is installed that acts as an `Fn`.\n- Invoking the proxy serializes arguments to EDN, sends an `:invoke` request, awaits the response (or timeout), and returns the mapped result.\n- Errors are raised as let-go exceptions.\n\n## Ergonomics\n\nThe `pods` namespace provides:\n\n- `(pods/load path & {:as opts})` \u2014 loads and installs a pod; returns or assigns an alias namespace.\n- `(pods/unload alias)` \u2014 stops the pod and removes proxies.\n- `(pods/list)` \u2014 returns active pods with PIDs and descriptors.\n\nCLI helpers (planned):\n\n- `lg pods describe <path>` \u2014 prints the pod's descriptor.\n- `lg pods run <path> -- <args>` \u2014 quick test runner.\n\n## Security and resource limits\n\nPods run as external processes, so they inherit OS-level isolation:\n\n- Allowlist/denylist of pod executables to prevent arbitrary code execution.\n- Resource limits per pod (CPU timeout, memory soft limits, max concurrent calls).\n- For stricter sandboxing, pods can be run in containers (Docker, VM, etc.).\n\n## Why pods\n\n- **Ecosystem reuse**: Babashka's growing pod collection is instantly available.\n- **No JVM dependency**: let-go stays a lean single binary; interop code runs in a separate process.\n- **Safe isolation**: each pod is a process boundary; failures are contained.\n- **Portable**: EDN + stdio means pods can be written in any language.\n\n## Planned extensions\n\n- **TCP transport** for remote pods.\n- **Streaming and binary encoding** (transit) for large payloads.\n- **Retry logic and reconnection** for resilient long-running pods.\n\n# Citations\n\n[1] **pkg/rt/pods.go**: Pod manager, stdio transport, request/response routing  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/pods.go\n\n[2] **docs/design/pods.md**: Detailed design, protocol spec, implementation plan  \nhttps://github.com/nooga/let-go/blob/main/docs/design/pods.md\n\n[3] **Babashka pods**: Protocol documentation and existing pod ecosystem  \nhttps://github.com/babashka/pods\n\n[4] **let-go** (this wiki)  \n[../entities/let-go.md](entities/let-go/)\n\n---\n\nSee also: [go-interop](concepts/go-interop/), [stack-vm](concepts/stack-vm/)\n", "concepts/runtime-image": "\n# Runtime Image and Stdlib Cache\n\nLet-go achieves millisecond cold startup by precompiling the standard library and serializing the runtime state to a **runtime image**\u2014a self-contained snapshot of code, heap, and namespace metadata. Instead of reading source, analyzing, and compiling on boot, the runtime loads and deserializes this image in a fraction of the time.\n\n## What a Runtime Image Contains\n\nA runtime image is a persistent snapshot of:\n\n- **Namespaces**: the registry, aliases, and current `*ns*` binding\n- **Variables**: symbol \u2192 root value, metadata, macro flags\n- **Code**: `Func` and `Closure` objects with `CodeChunk` (bytecode, stack depth, const refs) and closed-over values\n- **Constant pool**: de-duplicated `Value`s (ints, strings, booleans, nil, symbols, keywords, vectors, lists, maps, sets)\n- **Intern tables**: for symbols and keywords to preserve identity sharing across deserialization\n\nExcluded from the image (they are rebound or rejected on load):\n\n- `NativeFn` and `Boxed` host pointers (Go values): represented as **externs** by symbol and resolved from a host registry at load\n- Non-serializable effects: channels, OS handles, goroutines, time values\n\n## The Image Format\n\nThe binary format is structured in sections:\n\n- **Header**: magic number, schema version, runtime version, endianness, feature flags\n- **String table**: unique strings for symbols, keywords, and value interning\n- **Atoms**: typed sections for nil, booleans, ints, chars, strings\n- **Collections**: vectors, lists, maps, sets (encoded recursively; persistent encodings like BPTR/HAMT for determinism)\n- **Const pool**: indices into value sections\n- **Code**: functions with `maxStack`, bytecode, const refs, closed-over const refs\n- **Namespaces**: table mapping ns name \u2192 alias map \u2192 var table\n- **Variables**: name \u2192 const-id (root), flags\n- **Trailer**: checksum/hash and optional signature\n\n## Workflows: Build-Time and Boot-Time\n\n**Precompiled stdlib cache**:\n\n1. **Build step**: Compile the standard library once; emit `stdlib.img`.\n2. **App boot**: Load `stdlib.img` with the host's `HostRegistry`. If invalid or mismatched, compile sources and regenerate.\n\n**Full runtime image (REPL freeze)**:\n\n1. Develop in the REPL, loading stdlib and evaluating app code.\n2. Save the entire heap and namespace: `(image/save \"app.img\")`.\n3. Deploy: embed or ship `app.img` and load it at startup.\n\n## Host and Native Binding\n\nDuring image load, the loader is provided a `HostRegistry` that maps core symbols to their `NativeFn` implementations. Extern placeholders (representing natives and boxed values) are resolved against this registry at load time. This ensures:\n\n- Natives are rebound to the running host's implementations (which may differ between platforms).\n- Signature/arity mismatches are caught immediately; no silent corruption.\n- The image is platform-independent; the host binding makes it work on any platform.\n\n## Layering and Versioning\n\n- **Base image**: stdlib only, enabling fast cold start universally\n- **App layer**: app-specific code; can be loaded atop the base image without reloading stdlib\n- **Optional**: multiple layers chained with conflict checks\n\nThe image carries metadata for validation:\n\n- **Schema version**: format compatibility\n- **Runtime/VM version**: bytecode interpreter compatibility\n- **Content hash**: of stdlib sources, to detect staleness\n- The loader rejects incompatible versions and regenerates on mismatch\n\n## Why It Matters\n\nRuntime images enable:\n\n- **Fast cold start**: Millisecond startup times. Compile-on-boot overhead is eliminated.\n- **Reproducible deployments**: Freeze a known-good REPL state into a bytecode snapshot; deploy it anywhere.\n- **Embedding**: Ship a precompiled image inside a Go binary (via `go:embed`), making the binary completely self-contained and independent of filesystem layout.\n- **Deterministic CI/CD**: The same image loaded on every machine gives identical behavior.\n\nFor let-go's bootstrap workflow (3-minute lowering of the core library), image caching for the stdlib alone saves significant time in development and CI.\n\n## Security Considerations\n\nRuntime images are treated as **untrusted input**:\n\n- Section sizes and offsets are validated.\n- Content hashes are checked.\n- Signatures can be verified before load.\n- Extern placeholders are **only** resolved against an explicit host registry; no pointer deserialization happens blindly.\n\n# Citations\n\n[1] **pkg/rt/core/core.lg**: Standard library source  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n\n[2] **pkg/rt/lang.go**: Runtime initialization; image loader called first, fallback to Eval  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/lang.go\n\n[3] **pkg/compiler/eval.go**: Compilation path (source \u2192 bytecode)  \nhttps://github.com/nooga/let-go/blob/main/pkg/compiler/eval.go\n\n[4] **pkg/vm/func.go**: `Func`, `Closure`, `CodeChunk` encoding  \nhttps://github.com/nooga/let-go/blob/main/pkg/vm/func.go\n\n[5] **pkg/vm/value.go**: `Value` serialization interface  \nhttps://github.com/nooga/let-go/blob/main/pkg/vm/value.go\n\n[6] **pkg/vm/native_func.go**: Extern resolution via `HostRegistry`  \nhttps://github.com/nooga/let-go/blob/main/pkg/vm/native_func.go\n\n---\n\nSee also: [Bytecode Compiler](concepts/bytecode-compiler/), [Stack VM](concepts/stack-vm/), [IR Pipeline](concepts/ir-pipeline/)\n", "concepts/stack-vm": "\n# Stack VM\n\nThe let-go compiler emits bytecode that runs on a stack-based virtual machine.\nValues are pushed and popped from an operand stack; instructions operate on the\ntop of the stack. This is the execution substrate for [let-go](entities/let-go/)\nprograms after compilation.\n\n> status: speculative \u2014 verify details against `pkg/vm` before promoting to stable.\n\n# Citations\n\n[1] [pkg/vm](https://github.com/nooga/let-go/tree/main/pkg/vm)\n", "concepts/type-inference": "\n# Type Inference and the Type Cache\n\nThe let-go compiler infers types during lowering to optimize dispatch and reduce runtime overhead. When a function's input and return types are known, the compiler can emit direct native dispatch instead of slower generic calls. For large standard libraries, type inference is the slowest part of the bootstrap. The solution is a **mergeable type-discovery cache** that makes parallel lowering both fast *and* deterministic.\n\n## The Lowering Challenge\n\nThe `lgbgen` tool lowers every function in the core namespace from let-go source to Go bytecode. This is the bottleneck in the bootstrap (~3 minutes). The per-function work is embarrassingly parallel:\n\n```\nexpand \u2192 build IR \u2192 optimize \u2192 type-infer \u2192 lower \u2192 emit\n```\n\nEach step is independent across functions, but **type inference creates two problems**.\n\n### Problem 1: Wall-Clock Budget Non-Determinism\n\nType inference uses a **wall-clock budget** (`*typeinfer-budget-ms*`, typically 2000 ms per function). When the budget runs out, the function returns a sound lower bound in the type lattice\u2014a partial result.\n\nUnder parallel load (N workers contending for CPU), each typeinfer call gets less wall-time, hits the budget sooner, and bails with *less* type information. A function that qualifies for direct native dispatch sequentially falls back to generic dispatch in parallel\u2014changing the imports and emitted Go code **run-to-run**. This non-determinism is unacceptable for reproducible builds.\n\n**A time-based budget is inherently non-deterministic under variable CPU load.**\n\n### Problem 2: Parallel Binding Overhead\n\nEarly attempts at parallel lowering with `pmap` (future-based parallel map) showed zero speedup, even with the gensym race fixed. The cause: every `future` calls `SnapshotBindings` + `RunWithBindings`, which copy every active dynamic binding per spawn. With ~50 lowering workers, this copying overhead serializes the work.\n\nThe fix came in two parts:\n\n- **Lock-free `Var.Deref`** (atomic `root`/`curr` instead of global `bindingsMu`): dynamic-var reads no longer serialize.\n- **`pmapv`** \u2014 an eager, synchronous parallel map that doesn't capture and reinstate the binding scope per spawn. Workers read the caller's bindings via the lock-free `Deref`, and the work becomes truly parallel.\n\nResult: sequential 193 s \u2192 `pmapv` 155 s (1.24\u00d7 speedup, ~1.9 effective cores).\n\n## The Solution: A Mergeable Type-Discovery Cache\n\nRather than a deterministic *iteration* budget (which caps precision permanently), cache the type discoveries and **merge** them across runs.\n\n### Why It's Sound\n\nType inference is **monotone**: `set-type-if-changed!` is a lattice **join**\u2014types only move up (`:unknown \u2192 :int \u2192 :number \u2192 :any`), never down. The budget bails with a lower bound. Therefore:\n\n- A cache entry is a point in the type lattice.\n- Merging two entries is the **least upper bound** (LUB / join).\n- Join is commutative, associative, idempotent \u21d2 **merge order is irrelevant**.\n\nTwo parallel runs that each got partway merge to a result at least as precise as either, deterministically. Workers contribute discoveries to a shared cache, and the converged result is independent of scheduling.\n\n### Shape and Convergence\n\n- **Key**: A content hash of the function's IR (stable across runs; auto-invalidates when source changes).\n- **Value**: Inferred signature (arg types, result type) \u00b1 per-instruction types.\n- **Merge**: Per-field lattice join; concurrent writers compare-and-join per key.\n- **Convergence**: Interprocedural\u2014F's inference improves when its callees' cached signatures improve. Iterate to a whole-program fixpoint. Monotone + finite lattice height \u21d2 terminates.\n- **Committed artifact**: Like the lowered tree, commit the converged cache. A \"warm to fixpoint\" step (sequential, unbudgeted, correctness-over-speed) produces it; `make generate` runs it. Lowering then *reads* the cache\u2014fast, parallel, reproducible.\n\n### Comparison\n\n| Approach | Deterministic? | Full precision? | Parallel-safe? | Decouples discovery from use? |\n|---|---|---|---|---|\n| Wall-clock budget (today) | No | Sometimes | \u2014 | No |\n| Deterministic iteration budget | Yes | No (capped) | Yes | No |\n| Mergeable type cache | Yes (once converged) | Yes | Yes | Yes |\n\n## Why It Matters\n\nThe mergeable cache achieves:\n\n- **Determinism**: Two lowering runs produce byte-identical Go code, enabling reproducible builds and CI/CD.\n- **Full precision**: No permanent cap on type inference; the cache accumulates discoveries across runs.\n- **Parallel speedup**: Workers contribute to the cache lock-free; `pmapv` + lock-free derefs enable real parallelism.\n- **Separation of concerns**: Discovery (a background, unbudgeted phase) is separated from use (lowering reads the cache fast).\n\nFor the ~3-minute bootstrap, this unlocks parallel lowering as a production technique instead of a fragile optimization.\n\n## Implementation Phases\n\n1. Land the keepers: atomic gensym, `pmapv`, lock-free `Var.Deref`\u2014correct independent of any cache.\n2. Land deterministic naming: build-args by inst-id, strip gensym suffixes, sort imports.\n3. Prototype the type cache: content-key + join-merge + fixpoint driver; measure convergence on `core`.\n4. If convergence is cheap, wire lowering to read it, drop the wall-clock budget, and turn on `pmapv` for the speedup.\n\n# Citations\n\n[1] **Design findings**: Parallel lowering investigation and cache proposal  \nhttps://github.com/nooga/let-go/blob/main/docs/design/parallel-lowering-and-type-cache.md\n\n[2] **pkg/rt/parallel.go**: `pmap`, `pmapv`, and binding propagation  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/parallel.go\n\n[3] **pkg/vm/var.go**: `Var.Deref`, lock-free atomics  \nhttps://github.com/nooga/let-go/blob/main/pkg/vm/var.go\n\n[4] **Lowering**: The IR-to-Go code generation step  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/ir/lower_go.lg\n\n[5] **Type inference**: The typeinfer pass in the lowering pipeline  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/ir/passes/typeinfer.lg\n\n---\n\nSee also: [IR Pipeline](concepts/ir-pipeline/), [Bytecode Compiler](concepts/bytecode-compiler/), [Indexed-RPN IR](concepts/indexed-rpn-ir/)\n", "concepts/value-representation": "\n# Value Representation and Numeric Performance\n\nThe let-go runtime represents all values using a unified `Value` interface. This design trades off direct representation for homogeneity: every let-go value can be stored in an interface, enabling uniform collection semantics. Numeric performance depends on how efficiently the runtime can unbox and operate on the most common type, `Int`.\n\n## Value Representation\n\nThe core abstraction is simple:\n\n- **`Value` interface** (`pkg/vm/value.go`): defines `Type() ValueType`, `Unbox() interface{}`, and `String()` methods.\n- **Numeric type `Int`** (`pkg/vm/int.go`): defined as `type Int int` and implements `Value` using value receivers.\n\nWhen an `Int` is stored in an interface, Go does **not allocate**\u2014the int is stored directly in the interface data word. This is the key: small scalars are cheap to box and unbox.\n\n## Boxing and Unboxing Paths\n\n- **`Int.Unbox()`** returns `int(l)`; **`Int.Type()`** returns the shared `IntType`.\n- **`BoxValue`** in `value.go` uses reflection to convert unknown Go values into `Value` instances; it routes `reflect.Int` to `IntType.Box`.\n- **Runtime numeric ops** in `pkg/rt/lang.go` often use `v.Unbox().(int)` per operand\u2014each unbox is an interface method call plus a type assertion.\n\n## Performance Characteristics\n\nIn Go, value-receiver method calls on an interface are cheap, but **repeated `Unbox` + type-assert in tight loops** adds avoidable overhead:\n\n- Method dispatch is inlined and fast.\n- Reflection in `BoxValue` is expensive and should be avoided on hot paths; it is acceptable at interop boundaries.\n- `Int.String()` currently uses `fmt.Sprintf`, which is significantly slower than `strconv.Itoa`.\n\n## Optimization Strategy\n\nThe weak spots are:\n\n1. **Arithmetic via `Unbox`**: Replace `n += vs[i].Unbox().(int)` with direct `Int` assertion: `n += int(vs[i].(vm.Int))`. This removes an interface method call and a type assertion on the result.\n\n2. **Integer to string**: Replace `fmt.Sprintf(\"%d\", int(l))` with `strconv.Itoa(int(l))` in `Int.String()`.\n\n3. **Hot natives**: Ensure all hot natives in `pkg/rt/lang.go` (arithmetic, comparisons, `+`, `-`, `*`, `/`, `mod`, `gt`, `lt`, `max`, `min`) use direct `Int` assertions and avoid `Unbox` on the happy path.\n\n4. **Boxing at boundaries**: Prefer `NativeFnType.Wrap`/`WrapNoErr` to register natives (avoiding per-call reflection). Reserve `NativeFnType.Box` for rare interop.\n\n5. **Future structural equality/hash**: When adding `Equiv`/`Hash`, keep fast-path numeric equality and hash inlined.\n\n## Why It Matters\n\nLet-go code is compiled to a stack machine that executes millions of arithmetic operations. A single unbox call per operand in a tight loop adds up\u2014especially in programs that do numerical work. Moving from interface-based dispatch to direct `Int` assertions on common operations can reduce overhead by 10\u201330\u00d7 on numeric-heavy code, while maintaining the uniform `Value` interface for the rest of the runtime.\n\nThe optimization is local to numeric primitives; the rest of the VM continues to use the `Value` interface uniformly.\n\n# Citations\n\n[1] **pkg/vm/value.go**: Core `Value` interface and `BoxValue` reflection converter  \nhttps://github.com/nooga/let-go/blob/main/pkg/vm/value.go\n\n[2] **pkg/vm/int.go**: `Int` type and boxing implementation  \nhttps://github.com/nooga/let-go/blob/main/pkg/vm/int.go\n\n[3] **pkg/rt/lang.go**: Numeric primitives and hot natives  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/lang.go\n\n[4] **pkg/vm/native_func.go**: Native function registration and `Wrap`/`WrapNoErr`  \nhttps://github.com/nooga/let-go/blob/main/pkg/vm/native_func.go\n\n---\n\nSee also: [Stack VM](concepts/stack-vm/), [Bytecode Compiler](concepts/bytecode-compiler/)\n", "concepts/wasm-compilation": "\n# WASM Compilation\n\nlet-go compiles itself to WebAssembly, enabling programs to run in the browser from the same source as native binaries. A single `lg -w site app.lg` command produces a self-contained `index.html` file (~6MB, inlined and gzipped) that boots the let-go runtime and your bytecode in ~10ms\u2014well within a 60fps frame budget at 16ms per frame.\n\n## Build Process\n\n**Source \u2192 Bytecode \u2192 WASM Bundle**\n\n1. **Bytecode Compilation**: Source is compiled to bytecode using the standard [bytecode compiler](concepts/bytecode-compiler/) pipeline. The `.lgb` module is generated in-memory.\n\n2. **WASM Bundling** (`pkg/bundle`): The bytecode is embedded into the WASM blob. Resource files (templates, assets) specified by `-resource-paths` are collected and archived alongside the bytecode using the bundle trailer format.\n\n3. **HTML Generation**: The WASM binary (inlined and gzipped), the bytecode, and a `LetGoHost` JavaScript harness are embedded into a single `index.html` file. No external assets are required; the page is self-contained and can be copied anywhere (including served from GitHub Pages).\n\n4. **Service Worker**: A service worker is included to provide COOP/COEP headers needed for SharedArrayBuffer support (required by the let-go runtime for goroutines and channels). The service worker intercepts fetch requests transparently.\n\n## Runtime Environment\n\nWhen `index.html` loads, it:\n\n1. **Starts during `requestAnimationFrame`** (~10ms available at 60fps): The Go runtime boots, initializes the let-go VM, and loads the embedded bytecode. This tiny budget is why startup must be fast \u2014 the WASM runtime footprint is ~6MB compressed, but boot + init is designed to finish in milliseconds.\n\n2. **Initializes the VM**: The let-go stack VM (`pkg/vm`) comes up inside WASM. The bytecode is decoded and registered as functions. Core library (persistent data structures, `core.async`, etc.) is available via precompiled image or embedded bytecode.\n\n3. **Provides Terminal Emulation** (for `term`-using programs): The browser page includes xterm.js for full terminal emulation\u2014ANSI colors, cursor positioning, raw keyboard input, and screen clearing. Calls to `(term/...)` functions interact with the emulated terminal, not the browser console.\n\n4. **Sets up JavaScript Interop**: A global `Eval` function is exposed to JavaScript, allowing the browser to eval let-go code:\n   ```js\n   window.Eval(\"(+ 1 2)\") // returns \"3\"\n   ```\n   This enables live coding in the browser REPL and embedding let-go snippets in web pages.\n\n## Example: Roguelike Game\n\n[xsofy](https://github.com/nooga/xsofy) is a roguelike written in let-go that compiles to both native (terminal) and WASM (browser) from the same source. Run `lg -w www game.lg` and open `www/index.html` in your browser. The game window is a terminal emulation; all game logic runs in let-go bytecode inside the WASM VM.\n\n## Compile-Time Predicates\n\nPrograms can branch on compilation target:\n- `*compiling-aot*` is `true` during `-w` compilation; `false` at runtime (useful for skipping side effects at compile time).\n- `*in-wasm*` is `true` when running inside a WASM build; `false` for native.\n\nUse `:lg` reader conditionals to guard WASM-only or native-only code:\n```clojure\n#?(:lg (require '[let-go.wasm :as wasm]))  ; only when compiling for WASM\n```\n\n# Citations\n\n[1] **wasm/** \u2014 WASM entry point and build orchestration  \nhttps://github.com/nooga/let-go/tree/main/wasm\n\n[2] **pkg/bundle** \u2014 bytecode and resource bundling  \nhttps://github.com/nooga/let-go/tree/main/pkg/bundle\n\n[3] **docs/guide/usage.md** \u2014 `lg -w` build mode  \nhttps://github.com/nooga/let-go/blob/main/docs/guide/usage.md\n\n[4] **README.md** \u2014 WASM web apps description  \nhttps://github.com/nooga/let-go#wasm-web-apps\n\n[5] **xsofy** \u2014 roguelike example  \nhttps://github.com/nooga/xsofy\n\n[6] **Bytecode Compiler** (this wiki)  \n[bytecode-compiler.md](concepts/bytecode-compiler/)\n\n[7] **Stack VM** (this wiki)  \n[stack-vm.md](concepts/stack-vm/)\n\n---\n\nSee also: [let-go](entities/let-go/)\n", "entities/let-go": "\n# let-go\n\nlet-go is a Clojure dialect implemented as a bytecode compiler and stack-based\nvirtual machine in Go. It produces a single ~12MB binary with ~8ms cold start,\nno JVM, and passes the jank-lang Clojure test suite. It supports AOT compilation\nto standalone binaries and self-contained WASM web pages, two-way Go interop, and\nmost of Clojure (persistent data structures, lazy seqs, transducers, protocols,\nrecords, multimethods, core.async, BigInts).\n\nSee the [stack VM](concepts/stack-vm/) for how compiled bytecode executes.\n\n# Citations\n\n[1] [let-go repository](https://github.com/nooga/let-go)\n", "ideas/bytecode-to-go-translation": "\n# Bytecode-to-Go Translation\n\n## What It Is\n\nTranslate let-go **bytecode** (`.lgb` binary format) into idiomatic Go source code. This is separate from and complementary to [lg-compile](concepts/lg-compile/), which AOT-compiles `.lg` **source** files to Go. This idea targets the other direction: take a pre-compiled `.lgb` file and emit Go code that directly executes the same bytecode instructions.\n\nThe result is a `.go` file (or package) with Go functions that inline the bytecode dispatch logic, allowing the compiled form to run natively without the [Stack VM](concepts/stack-vm/) interpreter overhead.\n\n## Why It Matters\n\n- **Performance**: Bytecode interpretation has inherent dispatch overhead. Native Go code for tight loops can be substantially faster.\n- **Integration**: Go projects can ship precompiled `.lgb` artifacts and generate Go bindings at build time, bridging compiled Clojure and native Go without requiring the VM.\n- **Optimization opportunity**: The Go compiler can inline, branch-predict, and apply escape analysis to the generated code, further accelerating hot paths.\n- **Single-binary deployment**: A let-go project can be AOT-compiled to `.lgb`, then translated to Go and bundled as a native binary with no runtime layer.\n\n## Building Blocks in Place\n\n- **[Bytecode Compiler](concepts/bytecode-compiler/)**: The `.lg` \u2192 `.lgb` pipeline exists and produces a well-defined bytecode format. The bytecode instruction set is stable and documented.\n- **[Stack VM](concepts/stack-vm/)**: The reference interpreter (dispatch loop in Go) implements every bytecode opcode. The VM semantics define what the translated code must replicate.\n- **[IR Pipeline](concepts/ir-pipeline/)** and existing **Go lowering** (`pkg/rt/core/ir/lower_go.lg`): The IR framework already has a `lower_go` path that emits Go code from the intermediate representation. This leg of the pipeline is a related building block for reference.\n- **[lg-compile](concepts/lg-compile/)**: Existing tool that emits Go from `.lg` source. The infrastructure for Go code generation (Go AST, formatting, packages) is proven.\n\n## Key Distinction from lg-compile\n\n| Aspect | lg-compile | Bytecode-to-Go |\n|--------|-----------|-----------------|\n| **Input** | `.lg` source files | `.lgb` bytecode binary |\n| **Compilation stage** | Source \u2192 IR \u2192 Go (skips bytecode) | Bytecode \u2192 Go (post-compile) |\n| **Use case** | Reusable let-go libraries in Go projects | Deployment-time artifact \u2192 native binary |\n| **Line-level source info** | Available (source forms) | Lost (only bytecode remains) |\n\n## Open Questions\n\n- **Instruction translation strategy**: Inline each bytecode op as Go code (switch + case per op), or generate a custom dispatch loop?\n- **Value representation**: Reuse let-go's runtime `Value` type, or generate specialized Go types (for known numeric, string, or data types)?\n- **Error handling**: How to map bytecode exception handling to Go panics / error returns?\n- **Module/function boundaries**: Does each bytecode function become a Go function, or is the entire module one Go function?\n- **Debuggability**: Without source locations in bytecode, how can the generated Go code preserve stack traces or source maps?\n\n## Roadmap Motivation\n\nFrom the README Goals: `[ ] Stretch: let-go bytecode \u2192 Go translation`. Marked as \"Stretch\" because it requires both understanding the full bytecode semantics and engineering a non-trivial code generator, but it unlocks a powerful deployment mode.\n\n---\n\n# Citations\n\n[1] **README Goals** \u2014 the unchecked roadmap item  \nhttps://github.com/nooga/let-go#goals\n\n[2] **Bytecode Compiler** (this wiki)  \n[bytecode-compiler.md](concepts/bytecode-compiler/)\n\n[3] **Stack VM** (this wiki)  \n[stack-vm.md](concepts/stack-vm/)\n\n[4] **IR Pipeline** (this wiki)  \n[ir-pipeline.md](concepts/ir-pipeline/)\n\n[5] **lg-compile** (this wiki)  \n[lg-compile.md](concepts/lg-compile/)\n\n[6] **pkg/rt/core/ir/lower_go.lg** \u2014 existing Go lowering in the IR pipeline  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/ir/lower_go.lg\n\n[7] **pkg/compiler** \u2014 bytecode compiler  \nhttps://github.com/nooga/let-go/tree/main/pkg/compiler\n\n[8] **let-go** (this wiki)  \n[let-go.md](entities/let-go/)\n\n---\n\nSee also: [let-go](entities/let-go/), [Bytecode Compiler](concepts/bytecode-compiler/), [Stack VM](concepts/stack-vm/), [lg-compile](concepts/lg-compile/)\n", "ideas/clojure-at-your-go-dayjob": "\n# Clojure at Your Go Dayjob\n\n## What It Is\n\nThe north-star aspiration for let-go: enable developers to write idiomatic Clojure within Go organizations and codebases, without requiring special approval, separate JVM processes, or language/deployment friction. A Go shop should be able to embed let-go for scripting, business logic, or data processing, and have Clojure code execute as fast, simple single-binary deployments as the rest of the Go application.\n\n## Why It Matters\n\n- **Language expressiveness**: Clojure's immutable data structures, higher-order functions, and macro system are powerful tools for certain domains (data transformation, configuration, rule engines). Developers should not have to choose between these tools and the simplicity of Go deployment.\n- **Hiring and retention**: Teams that use multiple languages can often attract talent more easily. A Go shop with Clojure capability doesn't require all logic to be written in Go, opening space for polyglot teams.\n- **Pragmatism**: Not all problems are best solved in Go. Being able to reach for Clojure for specific tasks (e.g., a complex ETL pipeline, a domain-specific language interpreter) without operational overhead makes Go projects more flexible.\n- **Single binary**: The absence of JVM dependencies means Clojure code can coexist in a Go binary and be deployed with the same simplicity and speed as native Go code.\n\n## Building Blocks in Place\n\n- **[Go Interop](concepts/go-interop/)**: let-go has two-way Go interoperability. Clojure code can call Go functions, and Go code can embed the let-go VM and call Clojure functions.\n- **[Embedding in Go](https://github.com/nooga/let-go/blob/main/docs/guide/embedding-in-go.md)**: let-go can be embedded as a scripting and extension layer in Go programs. Go structs roundtrip as records, channels are first-class, and functions are callable in both directions.\n- **[Single-Binary Deployment](concepts/wasm-compilation/)** (partial): let-go compiles to standalone binaries (native or WASM). A Go app that embeds let-go can ship the VM and user-supplied Clojure code as one binary.\n- **[Clojure Compatibility](entities/let-go/)**: let-go passes the jank-lang Clojure test suite and supports most of Clojure (persistent data structures, lazy seqs, transducers, protocols, multimethods, core.async, BigInts). Idiomatic Clojure code often runs unmodified.\n\n## Remaining Gaps\n\nThe vision is not yet complete; realization requires:\n\n- **Library ecosystem**: Most real Clojure projects depend on libraries. let-go can load Babashka pods, but reaching parity with the JVM ecosystem is not feasible. Developers must adapt or write new implementations.\n- **Familiarity in Go teams**: Clojure is not mainstream in Go-centric teams. Adoption requires education, mentorship, and cultural willingness to use another language.\n- **Organizational policy**: Some organizations have explicit rules against certain languages. let-go's embedding story must be compelling enough that teams advocate for policy changes.\n- **Debugging and observability**: Let-go's debugging experience (especially in embedded scenarios) lags the JVM. Better nREPL integration, stack traces, and profiling would help.\n\n## Roadmap Motivation\n\nFrom the README Goals: `[ ] Make it legal to write Clojure at your Go dayjob`. This is the project's guiding aspiration, reflecting the author's original joke-turned-useful goal: \"an elaborate excuse to write Clojure while pretending to write Go.\"\n\nAchieving this goal makes let-go not just a language implementation, but a tool for cultural and organizational shift within Go shops\u2014proving that systems languages and expressive, functional languages can coexist in production.\n\n---\n\n# Citations\n\n[1] **README Goals** \u2014 the unchecked roadmap item and project vision  \nhttps://github.com/nooga/let-go#goals\n\n[2] **docs/guide/embedding-in-go.md** \u2014 embedding let-go as a scripting layer  \nhttps://github.com/nooga/let-go/blob/main/docs/guide/embedding-in-go.md\n\n[3] **docs/guide/clojure-compatibility.md** \u2014 compatibility and gaps  \nhttps://github.com/nooga/let-go/blob/main/docs/guide/clojure-compatibility.md\n\n[4] **Go Interop** (this wiki)  \n[go-interop.md](concepts/go-interop/)\n\n[5] **let-go** (this wiki)  \n[let-go.md](entities/let-go/)\n\n---\n\nSee also: [let-go](entities/let-go/), [Go Interop](concepts/go-interop/)\n", "ideas/clojurelike-refactor": "\n# Rewriting Internals in let-go (Clojure-like Refactor)\n\n**Status**: Phases 1\u20133 (PersistentVector, PersistentHashMap/Set, Equiv/Hash interfaces) are shipped. Phase 4 (transducers, ChunkedSeq, Reducible fast path) is in progress.\n\n**Aligning let-go's runtime with Clojure's collection semantics and persistence model** is an ongoing refactor: replace mutable Go maps with persistent data structures (vectors, hash maps, sets), introduce correct seq-tower semantics, add transients for efficient bulk building, and implement transducers for lazy, composable transformations. This improves both semantics correctness and performance while maintaining interoperability with existing Go code.\n\n## Current state: gaps and antipatterns\n\nToday's let-go deviates from Clojure in several key ways:\n\n- **Collections implement `Seq` directly** instead of `Seqable`, causing `first`/`next`/`rest` to skip proper `seq` coercion. Non-sequence types (maps, sets) cannot be treated uniformly.\n- **Mutable Go maps and sets** back `Map` and `Set` types via copy-on-write assoc/dissoc; no structural sharing, no persistent versions.\n- **`PersistentVector` exists but deviates** from Clojure's canonical 32-ary bit-partitioned trie in node width, edge-case handling, and chunked seqs.\n- **No equality/hash abstractions**: `=` uses raw Go equality; no `Equiv`/`Hash` for value-based key lookups in maps/sets; no structural equality across types.\n- **Reader builds `ArrayVector`** for vector literals; maps are mutable copies.\n\nThese gaps mean user code must work around Clojure-like idioms or accept silent correctness bugs when using collections as keys or relying on structural equality.\n\n## Target design: interface hierarchy and semantics\n\nThe refactor introduces a Clojure-aligned interface hierarchy:\n\n**Core abstractions:**\n- `Equivable` and `Hashable` for structural equality and stable hashing across all value types (numbers by value, sequences element-wise, maps/sets by entries).\n- `Seq` (for sequence values only), `Seqable` (for all collections) to enforce proper coercion via `seq`.\n\n**Collections:**\n- `Indexed` for vectors: `Nth(i)`, `NthOr(i, default)`.\n- `Stack` for lists/vectors: `Peek()`, `Pop()`.\n- `IMapEntry` to abstract key-value pairs (replacing the current 2-vector convention).\n\n**Transients (performance-friendly mutability):**\n- `Editable` \u2192 `AsTransient()` to convert persistent to mutable.\n- `TransientCollection`, `TransientAssociative` APIs: `conj!`, `assoc!`, `dissoc!`, `persistent!`.\n- Edit tokens stored in nodes to enforce single-owner semantics and refuse operations after `persistent!`.\n\n**Reductions and transducers:**\n- `Reducible` fast path for `reduce` to avoid intermediate seqs.\n- `Reduced` wrapper for early termination.\n\n## Migration strategy: phased approach\n\n**Shipped phases (Phases 1\u20133):**\n\n### Phase 1: PersistentVector correctness \u2713\nCanonical 32-ary BPTR with correct `Pop`, `Peek`, and seq traversal, `TransientVector` with edit tokens. Reader vector literals switched to persistent.\n- **Shipped**: `pkg/vm/persistent_vector.go`, transient builtins in `pkg/rt/lang.go:4410`\n\n### Phase 2: Persistent maps and sets \u2713\n`Equivable`/`Hash` for core value types. `PersistentHashMap` (HAMT) and `PersistentHashSet` with structural sharing. Constructors and reader updated to persistent versions.\n- **Shipped**: `pkg/vm/persistent_map.go`, `PersistentHashSet` with transient variants\n\n### Phase 3: Equality and hashing in core \u2713\nStructural `Equiv` replacing raw equality; `contains?` and `get` use new semantics.\n- **Shipped**: `pkg/vm/hash.go:15` with Hashable interface and Equiv on core value types\n\n**In-progress phase:**\n\n### Phase 4: Transducers and performance (ongoing)\nAdd `ChunkedSeq` for vectors/ranges. Implement `Reducible` fast path for `reduce`. Introduce `transduce`, `eduction`, `sequence`, `completing`. Refit `into`, `mapv`, `keep`, `group-by` to use transducers. Benchmarks verify no intermediate allocations and improved throughput.\n\n**Note on Phase 0**: Interfaces and adapters (seq coercion, `nil` handling, `MapEntry`) were folded into the shipped phases where applicable.\n\n## Testing philosophy\n\nHigh-value test coverage includes:\n- **Seq coercion**: `(first [])`, `(next {})`, `(more nil)` correctness.\n- **Conj semantics** across list/vector/map/set; map `conj` accepting `IMapEntry`.\n- **Vector boundaries**: exact multiples of 32, assoc/pop at edges, random access.\n- **Map correctness**: deep updates/removals, collision nodes, insertion-order independence.\n- **Transients**: error on use-after-persistent, persistent result equivalence, bulk-build efficiency.\n- **Transducers**: `transduce (map inc)` equivalence, `into` composability, `eduction` laziness.\n\n## Compatibility and rollout\n\n- Maintain `ArrayVector` and current map/set types during transition; builtins accept both via interfaces.\n- Flip reader for vectors/maps/sets only when persistent implementations pass comprehensive tests.\n- No changes to public function arities or semantics; only expansion to support `nil`/`Seqable` coercion and new features.\n- Clear error messages for transient misuse.\n\nThe dogfooding push: moving runtime/compiler internals from Go into let-go itself (self-hosting). This refactor is a prerequisite: persistent data structures and correct semantics enable let-go to be bootstrapped from let-go source, not hand-written Go.\n\n# Citations\n\n[1] **docs/clojurelike-refactor-plan.md**: Full refactor plan with phases, interface definitions, and work items  \nhttps://github.com/nooga/let-go/blob/main/docs/clojurelike-refactor-plan.md\n\n[2] **let-go** (this wiki)  \n[../entities/let-go.md](entities/let-go/)\n\n[3] **IR pipeline** (this wiki)  \n[../concepts/ir-pipeline.md](concepts/ir-pipeline/)\n\n[4] **Runtime image** (this wiki)  \n[../concepts/runtime-image.md](concepts/runtime-image/)\n\n[5] **Value representation** (this wiki)  \n[../concepts/value-representation.md](concepts/value-representation/)\n\n---\n\nSee also: [self-hosting-aot](ideas/self-hosting-aot/), [master-plan-roadmap](ideas/master-plan-roadmap/)\n", "ideas/jvm-compat": "\n## Overview\n\nThe goal is to load real-world Clojure libraries (hiccup, fipp, medley, and others) from source without forking them. Rather than embedding Java or running on the JVM, the plan maps *symbol shapes* that libraries use into let-go [runtime](references/clojure-compat/) values\u2014allowing pure-Clojure code to run unmodified.\n\nThe success metric is `test/compat/run.lg`, the compatibility regression suite. After each implementation phase, corpus pass rate reveals what works.\n\n---\n\n## The Concrete Wall\n\nThe clearest blocker emerges from hiccup's `util.clj`, which uses four JVM-shaped constructs that the current runtime cannot represent:\n\n1. **Class-symbol resolution** \u2014 code like `clojure.lang.Keyword` needs to map to a known type.\n2. **Protocol fallback to `Object`** \u2014 `extend-protocol` with an `Object` clause for default dispatch.\n3. **Method invocation** \u2014 `(.startsWith p \"/\")` syntax and delegation.\n4. **Constructor sugar** \u2014 `(URI. s)` syntax for instantiating types.\n\nThese four form the spine; the rest of the corpus uses subsets of the same patterns.\n\n---\n\n## Non-goals\n\nThe plan explicitly does not:\n- Run on the JVM or embed Java; we map *symbol shapes* libraries use into let-go runtime values.\n- Support reflection (`Class/forName`, `.getClass`).\n- Achieve full clojure.core parity\u2014only what the corpus actually touches.\n- Support `cljs/*` namespaces. (`.cljc` with `:clj` reader conditionals is in scope; `.cljs` is not.)\n\n---\n\n## Layered Architecture\n\nThe solution is three independent layers, each useful alone and shippable separately:\n\n### Layer 1: Class Symbol \u2192 ValueType Registry\n\nPopulate namespaces like `clojure.lang`, `java.lang`, and `java.net` with vars that root to let-go `ValueType`s:\n\n| Clojure symbol | let-go value |\n|---|---|\n| `clojure.lang.Keyword` | `KeywordType` |\n| `clojure.lang.Symbol` | `SymbolType` |\n| `clojure.lang.Ratio` | `RatioType` |\n| `clojure.lang.PersistentVector` | `PersistentVectorType` |\n| `clojure.lang.PersistentHashMap` | `PersistentMapType` |\n| `clojure.lang.IPersistentCollection` | `AnyCollType` (sentinel) |\n| `clojure.lang.IFn` | `FnType` |\n| `java.lang.String` | `StringType` |\n| `java.lang.Object` | `AnyType` (sentinel) |\n| `java.lang.Throwable` | `ErrorType` |\n| `java.lang.Number` | `NumberType` (sentinel) |\n| `java.lang.Long` / `Integer` | `IntType` |\n| `java.lang.Double` | `FloatType` |\n\nSentinel types act as dispatch keys and are handled specially by protocol lookup. Cost: one shim namespace, ~50 vars, plus 1\u20132 sentinel types. Unblocks most `extend-protocol`/`extend-type` failures.\n\n### Layer 2: Protocol Fallback Dispatch\n\nExtend `Protocol.Lookup` to walk registered \"interface\" sentinels when a direct type hit misses:\n\n1. Direct hit on `target.Type()` (current behavior).\n2. Check sentinel predicates (`NumberType`, `AnyCollType`) for satisfaction.\n3. Fall back to `AnyType` impl if registered.\n4. nil \u2014 current `nilImpl` path.\n\nCost: ~50 lines in protocol dispatch. Unblocks `Object`-fallback `extend-protocol` clauses.\n\n### Layer 3: Method Invocation and Constructor Syntax\n\nThe compiler already rewrites `(.member instance args)` to `instance.InvokeMethod(member, args)` and `(Class. args)` to constructor form. What's missing is populating the implementations:\n\n1. Built-in value types (`String`, `PersistentVector`, etc.) need `InvokeMethod` implementations with a small method table delegating to existing builtins.\n2. Shim \"Java types\" (`URI`, `URLEncoder`) need tiny defrecord-shaped wrappers in shim namespaces, exposing methods like `.getHost` via `InvokeMethod`.\n\nCost: ~50 lines per built-in type; ~30 total corpus methods. Reflection is explicitly out of scope\u2014the registry is hand-curated. Unblocks nearly all interop usage in the corpus.\n\n---\n\n## Phasing Strategy\n\nEach phase is shippable and measurable:\n\n**Phase A** \u2014 Layer 1 (class registry). Add `pkg/rt/jvm_shim.go` defining `clojure.lang` + `java.lang` shim namespaces. Mark non-existing types with stub sentinels. Run corpus \u2192 expect fixable shifts and new passes.\n\n**Phase B** \u2014 Layer 2 (protocol fallback). Add sentinels and extend `Protocol.Lookup` walk. Wire sentinel resolution. Run corpus \u2192 expect hiccup/util.clj to load if Layer 3 isn't needed (it is).\n\n**Phase C** \u2014 Layer 3 (Receiver implementations). Add `InvokeMethod` to built-in types and shim Java types. Hand-register the ~30 methods the corpus uses. Run corpus \u2192 hiccup loads end-to-end.\n\nStop after Phase C and re-evaluate. Layer 4 (deftype Java method bodies) only if remaining failures still pin on it.\n\n---\n\n## Test Strategy\n\n- `test/compat/run.lg` is the regression suite; diff histograms before/after each phase.\n- Per-phase: focused `.lg` integration tests (e.g., `test/jvm_shim_test.lg`) exercising the mechanism without third-party code.\n- No mocks; real types and protocols.\n- Bench load-string of a representative file (medley/core.cljc) to ensure no meaningful performance regression.\n\n---\n\n## Implementation Constraints\n\nWe explicitly will not:\n- Auto-generate the class registry from JVM reflection. Hand-curated is faster and more honest about what we actually support.\n- Attempt to make let-go a Clojure replacement. The bar is \"load and run pure-Clojure libraries\", not \"be Clojure\".\n- Support multi-arity Java method overloading. Pick the most common signature; reject the rest.\n\nSee [Clojure Compatibility](references/clojure-compat/) for the broader scope of what is in view.\n\n---\n\n## Estimate\n\nPhase A: 1 day. Phase B: 1 day. Phase C: 1\u20132 days (compiler dispatch already exists; only receiver tables remain). Total: **~3\u20135 working days** to land the spine, plus ongoing work each time the corpus surfaces a new method/class.\n\n---\n\n# Citations\n\n**Primary source:**\n- GitHub: https://github.com/nooga/let-go/blob/main/docs/jvm-compat-plan.md (status: active, last-verified 2026-06-05)\n", "ideas/malli-on-let-go": "\n# malli on let-go\n\n[**malli**](https://github.com/metosin/malli) is metosin's popular data-schema library for Clojure: schemas for validation, generation, transformation, and serialization of structured data. Running **stock, released malli** (no fork) on let-go is feasible \u2014 and far cheaper than building a custom schema system \u2014 because malli already ships Babashka reader branches that sidestep JVM-internal assumptions.\n\n## Why feasible\n\nmalli's maintainers wrote `:bb` (Babashka) reader conditionals specifically for non-JVM hosts. let-go, also non-JVM, can leverage these fallbacks:\n\n- **No JAR loading needed**: malli is pure Clojure; load `.cljc` source directly.\n- **Zero external runtime deps**: core malli (validation, transformation) depends only on core Clojure.\n- **`:bb` reader branches avoid JVM internals**: malli uses conditional branches like:\n  ```clojure\n  #?(:bb (vec arr)           ; Babashka fallback\n     :clj (LazilyPersistentVector/createOwning ...))  ; JVM path\n  ```\n  let-go can match the `:bb` feature to load these branches.\n\n## Core validation works unmodified\n\nScalar, collection, and map schemas work with minimal shims:\n\n```clojure\n(require '[malli.core :as m])\n\n(m/validate :int 42)                              ; \u2705 scalar\n(m/validate [:map [:x :int] [:y :string]] \n            {:x 1 :y \"hi\"})                       ; \u2705 collection/map\n(m/validate [:cat :int :string] [1 \"a\"])          ; \u26a0\ufe0f  sequence (regex engine)\n```\n\n## Implementation roadmap (v1: core validation)\n\n### 1. Reader: match `:bb` feature (keystone)\n- Add `:bb` to let-go's reader feature set (alongside existing `:clj`).\n- Surgical change in `pkg/compiler/reader.go`.\n- **Impact**: malli's non-JVM fallbacks activate automatically.\n\n### 2. Smoke test & shims\n- Load `(require '[malli.core :as m])`.\n- Install small shims for host constructors that malli assumes:\n  - `clojure.lang.MapEntry.` \u2192 return a let-go map-entry.\n  - `hash-combine` \u2192 trivial Clojure/Go shim.\n  - `compare-and-set!` \u2192 missing builtin (atoms have mutex; add as primitive).\n\n### 3. Regex engine (sequence schemas)\n- **Hard part**: malli's regex engine uses mutable `deftype` fields (`^:unsynchronized-mutable` + `set!`).\n- let-go `deftype` is currently immutable-only.\n- **Two paths**:\n  - **A**: Add mutable-field support to let-go `deftype` (more general; enables other ports).\n  - **B**: Fork `regex.cljc` to use `volatile!` (atoms) instead of mutable fields.\n  - Both are doable; A is cleaner.\n\n### 4. Extended features (v2+)\n- Error messages, transformers, generators (test.check), `:fn` schemas (SCI evaluation).\n- These are separable follow-ups.\n\n## Interop strategy: three layers\n\n### Layer 1: `:bb` reader lens\nmalli automatically takes Babashka-compatible code paths. No interop code needed.\n\n### Layer 2: Native shims\nSmall let-go implementations:\n- `MapEntry` constructor (already a first-class value type in let-go).\n- `hash-combine` (numeric operation).\n- `compare-and-set!` (atomic compare-and-swap).\n\n### Layer 3: Go-backed constructors\nFor Java classes that malli constructs at runtime:\n- Use `gojava` (Go reimplementations of `java.*` classes).\n- Only needed if malli calls `(java.util.ArrayDeque.)` or similar (tied to regex engine).\n\n## Effort estimate\n\n- **Scalar + map/collection schemas**: 2\u20134 days\n  - Reader `:bb` matching\n  - Three shims (MapEntry, hash-combine, compare-and-set!)\n  - Smoke tests\n  \n- **Full core incl. sequence schemas**: +3\u20135 days\n  - Regex engine
