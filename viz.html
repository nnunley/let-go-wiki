<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
:root{
  --bg:#f4ecdb; --fg:#1d180f; --muted:#877a5e; --rule:#d6c8a8; --accent:#b45309;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --serif:"Boldonse","Iowan Old Style",Georgia,serif;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#1a1610; --fg:#ede1c4; --muted:#7a6d52; --rule:#34291c; --accent:#f5b041; }
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--mono);display:flex;flex-direction:column;height:100vh}
header{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1rem;border-bottom:1px solid var(--rule)}
header .title strong{font-family:var(--serif)}
.muted{color:var(--muted)}
.controls input,.controls select,.controls button{font-family:var(--mono);background:transparent;color:var(--fg);border:1px solid var(--rule);border-radius:4px;padding:.3rem .5rem;margin-left:.4rem}
.controls button:hover{border-color:var(--accent);color:var(--accent)}
main{display:flex;flex:1;min-height:0}
#graph{flex:2;min-width:0}
#detail{flex:1;max-width:420px;border-left:1px solid var(--rule);padding:1rem;overflow:auto}
#detail h1{font-family:var(--serif);color:var(--accent);font-size:1.2rem}
.type-chip{display:inline-block;padding:.1rem .4rem;border:1px solid var(--rule);border-radius:4px;color:var(--muted);font-size:.72rem}
.frontmatter dt{color:var(--muted);font-size:.72rem;letter-spacing:.04em;margin-top:.5rem}
a{color:var(--accent)}
.home{margin-right:.5rem;text-decoration:none}
.home:hover{text-decoration:underline}
.open-page{display:inline-block;margin-top:.3rem;padding:.1rem .4rem;border:1px solid var(--rule);border-radius:4px;background:transparent;font-size:.72rem;text-decoration:none}
.open-page:hover{border-color:var(--accent);color:var(--accent)}
hr{border:0;border-top:1px solid var(--rule)}

</style>
</head>
<body>
<header>
  <div class="title">
    <a class="home" href="." target="_top">← let-go-wiki</a>
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

 "source": "concepts/wasm-compilation", "target": "entities/let-go"}}, {"data": {"id": "entities/let-go__concepts/stack-vm", "source": "entities/let-go", "target": "concepts/stack-vm"}}, {"data": {"id": "projects/legmacs__entities/let-go", "source": "projects/legmacs", "target": "entities/let-go"}}, {"data": {"id": "projects/let-go-lab__entities/let-go", "source": "projects/let-go-lab", "target": "entities/let-go"}}, {"data": {"id": "projects/lgcr__entities/let-go", "source": "projects/lgcr", "target": "entities/let-go"}}, {"data": {"id": "projects/lgx__entities/let-go", "source": "projects/lgx", "target": "entities/let-go"}}, {"data": {"id": "projects/xsofy__entities/let-go", "source": "projects/xsofy", "target": "entities/let-go"}}, {"data": {"id": "references/clojure.core/comp__references/clojure.core/fn", "source": "references/clojure.core/comp", "target": "references/clojure.core/fn"}}, {"data": {"id": "references/clojure.core/defn__references/clojure.core/fn", "source": "references/clojure.core/defn", "target": "references/clojure.core/fn"}}, {"data": {"id": "references/clojure.core/filter__references/clojure.core/fn", "source": "references/clojure.core/filter", "target": "references/clojure.core/fn"}}, {"data": {"id": "references/clojure.core/fn__references/clojure.core/apply", "source": "references/clojure.core/fn", "target": "references/clojure.core/apply"}}, {"data": {"id": "references/clojure.core/inc__references/clojure.core/fn", "source": "references/clojure.core/inc", "target": "references/clojure.core/fn"}}, {"data": {"id": "references/clojure.core/inc__references/clojure.core/map", "source": "references/clojure.core/inc", "target": "references/clojure.core/map"}}, {"data": {"id": "references/clojure.core/map__references/clojure.core/fn", "source": "references/clojure.core/map", "target": "references/clojure.core/fn"}}, {"data": {"id": "references/clojure.core/mapv__references/clojure.core/fn", "source": "references/clojure.core/mapv", "target": "references/clojure.core/fn"}}, {"data": {"id": "references/clojure.core/partial__references/clojure.core/fn", "source": "references/clojure.core/partial", "target": "references/clojure.core/fn"}}], "bodies": {"concepts/bytecode-compiler": "\n# Bytecode Compiler\n\nThe let-go compiler transforms source code into bytecode that runs on the [stack VM](concepts/stack-vm/). The pipeline reads Clojure source, lowers it through an Indexed-RPN intermediate form, applies optimizations, and emits bytecode. Compiled bytecode is serialized to `.lgb` files, bundled into standalone binaries with `lg -b`, or compiled to WASM with `lg -w`.\n\n## Compilation Pipeline\n\n**Reader \u2192 AST \u2192 Indexed-RPN IR \u2192 Optimizations \u2192 Bytecode Emission**\n\n1. **Reader** (`pkg/compiler/reader.go`): Parses Clojure source into `vm.Value` AST nodes. Supports reader macros, `:lg` conditionals for let-go-only code, and syntax validation. Returns symbols, keywords, lists, vectors, and maps that drive compilation.\n\n2. **Indexed-RPN IR** (`pkg/ir` via `.lg` source): Source is lowered to an SSA-equivalent intermediate form using indexed reverse Polish notation. Each operation's identity is its position on an implicit evaluation stack; values flow exactly once from producer to consumer, enabling efficient analysis without explicit variable renaming. This is the canonical form for optimization and code generation. See [Indexed-RPN IR](concepts/indexed-rpn-ir/) for details.\n\n3. **Optimizations**: The IR is analyzed and transformed:\n   - Constant folding: evaluate pure operations with constant operands at compile time\n   - Dead code elimination: remove operations with no consumers\n   - Common subexpression elimination (CSE): hoist redundant computations\n   - Dominance analysis and type inference: guide dispatch decisions\n   - Inlining: expand small functions inline when profitable\n\n4. **Bytecode Emission** (`pkg/bytecode`): IR is lowered to stack machine instructions. A `CodeChunk` groups bytecode, local variable slots, and a constant pool. Opcodes like `OP_LOAD_CONST`, `OP_INVOKE`, `OP_TAIL_CALL`, and `OP_RETURN` drive the [stack VM](concepts/stack-vm/) interpreter. The emitter manages stack depth, closure capture, and frame reuse for tail calls.\n\n5. **Serialization** (`pkg/bytecode/encoder.go`): Bytecode, constants, and metadata are encoded to binary format. Constants include scalars, persistent collections, symbols, and function closures; they are interned to a shared constant pool. The serialized form is a `.lgb` module file.\n\n## Invocation Paths\n\n**`lg -c app.lgb app.lg`**: Compile source to bytecode  \nReads the source file, runs the full pipeline, and writes a `.lgb` file. This bytecode can be run standalone without recompilation: `lg app.lgb`.\n\n**`lg -b myapp app.lg`**: Bundle into a standalone binary  \nCompiles to bytecode as above, then appends the bytecode (and resource files) to a copy of the `lg` executable using a trailer format. The binary is self-contained and runs anywhere. Trailer versions (legacy, v2 with resources, v3 with storage IDs) are in `pkg/bundle/bundle.go`.\n\n**`lg -w site app.lg`**: Compile to a self-contained WASM web app  \nCompiles to bytecode and bundles it into a `index.html` file. The WASM blob is inlined and gzipped (~6MB). A service worker handles COOP/COEP headers for SharedArrayBuffer. Programs using the `term` namespace get xterm.js terminal emulation. Run via `open site/index.html` in the browser.\n\n**`lg app.lg`**: Direct evaluation  \nSource is compiled in-memory and executed immediately in the VM. REPL compilation follows the same pipeline.\n\n# Citations\n\n[1] **pkg/compiler**: Reader, compilation context, and source evaluation  \nhttps://github.com/nooga/let-go/tree/main/pkg/compiler\n\n[2] **pkg/bytecode**: Encoder/decoder, module serialization, `.lgb` format  \nhttps://github.com/nooga/let-go/tree/main/pkg/bytecode\n\n[3] **pkg/bundle**: Standalone binary and WASM bundling  \nhttps://github.com/nooga/let-go/tree/main/pkg/bundle\n\n[4] **docs/guide/usage.md**: Compilation flags and build modes  \nhttps://github.com/nooga/let-go/blob/main/docs/guide/usage.md\n\n[5] **Indexed-RPN IR** (this wiki)  \n[indexed-rpn-ir.md](concepts/indexed-rpn-ir/)\n\n[6] **Stack VM** (this wiki)  \n[stack-vm.md](concepts/stack-vm/)\n\n---\n\nSee also: [let-go](entities/let-go/)\n", "concepts/go-interop": "\n# Go Interop\n\nlet-go provides two-way interoperability with Go: embed let-go as a scripting layer in Go programs, call Go functions from let-go code, pass Go structs as records, and share channels between systems. The interop layer uses Go reflection and type registration to bridge the two runtimes seamlessly.\n\n## Embedding let-go in Go\n\nUse `pkg/api.NewLetGo` to create a let-go runtime instance, define Go values as let-go variables, and execute let-go code:\n\n```go\nimport \"github.com/nooga/let-go/pkg/api\"\n\nc, _ := api.NewLetGo(\"myapp\")\n\n// Define Go functions and values\nc.Def(\"greet\", func(name string) string {\n    return \"Hello, \" + name\n})\nc.Def(\"x\", 42)\n\n// Execute let-go code against these definitions\nv, _ := c.Run(`(greet \"world\")`)  // => \"Hello, world\"\nv, _ := c.Run(`(+ x 8)`)           // => 50\n```\n\nEach `LetGo` instance has its own namespace (`\"myapp\"`), constant pool, and compiler context. Multiple instances can run concurrently in different goroutines (with caveats; see below).\n\n## Go Functions as let-go Functions\n\nGo functions passed via `Def` are wrapped as let-go native functions. They are callable using the normal invocation syntax:\n\n```clojure\n(defn compute [a b]\n  (my-fn a b))\n\n(my-fn 10 20)\n```\n\nThe let-go runtime uses Go reflection to:\n- Inspect the function signature (arity, parameter types)\n- Convert let-go arguments to Go types on the call\n- Box the Go result back to a let-go `Value`\n\nType conversions follow these rules:\n- Numeric types (`int`, `float64`, `int64`, etc.) convert bidirectionally\n- Strings convert to/from let-go strings\n- Slices of `T` convert to/from let-go sequences; lazy seqs are realized automatically\n- Maps convert to/from let-go maps (keyed by string or keyword)\n\n## Go Structs as Records\n\nRegister a Go struct type once, then pass instances to let-go and work with them as records:\n\n```go\ntype Item struct {\n    Name  string\n    Price float64\n    Qty   int\n}\n\nvm.RegisterStruct[Item](\"myapp/Item\")\n\nc.Def(\"item\", Item{Name: \"Widget\", Price: 9.99, Qty: 5})\n```\n\nIn let-go:\n```clojure\n(:name item)           ; => \"Widget\"\n(:price item)          ; => 9.99\n(assoc item :qty 10)   ; => new record with Qty=10\n(count item)           ; => 3 (field count)\n(contains? item :name) ; => true\n```\n\n**Unmutated roundtrip**: When a struct is passed to let-go and returned unchanged, it is unboxed directly via `Unbox()` (fast path).\n\n**Mutated roundtrip**: When a struct is modified in let-go (e.g., via `assoc`), the resulting record is reconstructed back to Go via `vm.ToStruct[T]` on the Go side:\n\n```go\nv, _ := c.Run(`(assoc item :qty 10)`)\nmutated, _ := vm.ToStruct[Item](v.(*vm.Record))\nfmt.Println(mutated.Qty) // 10\n```\n\n## Go Channels as let-go Channels\n\nGo channels and let-go channels are mutually transparent. Define a channel in Go and use it in let-go's `go` / `<!` / `>!`:\n\n```go\ninch := make(chan int)\noutch := make(vm.Chan)\nc.Def(\"in\", inch)\nc.Def(\"out\", outch)\n\nc.Run(`\n  (go (loop [i (<! in)]\n        (when i\n          (>! out (inc i))\n          (recur (<! in)))))\n`)\n\ngo func() {\n    for i := range 10 {\n        inch <- i\n    }\n    close(inch)\n}()\n\nfor v := range outch {\n    fmt.Println(v)  // 1, 2, 3, ..., 10\n}\n```\n\nChannels are first-class in let-go's `core.async` and integrate naturally with goroutines spawned by `go` blocks.\n\n## I/O Customization\n\nThe `pkg/api` Options pattern allows embedders to customize I/O and runtime behavior per instance:\n\n- `WithStdout(w)` / `WithStderr(w)`: Route output to custom writers (capture, logging, etc.)\n- `WithEmit(fn)`: Handle `(js/emit event-name data)` calls from guest code\n- `WithKeySource(ks)`: Supply keyboard input for terminal programs without a real terminal\n- `WithStorage(store)`: Provide backend storage for `(storage/...)` calls\n\nEach option is pushed as a dynamic binding during `Run()` and popped afterward. This allows different embedder instances to have different I/O routing without global state.\n\n### Concurrency Caveat\n\nlet-go's `Var` bindings are stored in a process-global binding stack. If two goroutines call `Run` on different `LetGo` instances concurrently, their I/O bindings will interleave on the same stack. For deterministic isolation, serialize `Run` calls or run instances in separate processes.\n\n## lginterop Code Generator\n\nFor large Go packages, hand-wrapping every function and struct is tedious. The `lginterop` tool generates let-go bindings from Go source:\n\n```\nlginterop -pkg mypackage -output mypackage.lg\n```\n\nThis produces a `.lg` file with wrapped functions and struct registrations, reducing boilerplate.\n\n# Citations\n\n[1] **pkg/api** \u2014 embedding API and options  \nhttps://github.com/nooga/let-go/tree/main/pkg/api\n\n[2] **pkg/api/interop_test.go** \u2014 comprehensive interop examples  \nhttps://github.com/nooga/let-go/blob/main/pkg/api/interop_test.go\n\n[3] **docs/guide/embedding-in-go.md** \u2014 embedding guide  \nhttps://github.com/nooga/let-go/blob/main/docs/guide/embedding-in-go.md\n\n[4] **pkg/vm** \u2014 type registration and struct roundtripping  \nhttps://github.com/nooga/let-go/tree/main/pkg/vm\n\n[5] **README.md** \u2014 interop overview  \nhttps://github.com/nooga/let-go#embedding-in-go\n\n---\n\nSee also: [let-go](entities/let-go/), [Stack VM](concepts/stack-vm/)\n", "concepts/indexed-rpn-ir": "\n# Indexed-RPN IR\n\nThe let-go compiler generates an intermediate representation using **indexed reverse Polish notation (RPN)** \u2014 a postfix encoding where a value's identity is determined by its position (index) on the RPN evaluation stack. This is an SSA-equivalent form: each value flows exactly once from producer to consumer, enabling program analysis without resorting to explicit SSA renaming. Control flow is managed through **block parameters**, which provide an SSA-style channel for values crossing block boundaries. Together, indexed-RPN encoding and block-parameter control flow form a compact, analyzable IR suitable for bytecode generation and Go code emission.\n\n## Encoding\n\nIndexed-RPN encodes computation as a sequence of operations that work on an implicit postfix stack during a single linear walk. Each operation pops a fixed number of operand values (its **stack-in** arity) and pushes either zero or one result value. A value's identity is its **position** \u2014 the index of the instruction that produced it \u2014 not an explicit name. This indexing scheme gives indexed-RPN its SSA-equivalence: the producer of a value is implicit (the defining instruction), and consumers simply reference the index.\n\nEach operation in let-go's IR is catalogued in `pkg/ir/ir_ops.lg` and generated into `pkg/ir/op_generated.go`. The catalogue defines four properties per operation:\n\n- **`name`** \u2014 human-readable operation kind (e.g., `Add`, `Call`, `Return`)\n- **`stackIn`** \u2014 number of operand values popped from the stack (or `-1` for variable arity)\n- **`stackOut`** \u2014 number of result values pushed (0 or 1)\n- **`pure`** \u2014 boolean flag controlling whether this operation is eligible for common subexpression elimination (CSE), constant folding, or loop hoisting\n\n### Representative Operations\n\n**OpConst** (stack-in: 0, stack-out: 1, pure: true)  \nPushes a constant value. The constant itself is stored in the operation's `Aux` field as a `vm.Value`. Lowering materializes it as `OP_LOAD_CONST` with an interned pool index.\n\n**OpAdd, OpSub, OpMul** (stack-in: 2, stack-out: 1, pure: true)  \nBinary arithmetic operations. Pop two operands from the stack, push their computed result. Marked `pure` so optimization passes may fold constant operands, hoist invariant arithmetic out of loops, or eliminate redundant computations via CSE.\n\n**OpCall** (stack-in: -1, stack-out: 1, pure: false)  \nInvokes a function with a variable number of arguments. The function operand and arguments are in `Refs`; the arity is in `Aux`. Marked not pure (side-effecting), so optimization passes will not eliminate or relocate calls.\n\n**OpReturn, OpBranch, OpBranchIf** (stack-out: 0, terminator: true)  \nControl-flow operations that end basic blocks. `OpReturn` pops a value and exits the function; `OpBranch` and `OpBranchIf` direct control to successor blocks (potentially with arguments).\n\n## Block-Parameter Control Flow\n\nWhile indexed-RPN encoding provides value numbering within a block, **block parameters** handle values that cross block boundaries. When a block is branched into, its entry parameters receive values from the predecessor's branch arguments. This mirrors SSA \u03c6 functions but is expressed structurally: a block's parameter list is a sequence of entry points, each bound to an argument passed by a branching predecessor.\n\nIn contrast to the indexed-RPN encoding (where producers and consumers are in the same linear sequence), block parameters create a distinct channel: a value produced in block A may flow to block B via a branch with arguments, where it is bound as a parameter in B's entry sequence and accessed via `OpBlockArg`. This design cleanly separates **intra-block computation** (indexed RPN) from **inter-block value flow** (block parameters), both grounded in SSA principles but avoiding the explicit renaming overhead of full SSA.\n\n## Citations\n\n[1] **Burak Emir, \"Indexed Reverse Polish Notation\"**  \nhttps://burakemir.ch  \nThe foundational design for positional value numbering in postfix form.\n\n[2] **Carbon Language Semantic IR**  \nhttps://github.com/carbon-language/carbon-lang/tree/trunk/toolchain/sem_ir  \nA reference implementation of block-parameter SSA.\n\n[3] **Swift SIL, Cranelift, MLIR**  \nAll employ block-parameter control flow for cross-block SSA-style value threading.\n\n[4] **let-go IR source (op catalogue)**  \n[pkg/ir/ir_ops.lg](https://github.com/nooga/let-go/blob/main/pkg/ir/ir_ops.lg) \u2014 the operations are defined here (in let-go), and generated into `pkg/ir/op_generated.go` (which carries the design-references header).\n\n---\n\nSee also: [Stack VM](concepts/stack-vm/), [let-go](entities/let-go/)\n", "concepts/ir-pipeline": "\n# IR Pipeline\n\nlet-go's intermediate representation (IR) sits between the source compiler and the bytecode VM. It is an SSA-equivalent form with block-parameter-style control flow, and **the entire IR framework is written in let-go**\u2014demonstrating the language's capability for meta-programming and compiler construction.\n\nThe pipeline transforms source forms through IR stages, applies optimizations, and emits bytecode. Go provides only a small substrate (op table, chunk emission, value constructors) via bridge primitives in the `ir/` namespace; all algorithms and data structures live in Lisp.\n\n## Pipeline Overview\n\n```\n    forms\n      \u2502\n      \u25bc\nir.build/build-fn  \u2500\u2500\u25ba  Lisp-atom IR Function  \u2500\u2500\u25ba  ir.passes.pipeline/optimize-fn\n                                                           \u2502\n                                                           \u25bc\n                                                    optimized IR Function\n                                                           \u2502\n                                                           \u25bc\n                                                      ir.lower/lower\n                                                           \u2502\n                                                           \u25bc\n                                                     vm.CodeChunk (bytecode)\n```\n\n## Architecture\n\nThe IR framework spans multiple let-go files in `pkg/rt/core/ir/`:\n\n| File | Role |\n|------|------|\n| `data.lg` | IR data layer: Function/Block/Inst atom shape, constructors, structural mutators, def\u2192use cache |\n| `data/generated.lg` | Mechanical field accessors (generated from Go spec) |\n| `zipper.lg` | Fn-scoped cursor over instructions in block-order |\n| `build.lg` | `ir.build/build-fn` \u2014 transforms source Lisp form to IR Function |\n| `dump.lg` | Text dump for debugging |\n| `dominance.lg` | Cooper/Harvey/Kennedy immediate-dominator analysis |\n| `lower.lg` | IR \u2192 bytecode via chunk-emission bridge primitives |\n| `passes.lg` | `defpass` DSL; binds `*current-fn*`, `*current-inst*`, `*current-zip*` |\n| `passes/dce.lg` | Dead-code elimination |\n| `passes/constfold.lg` | Constant folding + algebraic identities + commutative canonicalization |\n| `passes/cse.lg` | Per-block common-subexpression elimination |\n| `passes/licm.lg` | Loop-invariant code motion |\n| `passes/thread-block-args.lg` | Pre-lower fixup for cross-block direct refs |\n| `passes/typeinfer.lg` | Abstract-interpretation type inference |\n| `passes/pipeline.lg` | Orchestrates passes; defines `compile-form` (end-to-end entry point) |\n\n## Compilation Pipeline\n\n**Step 1: Build**\n\n```clojure\n(ir.build/build-fn '(defn add [a b] (+ a b)))\n; => Lisp atom with :name :arity :entry :blocks :insts :consts fields\n```\n\nThe builder lowers Clojure forms into IR primitives: constants, block arguments, arithmetic ops, calls, and control-flow terminators.\n\n**Step 2: Optimize**\n\n```clojure\n(ir.passes.pipeline/optimize-fn f)\n; Applies: dce, constfold, cse, licm, typeinfer, thread-block-args in sequence\n; Returns: optimized IR Function (same atom)\n```\n\nEach pass is defined with the `defpass` DSL, which binds a cursor over instructions and provides helpers like `replace-refs!`, `replace-aux!`, and `remove!`. Passes run in a fixed order, with some iterating until a fixed point.\n\n**Step 3: Lower**\n\n```clojure\n(ir.lower/lower f)\n; => boxed *vm.CodeChunk (bytecode)\n```\n\nLowers the optimized IR to stack-machine bytecode via chunk-emission primitives (`ir/chunk-emit`, `ir/chunk-emit-with-arg`, etc.).\n\n## Passes (via defpass DSL)\n\nEach pass is a let-go function using the `defpass` macro:\n\n```clojure\n(defpass my-pass\n  \"Brief description.\"\n  [inst]  ; binds inst to the current InstId\n  (let [f  ir.passes/*current-fn*\n        op (ir/op inst f)]\n    (when (= op :add)\n      ;; mutate or replace the current inst\n      )))\n```\n\nThe `defpass` macro binds:\n- `*current-fn*` \u2014 the IR Function being optimized\n- `*current-inst*` \u2014 the instruction ID\n- `*current-zip*` \u2014 cursor for in-order block traversal\n\nHelpers available:\n- `replace-refs!` \u2014 change operand references\n- `replace-aux!` \u2014 change auxiliary data\n- `remove!` \u2014 delete the instruction\n\nBuilt-in passes include:\n\n- **DCE** \u2014 Remove unused instructions (marked non-pure, or with no consumers)\n- **Constant Folding** \u2014 Evaluate pure ops with constant operands at compile time\n- **CSE** \u2014 Eliminate redundant subexpressions within a block\n- **LICM** \u2014 Hoist loop-invariant computations using dominance analysis\n- **Type Inference** \u2014 Abstract-interpret types to guide dispatch decisions\n- **Thread Block Args** \u2014 Pre-lower fixup to handle cross-block references\n\n## IR Data Model\n\nAn IR Function is a Lisp atom:\n\n```clojure\n(ir/fn-name f)          ; => symbol\n(ir/fn-arity f)         ; => int\n(ir/fn-variadic? f)     ; => bool\n(ir/fn-entry f)         ; => block-id (entry block)\n(ir/fn-blocks f)        ; => vector of block-ids\n(ir/block-insts bid f)  ; => vector of instruction-ids in order\n(ir/block-term bid f)   ; => terminator instruction-id\n```\n\nNever reach into `@f` directly; use the accessor functions\u2014they maintain abstraction and enable future optimizations.\n\n## Extension: Adding an Optimization Pass\n\nCreate a new pass file, e.g., `passes/my-optimization.lg`:\n\n```clojure\n(ns ir.passes.my-optimization\n  (:require [ir.passes :refer [defpass replace-refs!]]))\n\n(defpass my-optimization\n  \"My new optimization.\"\n  [inst]\n  (let [f  ir.passes/*current-fn*\n        op (ir/op inst f)]\n    (when (some-condition? op)\n      (replace-refs! [new-ref1 new-ref2]))))\n```\n\nThen add it to `passes/pipeline.lg`:\n\n```clojure\n(defn optimize-fn [f]\n  ...\n  (my-optimization f)\n  ...\n  f)\n```\n\nWire it into the runtime bundle via `pkg/rt/irpasses.go` and `cmd/lgbgen/main.go`.\n\n## Bridge Primitives (Go \u2194 Lisp)\n\nGo provides only the op-table queries and chunk-emission primitives:\n\n- **Op Table**: `ir/op-terminator?`, `ir/op-pure?`, `ir/op-cheap-load?`, `ir/op-stack-out`\n- **Chunk Emission**: `ir/chunk-emit`, `ir/chunk-emit-with-arg`, `ir/chunk-update!`, `ir/chunk-length`, `ir/chunk-max-stack!`\n- **Value Constructors**: `ir/new-fn`, `ir/new-block`, `ir/new-inst`\n\nEverything else (data structures, passes, analysis) is implemented in Lisp.\n\n## Loading Order\n\nThe IR layer's load-time dance is normally invisible but worth knowing:\n\n- `data.lg` is **not** in the precompiled bundle; it loads from source. The intern block at the bottom needs live function values to register accessors.\n- `ir.build` declares `(:require ir.data)`, so loading build automatically triggers data's source load.\n- At precompile time (`lgbgen`), `data.lg` is bootstrapped first so downstream namespaces can resolve `ir/*` symbols.\n\nIf you see \"nil is not a function\" errors during compilation, the most likely cause is that `data.lg` didn't finish loading before the caller compiled. Add `ir.data` to a `:require` clause or load it explicitly.\n\n## Citations\n\n[1] **IR framework README**  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/ir/README.md\n\n[2] **ir/ source code** (let-go implementations)  \nhttps://github.com/nooga/let-go/tree/main/pkg/rt/core/ir\n\n[3] **ir/lower_go.lg** \u2014 IR \u2192 Go AST lowering (for AOT compilation)  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/ir/lower_go.lg\n\n[4] **Indexed-RPN IR** (this wiki)  \n[indexed-rpn-ir.md](concepts/indexed-rpn-ir/)\n\n[5] **Bytecode Compiler** (this wiki)  \n[bytecode-compiler.md](concepts/bytecode-compiler/)\n\n[6] **Stack VM** (this wiki)  \n[stack-vm.md](concepts/stack-vm/)\n\n[7] **let-go** (this wiki)  \n[../entities/let-go.md](entities/let-go/)\n\n---\n\nSee also: [Indexed-RPN IR](concepts/indexed-rpn-ir/), [Bytecode Compiler](concepts/bytecode-compiler/), [Stack VM](concepts/stack-vm/), [let-go](entities/let-go/)\n", "concepts/lg-compile": "\n# lg-compile\n\n`lg-compile` is a let-go script that AOT-compiles a set of `.lg` source files into Go packages. Unlike the standard bytecode compiler (which produces `.lgb` files or standalone binaries), `lg-compile` generates a tree of `.go` files with **direct inter-package function calls** (`pkg.Fn(ec, ...)` in Go) instead of runtime trampoline indirection.\n\nThis is useful for embedding let-go-authored code as native Go libraries, reusing let-go logic from Go programs, or compiling multi-file let-go projects to a Go package hierarchy.\n\n## Usage\n\n```bash\n./lg scripts/lg-compile <out-dir> <import-prefix> <file.lg>...\n```\n\n**Parameters:**\n\n- `<out-dir>` \u2014 output directory for the generated Go package tree\n- `<import-prefix>` \u2014 Go import path prefix (each package is `<import-prefix>/<reldir>`)\n- `<file.lg>...` \u2014 one or more `.lg` files to compile\n\n**Example:**\n\n```bash\n./lg scripts/lg-compile /tmp/out github.com/example/generated-api \\\n  api/core.lg api/handlers.lg\n```\n\nEach `.lg` file's namespace becomes a Go package under `<out-dir>`. For example:\n\n- `api/core.lg` (ns `api.core`) \u2192 `<out-dir>/api/core/core.go` (package `core`)\n- `api/handlers.lg` (ns `api.handlers`) \u2192 `<out-dir>/api/handlers/handlers.go` (package `handlers`)\n\nThe generated Go packages are importable:\n\n```go\nimport \"github.com/example/generated-api/api/core\"\n\n// Call compiled let-go functions directly\nresult, err := core.MyFunction(ec, arg1, arg2)\n```\n\n## Compile Paths Comparison\n\n| Path | Command | Output | Use Case |\n|------|---------|--------|----------|\n| **Bytecode** | `lg -c app.lgb app.lg` | `.lgb` (binary module) | Distribute bytecode, run with `lg app.lgb` |\n| **Standalone binary** | `lg -b myapp app.lg` | Self-contained executable | Single-file distribution, no let-go runtime needed |\n| **WASM** | `lg -w site app.lg` | `index.html` (~6MB, embedded bytecode + WASM) | Web apps, browser deployment |\n| **Go package** | `lg scripts/lg-compile <out> <prefix> app.lg` | `.go` package tree | Embed in Go programs, direct function calls |\n\n## How It Works\n\n`lg-compile` (a let-go script) orchestrates the full-program lowering pipeline:\n\n1. **Parse** each `.lg` file into source forms\n2. **Intern** all namespaces (so cross-namespace symbol resolution works)\n3. **Compile** each form through the standard IR pipeline (`ir.passes.pipeline/compile-form`)\n4. **Lower to Go AST** using `ir.lower-go/lower` (converting IR to Go code)\n5. **Emit `.go` files** organized by namespace/package, with:\n   - Go function stubs for each let-go defn (accepting `*ExecutionContext` as first argument)\n   - Direct inter-package calls where both functions are in the generated tree\n   - Fallback trampolines for functions not eligible for direct calls (e.g., variadic functions)\n   - Necessary imports and Go build scaffolding\n\nThe generated code is valid Go that can be imported and linked into any Go program. Functions accept an `*ExecutionContext` (runtime state) and return `(vm.Value, error)`.\n\n## Cross-Package Calls\n\nWhen function A (in package `api.core`) calls function B (also in the generated tree, in package `api.handlers`), `lg-compile` emits a direct Go call:\n\n```go\nresult, err := handlers.MyFunction(ec, arg1, arg2)  // direct call, not trampoline\n```\n\nThis avoids runtime Var lookups and enables inlining by Go's compiler. Functions not eligible for direct calls (e.g., variadic) fall back to cached-var trampolines at runtime.\n\n## Citations\n\n[1] **lg-compile** \u2014 AOT compiler to Go packages (let-go script)  \nhttps://github.com/nooga/let-go/blob/main/scripts/lg-compile\n\n[2] **ir.lower-go** \u2014 IR \u2192 Go AST lowering (let-go module)  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/ir/lower_go.lg\n\n[3] **Bytecode Compiler** (this wiki)  \n[bytecode-compiler.md](concepts/bytecode-compiler/)\n\n[4] **WASM Compilation** (this wiki)  \n[wasm-compilation.md](concepts/wasm-compilation/)\n\n[5] **let-go** (this wiki)  \n[../entities/let-go.md](entities/let-go/)\n\n---\n\nSee also: [Bytecode Compiler](concepts/bytecode-compiler/), [WASM Compilation](concepts/wasm-compilation/), [let-go](entities/let-go/)\n", "concepts/lginterop": "\n# lginterop\n\n`lginterop` is a code generator that wraps Go packages so their functions become callable from let-go. Given a Go package path, it inspects the package's public exports and generates a `.go` file with:\n\n1. **Type-aware wrapper functions** for each exported function (converting let-go values to Go types and back)\n2. **Struct registrations** for exported types\n3. **An installer function** that registers everything on a let-go namespace at runtime\n\nThis eliminates hand-wrapping boilerplate when integrating external Go libraries into let-go programs.\n\n## Usage\n\nGenerate interop bindings for a Go package:\n\n```bash\n./lg scripts/lginterop -packages github.com/zeebo/xxh3\n```\n\nThis generates a file (typically named after the package) with wrapper functions and an `install` function. The wrapper is added to the let-go build, and functions become available:\n\n```clojure\n(require '[hash])\n\n(hash/xxh3-64 (byte-array [1 2 3]))  ; => uint64 hash value\n```\n\nUnder the hood, the let-go program calls into wrapped Go functions like `xxh3/Hash`:\n\n```clojure\n(def xxh3-64 xxh3/Hash)  ; wrapper function from lginterop output\n```\n\n## How it Works\n\n**lginterop** (`scripts/lginterop.lg`) is itself a let-go program that:\n\n1. **Reflects over Go packages** using the `go/ast` and `go/types` facilities (bridged from Go)\n2. **Catalogs exports** into a compact vector format:\n   ```clojure\n   [:func \"Hash\" [] [\"[]uint8\" \"uint64\"] false]  ; name, type-params, params, results, variadic?\n   ```\n3. **Generates Go code** using the `gogen` library to emit wrapper functions with type conversions, struct registrations, and an installer\n\nThe generated `.go` file contains:\n\n- **Wrapper functions** (`wrapXxh3Hash`, etc.) that:\n  - Unbox let-go `Value` arguments to Go types (strings \u2192 `string`, numbers \u2192 `int64`, etc.)\n  - Call the original Go function\n  - Box the Go return value back to a let-go `Value`\n\n- **Struct registration** (for types matching let-go's record protocol) using `vm.RegisterStruct`\n\n- **An installer function** (`InstallXxh3`, etc.) that:\n  - Creates a new let-go namespace (e.g., `\"xxh3\"`)\n  - Defines each wrapper function on the namespace\n  - Registers structs\n  - Calls `RegisterNS` to wire it into the runtime\n\nAt runtime, calling `(xxh3/Hash bytes)` from let-go invokes the wrapper, which converts bytes to Go `[]uint8`, calls the real `Hash`, and returns the result as a let-go number.\n\n## Smart Wrappers\n\nWhen all a function's parameters and results are simple types (`string`, `int`, `float64`, `bool`, `error`, or `interface{}`), lginterop can generate a \"smart wrapper\" that uses `vm.NativeFnType` \u2014 a fast-path specialization bypassing reflection at call time.\n\n## Citations\n\n[1] **lginterop** \u2014 Go package interop code generator (let-go script)  \nhttps://github.com/nooga/let-go/blob/main/scripts/lginterop.lg\n\n[2] **interop_xxh3.go** \u2014 generated example (xxh3 package wrapping)  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/interop_xxh3.go\n\n[3] **hash.lg** \u2014 user-facing API wrapping lginterop-generated functions  \nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/hash.lg\n\n[4] **Go Interop** (this wiki)  \n[go-interop.md](concepts/go-interop/)\n\n---\n\nSee also: [Go Interop](concepts/go-interop/), [let-go](entities/let-go/)\n", "concepts/stack-vm": "\n# Stack VM\n\nThe let-go compiler emits bytecode that runs on a stack-based virtual machine.\nValues are pushed and popped from an operand stack; instructions operate on the\ntop of the stack. This is the execution substrate for [let-go](entities/let-go/)\nprograms after compilation.\n\n> status: speculative \u2014 verify details against `pkg/vm` before promoting to stable.\n\n# Citations\n\n[1] [pkg/vm](https://github.com/nooga/let-go/tree/main/pkg/vm)\n", "concepts/wasm-compilation": "\n# WASM Compilation\n\nlet-go compiles itself to WebAssembly, enabling programs to run in the browser from the same source as native binaries. A single `lg -w site app.lg` command produces a self-contained `index.html` file (~6MB, inlined and gzipped) that boots the let-go runtime and your bytecode in ~10ms\u2014well within a 60fps frame budget at 16ms per frame.\n\n## Build Process\n\n**Source \u2192 Bytecode \u2192 WASM Bundle**\n\n1. **Bytecode Compilation**: Source is compiled to bytecode using the standard [bytecode compiler](concepts/bytecode-compiler/) pipeline. The `.lgb` module is generated in-memory.\n\n2. **WASM Bundling** (`pkg/bundle`): The bytecode is embedded into the WASM blob. Resource files (templates, assets) specified by `-resource-paths` are collected and archived alongside the bytecode using the bundle trailer format.\n\n3. **HTML Generation**: The WASM binary (inlined and gzipped), the bytecode, and a `LetGoHost` JavaScript harness are embedded into a single `index.html` file. No external assets are required; the page is self-contained and can be copied anywhere (including served from GitHub Pages).\n\n4. **Service Worker**: A service worker is included to provide COOP/COEP headers needed for SharedArrayBuffer support (required by the let-go runtime for goroutines and channels). The service worker intercepts fetch requests transparently.\n\n## Runtime Environment\n\nWhen `index.html` loads, it:\n\n1. **Starts during `requestAnimationFrame`** (~10ms available at 60fps): The Go runtime boots, initializes the let-go VM, and loads the embedded bytecode. This tiny budget is why startup must be fast \u2014 the WASM runtime footprint is ~6MB compressed, but boot + init is designed to finish in milliseconds.\n\n2. **Initializes the VM**: The let-go stack VM (`pkg/vm`) comes up inside WASM. The bytecode is decoded and registered as functions. Core library (persistent data structures, `core.async`, etc.) is available via precompiled image or embedded bytecode.\n\n3. **Provides Terminal Emulation** (for `term`-using programs): The browser page includes xterm.js for full terminal emulation\u2014ANSI colors, cursor positioning, raw keyboard input, and screen clearing. Calls to `(term/...)` functions interact with the emulated terminal, not the browser console.\n\n4. **Sets up JavaScript Interop**: A global `Eval` function is exposed to JavaScript, allowing the browser to eval let-go code:\n   ```js\n   window.Eval(\"(+ 1 2)\") // returns \"3\"\n   ```\n   This enables live coding in the browser REPL and embedding let-go snippets in web pages.\n\n## Example: Roguelike Game\n\n[xsofy](https://github.com/nooga/xsofy) is a roguelike written in let-go that compiles to both native (terminal) and WASM (browser) from the same source. Run `lg -w www game.lg` and open `www/index.html` in your browser. The game window is a terminal emulation; all game logic runs in let-go bytecode inside the WASM VM.\n\n## Compile-Time Predicates\n\nPrograms can branch on compilation target:\n- `*compiling-aot*` is `true` during `-w` compilation; `false` at runtime (useful for skipping side effects at compile time).\n- `*in-wasm*` is `true` when running inside a WASM build; `false` for native.\n\nUse `:lg` reader conditionals to guard WASM-only or native-only code:\n```clojure\n#?(:lg (require '[let-go.wasm :as wasm]))  ; only when compiling for WASM\n```\n\n# Citations\n\n[1] **wasm/** \u2014 WASM entry point and build orchestration  \nhttps://github.com/nooga/let-go/tree/main/wasm\n\n[2] **pkg/bundle** \u2014 bytecode and resource bundling  \nhttps://github.com/nooga/let-go/tree/main/pkg/bundle\n\n[3] **docs/guide/usage.md** \u2014 `lg -w` build mode  \nhttps://github.com/nooga/let-go/blob/main/docs/guide/usage.md\n\n[4] **README.md** \u2014 WASM web apps description  \nhttps://github.com/nooga/let-go#wasm-web-apps\n\n[5] **xsofy** \u2014 roguelike example  \nhttps://github.com/nooga/xsofy\n\n[6] **Bytecode Compiler** (this wiki)  \n[bytecode-compiler.md](concepts/bytecode-compiler/)\n\n[7] **Stack VM** (this wiki)  \n[stack-vm.md](concepts/stack-vm/)\n\n---\n\nSee also: [let-go](entities/let-go/)\n", "entities/let-go": "\n# let-go\n\nlet-go is a Clojure dialect implemented as a bytecode compiler and stack-based\nvirtual machine in Go. It produces a single ~12MB binary with ~8ms cold start,\nno JVM, and passes the jank-lang Clojure test suite. It supports AOT compilation\nto standalone binaries and self-contained WASM web pages, two-way Go interop, and\nmost of Clojure (persistent data structures, lazy seqs, transducers, protocols,\nrecords, multimethods, core.async, BigInts).\n\nSee the [stack VM](concepts/stack-vm/) for how compiled bytecode executes.\n\n# Citations\n\n[1] [let-go repository](https://github.com/nooga/let-go)\n", "projects/legmacs": "\n# legmacs\n\nlegmacs is a terminal text editor written entirely in [let-go](entities/let-go/), delivering Emacs-style editing in approximately 4,000 lines of Lisp code. The defining feature is that users configure and extend the editor using the same language that implements it\u2014no separate scripting API or plugin system exists.\n\n# Using let-go\n\nlegmacs demonstrates [let-go](entities/let-go/)'s suitability as both an implementation language and a user-facing scripting layer:\n\n- **Single-language stack** \u2014 implementation and configuration are indistinguishable; users modify behavior via `defcommand` and `bind-key!` functions identical to those the editor itself uses.\n- **In-process evaluation** \u2014 the editor includes a live REPL (`C-x C-e`, `C-j`) enabling real-time experimentation and configuration testing without restarting.\n- **Structural manipulation** \u2014 implements s-expression-aware editing (expand-region, kill-sexp) naturally in a Lisp-based editor where syntax and structure are unified.\n- **Compact footprint** \u2014 4,000 lines of let-go provide kill ring, regions, multi-buffer support, window splitting, syntax highlighting for 20+ languages, and extensible major/minor modes.\n\n# Idioms\n\n- **Homoiconicity as a feature** \u2014 because let-go code and let-go data are the same, configuration becomes a form of live programming; users don't \"configure an application\" but rather \"compose a program.\"\n- **Emacs idioms in let-go** \u2014 kill ring, regions, keymaps, and mode hierarchies (shadowing keymaps) translate directly from Emacs, showing how Lisp design patterns port cleanly across implementations.\n\n# Citations\n\n[1] [legmacs repository](https://github.com/nooga/legmacs)\n", "projects/let-go-lab": "\n# let-go-lab\n\nlet-go-lab is a collection of experimental projects exploring [let-go](entities/let-go/)'s capabilities for graphics, terminal UI, and WebAssembly. The flagship demo is an interactive Mandelbrot set visualization that renders via Sixel graphics in native terminals and via xterm.js in web browsers without any installation requirement.\n\n# Using let-go\n\nlet-go-lab showcases [let-go](entities/let-go/)'s versatility across rendering targets and interaction models:\n\n- **WASM compilation** \u2014 the Mandelbrot renderer compiles to self-contained WebAssembly, enabling real-time interactive graphics in a browser without JavaScript.\n- **Sixel graphics support** \u2014 leverages single-pass encoding to render fractals efficiently in terminal environments that support Sixel, bridging the gap between legacy terminals and modern graphical rendering.\n- **Cross-target deployment** \u2014 identical let-go code runs natively in terminals and compiles to WASM for browsers, eliminating the need for separate ports or JavaScript rewrites.\n- **Interactive I/O** \u2014 implements click/tap-to-recenter, keyboard pan/zoom, and iteration adjustment, demonstrating real-time interactivity in both terminal and browser contexts.\n\n# Idioms\n\n- **Sixel as a rendering substrate** \u2014 treating Sixel as a first-class rendering target rather than an afterthought shows how [let-go](entities/let-go/) can power tools that bridge terminal and graphical interfaces.\n- **WASM as a deployment target** \u2014 compiling graphics-heavy code to WASM keeps the implementation in a high-level language while maintaining performance in browser environments.\n\n# Citations\n\n[1] [let-go-lab repository](https://github.com/mparrett/let-go-lab)\n[2] [Mandelbrot demo (live browser)](https://mparrett.github.io/let-go-lab/)\n", "projects/lgcr": "\n# lgcr\n\nlgcr is a daemonless Linux container runtime written in [let-go](entities/let-go/), providing Docker-like command-line functionality while maintaining a remarkably compact codebase of approximately 3,000 lines. On Linux it bundles into a single executable; on macOS it acts as a native forwarder into a Lima VM, eliminating the need for wrapper scripts.\n\n# Using let-go\n\nlgcr demonstrates [let-go](entities/let-go/)'s capacity to implement systems-level programs with direct syscall access:\n\n- **Direct syscall bindings** \u2014 leverages [let-go](entities/let-go/)'s Go interop layer to bind Linux syscalls for namespace isolation, capability management, and filesystem operations without extra C code.\n- **Compact implementation** \u2014 3,000 lines of let-go code replace thousands of lines in traditional implementations, showing the language's expressiveness for low-level systems work.\n- **Single-executable deployment** \u2014 compiles to a standalone binary on Linux, simplifying distribution and eliminating runtime dependencies.\n- **Cross-platform abstraction** \u2014 the same codebase runs natively on Linux and as a forwarding client on macOS via Lima, demonstrating let-go's platform portability.\n\n# Idioms\n\n- **OCI registry integration** \u2014 lgcr pulls from Docker Hub and v2-compatible registries, implementing image authentication and partial blob resume without external libraries.\n- **Container lifecycle with init process** \u2014 manages PID 1 init process handling and signal forwarding, a critical systems-programming pattern that let-go handles cleanly via Go interop.\n\n# Citations\n\n[1] [lgcr repository](https://github.com/nooga/lgcr)\n", "projects/lgx": "\n# lgx\n\nlgx is a comprehensive project manager for [let-go](entities/let-go/) that unifies dependency management, task execution, testing, scaffolding, and REPL management into a single binary. Projects declare configuration in EDN format via `lgx.edn`, and lgx handles everything from fetching git-based dependencies to building standalone executables.\n\n# Using let-go\n\nlgx is the de facto build and dependency system for [let-go](entities/let-go/) projects, showcasing the language's practical ecosystem needs:\n\n- **EDN configuration** \u2014 projects express their structure in native let-go data literals (EDN), keeping configuration close to the language itself.\n- **Transitive dependency resolution** \u2014 implements breadth-first, first-wins dependency resolution with git URLs pinned by tag or SHA, avoiding the package manager bloat present in other ecosystems.\n- **Context-driven environments** \u2014 supports named overlays (`:dev`, `:test`) that apply environment-specific paths and dependencies automatically, enabling clean separation of development and production concerns.\n- **Integrated task system** \u2014 custom tasks combine shell commands and let-go invocations with typed positional arguments, REPL support, and reference binding.\n\n# Idioms\n\n- **Single binary, multiple roles** \u2014 lgx consolidates build, test, dependency, and task management without spawning external tools for each concern, reducing cognitive load and toolchain complexity.\n- **Git-native dependencies** \u2014 by using git repositories directly (with optional subdirectory paths) rather than a centralized registry, projects avoid package manager lock-in and can depend on unreleased work or internal repositories.\n\n# Citations\n\n[1] [lgx repository](https://github.com/abogoyavlensky/lgx)\n", "projects/xsofy": "\n# Xs of Y (xsofy)\n\nxsofy is a roguelike written in [let-go](entities/let-go/), notable because\nits magic system *is* a Lisp. Every run generates a new title (*Gazebos of\nMounting Dread*), a new quest (*retrieve the Spatula of Futility*), and a new set\nof rune mappings \u2014 the runes are secretly symbols, and spells are s-expressions.\nYou have root access to the dungeon's reality engine, but the man pages are in a\ndead language that changes every boot. The power curve is inverted: early game is\ndesperate survival, late game is applied theology. It runs\n[in the browser](https://nooga.github.io/xsofy/) and in the terminal from the\nsame source, and its main visual inspiration is\n[Brogue](https://sites.google.com/site/broguegame/).\n\n# Using let-go\n\nxsofy is a substantial real program \u2014 a complete game \u2014 which makes it a strong\n\"using let-go in anger\" case study. It leans on let-go's core properties:\n\n- **Persistent data structures all the way down** \u2014 the game state model is\n  built on immutable, structurally-shared collections.\n- **No dependencies** \u2014 the whole game is written against let-go and its standard\n  library, with no external packages.\n- **~6ms startup** \u2014 fast enough to boot inside a single frame.\n- **Same source, two targets** \u2014 compiled to self-contained **WASM** for the\n  browser and run **natively** in the terminal from the identical codebase.\n\n# Idioms\n\n- **Same-source browser + terminal via WASM.** Because let-go compiles to a\n  self-contained WASM page *and* runs natively, a single program ships to both a\n  web page and a terminal without a separate port \u2014 a repeatable pattern for\n  let-go apps.\n- **Data-as-code as a game mechanic.** Spells are s-expressions and runes are\n  symbols: the game exposes the language's own homoiconicity to the player,\n  using let-go values (symbols, lists) directly as the spell substrate rather\n  than inventing a separate scripting layer.\n\n# Citations\n\n[1] [xsofy repository](https://github.com/nooga/xsofy)\n[2] [Play xsofy in the browser](https://nooga.github.io/xsofy/)\n", "references/clojure.core/apply": "\n`apply` takes a function and a sequence of arguments, unpacking the sequence as the final arguments to the function. Use it when you have arguments collected in a list or vector and need to pass them to a function as individual parameters.\n\n# Signature\n\n```clojure\n(apply [f args] [f x args] [f x y args] [f x y z args] [f a b c d & args])\n```\n\n# Examples\n\n```clojure\n(apply + [1 2 3])\n;; => 6\n```\n\n```clojure\n(apply list 1 [2 3])\n;; => (1 2 3)\n```\n\n```clojure\n(apply str \"Hello\" [\" \" \"World\"])\n;; => \"Hello World\"\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/comp": "\nCreates a new [fn](references/clojure.core/fn/) from multiple functions such that the resulting function applies each function to the result of the previous one, working right-to-left. Useful for building complex transformations from simpler functions.\n\n# Signature\n\n```clojure\n(comp [] [f] [f g] [f g & fs])\n```\n\n# Examples\n\n```clojure\n((comp inc inc) 1)\n;; => 3\n```\n\n```clojure\n((comp #(* 2 %) inc) 3)\n;; => 8\n```\n\n```clojure\n((comp str +) 1 2)\n;; => \"3\"\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/defn": "\n`defn` defines a named function and binds it in the current namespace. Use it to create reusable functions that can be called by name throughout your program. It combines [fn](references/clojure.core/fn/) for function creation with binding to a name in the current scope.\n\n# Signature\n\n```clojure\n(defn name doc-string? [params*] body)\n(defn name doc-string? ([params*] body)+)\n```\n\n# Examples\n\n```clojure\n(do (defn square [x] (* x x)) (square 5))\n;; => 25\n```\n\n```clojure\n(do (defn add [x y] (+ x y)) (add 2 3))\n;; => 5\n```\n\n```clojure\n(do (defn greet [name] (str \"Hello, \" name \"!\")) (greet \"World\"))\n;; => \"Hello, World!\"\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/filter": "\nSelects elements from a collection based on a predicate [fn](references/clojure.core/fn/), returning a lazy sequence of only those elements for which the predicate returns a truthy value. Use filter when you need to retain only items matching specific criteria.\n\n# Signature\n\n```clojure\n(filter [pred] [f xs])\n```\n\n# Examples\n\n```clojure\n(filter even? [1 2 3 4 5])\n;; => (2 4)\n```\n\n```clojure\n(filter #(> % 2) [1 2 3 4])\n;; => (3 4)\n```\n\n```clojure\n(filter #(not (empty? %)) [\"\" \"hello\" \"\" \"world\"])\n;; => (\"hello\" \"world\")\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/fn": "\n`fn` creates an anonymous function or named function. Use it to define functions inline without assigning them to a name (useful for higher-order functions like [apply](references/clojure.core/apply/)), or define a named function for recursion. `fn` supports both single-arity and multi-arity definitions.\n\n# Signature\n\n```clojure\n(fn [params*] body)\n(fn name [params*] body)\n(fn ([params*] body) ([params*] body) ...)\n```\n\n# Examples\n\n```clojure\n((fn [x] (+ x 1)) 5)\n;; => 6\n```\n\n```clojure\n((fn [x y] (* x y)) 3 4)\n;; => 12\n```\n\n```clojure\n(let [adder (fn [x y] (+ x y))]\n  (adder 10 20))\n;; => 30\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/inc": "\nIncrements a number by adding 1 to it. A convenience [fn](references/clojure.core/fn/) commonly used with [map](references/clojure.core/map/) and other higher-order functions to transform sequences of numbers.\n\n# Signature\n\n```clojure\n(inc [x])\n```\n\n# Examples\n\n```clojure\n(inc 5)\n;; => 6\n```\n\n```clojure\n(map inc [1 2 3 4])\n;; => (2 3 4 5)\n```\n\n```clojure\n((comp inc inc) 10)\n;; => 12\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/let": "\n`let` creates a new lexical scope and binds symbols to values for use within that scope. Use it to define intermediate variables, break down complex expressions, or avoid repeating calculations.\n\n# Signature\n\n```clojure\n(let [bindings & body])\n```\n\n# Examples\n\n```clojure\n(let [x 5] (+ x 3))\n;; => 8\n```\n\n```clojure\n(let [a 2 b 3] (* a b))\n;; => 6\n```\n\n```clojure\n(let [x 10 y 20 sum (+ x y)] sum)\n;; => 30\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/map": "\nApplies a function to corresponding elements across one or more collections, returning a lazy sequence of results. When applied to a single collection, it transforms each element; when applied to multiple collections, it applies the [fn](references/clojure.core/fn/) to one element from each collection.\n\n# Signature\n\n```clojure\n(map [f] [f coll] [f c1 c2] [f c1 c2 & colls])\n```\n\n# Examples\n\n```clojure\n(map inc [1 2 3])\n;; => (2 3 4)\n```\n\n```clojure\n(map + [1 2] [10 20])\n;; => (11 22)\n```\n\n```clojure\n(map #(* % 2) [1 2 3 4 5])\n;; => (2 4 6 8 10)\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/mapv": "\nApplies a [fn](references/clojure.core/fn/) to elements of one or more collections, returning results as a vector rather than a lazy sequence. Use mapv when you need to eagerly realize all results immediately, such as when the result will be used multiple times or when side effects during evaluation matter.\n\n# Signature\n\n```clojure\n(mapv [f coll] [f c1 & colls])\n```\n\n# Examples\n\n```clojure\n(mapv inc [1 2 3])\n;; => [2 3 4]\n```\n\n```clojure\n(mapv + [1 2 3] [10 20 30])\n;; => [11 22 33]\n```\n\n```clojure\n(mapv #(* % 2) [1 2 3 4])\n;; => [2 4 6 8]\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/partial": "\nReturns a new [fn](references/clojure.core/fn/) with some arguments pre-filled, useful for creating specialized versions of existing functions. Partial application allows you to fix certain arguments and create reusable functions that accept the remaining arguments.\n\n# Signature\n\n```clojure\n(partial [f] [f arg1] [f arg1 arg2] [f arg1 arg2 arg3] [f arg1 arg2 arg3 & more])\n```\n\n# Examples\n\n```clojure\n((partial + 10) 5)\n;; => 15\n```\n\n```clojure\n((partial * 2 3) 4)\n;; => 24\n```\n\n```clojure\n(let [add10 (partial + 10)] (map add10 [1 2 3]))\n;; => (11 12 13)\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/when": "\n`when` is a conditional macro that evaluates its body only when the condition is truthy. Use it for single-branch conditionals where you want to execute side effects or return a value based on a condition, with nil as the implicit else case.\n\n# Signature\n\n```clojure\n(when test & body)\n```\n\n# Examples\n\n```clojure\n(when true 42)\n;; => 42\n```\n\n```clojure\n(when false 42)\n;; => nil\n```\n\n```clojure\n(let [x 5]\n  (when (> x 3)\n    (str \"x is greater than 3\")))\n;; => \"x is greater than 3\"\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n"}, "types": ["Concept", "Entity", "Function", "Macro", "Project"], "palette": {"Entity": "#b45309", "Concept": "#877a5e", "Reference": "#10b981", "Project": "#3b82f6", "Idea": "#8b5cf6", "Function": "#877a5e", "Macro": "#877a5e", "Namespace": "#b45309", "Package": "#3b82f6"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;

    // Add open-page link
    const titleContainer = document.querySelector(".detail-header");
    if (titleContainer) {
      const existingLink = titleContainer.querySelector(".open-page");
      if (existingLink) existingLink.remove();
      if (data.url) {
        const openPageLink = document.createElement("a");
        openPageLink.className = "open-page";
        openPageLink.href = data.url;
        openPageLink.target = "_top";
        openPageLink.textContent = "Open page ↗";
        titleContainer.appendChild(openPageLink);
      }
    }

    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      // For external links or rewritten MkDocs URLs (like "concepts/b/"),
      // set target="_top" so they navigate the whole window
      if (!href.startsWith("#")) {
        a.className = "external";
        if (!href.includes("://")) {
          // Rewritten internal URL (MkDocs format) - navigate away from graph
          a.setAttribute("target", "_top");
        } else {
          // External URL - open in new tab
          a.setAttribute("target", "_blank");
          a.setAttribute("rel", "noopener");
        }
      }
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
