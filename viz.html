 mutable-deftype work (dominant cost)\n  - Comprehensive tests\n  \n- **Generators/`:fn`/error formatting**: separate, deferred efforts\n\n## Why this matters\n\n- **Ecosystem reuse**: malli is battle-tested, maintained, and widely used in production Clojure.\n- **Data validation**: let-go can validate configurations, API schemas, and domain data without rolling custom.\n- **Honest port**: stock malli (zero forks) means upstream compatibility and low maintenance burden.\n- **Precedent for other libraries**: proof that Babashka-compatible libraries work on let-go; opens doors to plumatic/schema, spec-tools, and others.\n\n## Risks and mitigations\n\n- **Reader branches drift**: malli's `:bb` path could diverge from let-go needs. Mitigation: stay close to Babashka; upstream liaison if branch coverage gaps emerge.\n- **Mutable deftype complexity**: if letting let-go support mutable fields, must not break immutability guarantees for persistent collections. Mitigation: isolate to `^:unsynchronized-mutable` annotation; comprehensive tests.\n- **Performance**: regex engine is hot path. Mitigation: profile and optimize after core is working; Go-backed fallbacks available if needed.\n\n# Citations\n\n[1] **docs/superpowers/MALLI_PORT_ANALYSIS.md**: Feasibility analysis (local source)  \n/Users/ndn/development/let-go/docs/superpowers/MALLI_PORT_ANALYSIS.md\n\n[2] **docs/superpowers/specs/2026-05-30-malli-on-let-go-design.md**: Design document (local source)  \n/Users/ndn/development/let-go/docs/superpowers/specs/2026-05-30-malli-on-let-go-design.md\n\n[3] **metosin/malli**: GitHub repository  \nhttps://github.com/metosin/malli\n\n[4] **Babashka pods & reader** (this wiki)  \n[../concepts/pods.md](concepts/pods/)\n\n[5] **let-go** (this wiki)  \n[../entities/let-go.md](entities/let-go/)\n\n---\n\nSee also: [lginterop](concepts/lginterop/), [clojure-compat](references/clojure-compat/)\n", "ideas/master-plan-roadmap": "\n# let-go Master Roadmap\n\nThe master plan consolidates let-go's existing strategic initiatives into a single, sequenced roadmap: VM performance, Clojure-like collections, numeric and value representation, and runtime images. It defines 9 phases with staged milestones and success criteria to deliver the fastest and most useful Clojure-on-Go implementation.\n\n> **Note on authoritative sources:** This plan is marked `status: active` in its source document (master-plan.md). On direction questions \u2014 particularly the status of Phase 7 (Go AOT backend) \u2014 [contribution-policy.md](https://github.com/nooga/let-go/blob/main/docs/contribution-policy.md) is authoritative and supersedes this plan. Contribution-policy clarifies that Phase 7 is the committed deployment path (not optional), and establishes design contracts for interop, performance tracking, and the self-hosted compiler direction.\n\n## Vision and success criteria\n\nBy the end of this roadmap:\n\n- **Startup**: cold start with stdlib image < 50 ms on a typical laptop; warm start < 5 ms.\n- **Throughput**: 2\u20133x improvement on core functional pipelines (`map`/`filter`/`reduce`) over current baseline; zero-regression guardrails in CI.\n- **Allocation profile**: O(1) allocations for transducer-based pipelines over vectors and ranges; no unbounded retention from calling convention.\n- **Semantics**: Clojure-aligned collections and seq tower; structural equality and hashing; transients and transducers.\n- **Deployability**: precompiled stdlib image by default; app/runtime images supported and versioned; deterministic serialization.\n\n## Guiding principles\n\n- **Correctness first**: codify Clojure semantics via interfaces and tests before aggressive optimizations.\n- **Tight hot paths**: specialize VM call paths and numeric primitives; avoid reflection and unnecessary boxing.\n- **Incremental rollout**: adapters and compatibility layers to avoid big-bang rewrites; keep REPL usable throughout.\n- **Benchmark-driven**: every phase ships microbenchmarks and end-to-end scenarios, with perf budgets enforced in CI.\n\n## Phases overview\n\nThe roadmap is organized into nine phases, each with clear scope, dependencies, and acceptance criteria:\n\n### Phases 0\u20131: Foundations (semantics and VM optimization)\n\n**Phase 0** introduces core interfaces (`Equivable`, `Hashable`, `Indexed`, `Stack`, `IMapEntry`, `Reducible`, `Reduced`) and updates builtins to align with Clojure semantics (`seq` coercion, `nil` handling). It establishes the benchmark harness and CI performance gates.\n\n**Phase 1** fixes VM calling conventions: argument slice copies, tail-call optimization (including closures), frame/stack pooling, and small-arity opcodes (`INVOKE_0/1/2/3`, `TAIL_CALL_0/1/2/3`).\n\n### Phases 2\u20134: Collections and transduction\n\n**Phase 2** replaces vectors with a canonical 32-ary [BPTR persistent vector](concepts/indexed-rpn-ir/), adds transients, and switches the reader to produce persistent types. **Phase 3** implements persistent hash maps/sets (HAMT-based) with structural equality and hashing. **Phase 4** adds transducer APIs (`transduce`, `eduction`, `sequence`) and chunked sequences, enabling O(1) allocation for reduction pipelines.\n\n### Phases 5\u20136: Deployment and tooling\n\n**Phase 5** defines runtime image schema and versioning, implements serialization for values/code/vars, and pre-builds a `stdlib.img` for fast boot. **Phase 6** polishes nREPL, audits interop patterns, and ships WASM support with instant startup.\n\n### Phase 7: Go AOT backend (optional, high-impact)\n\nPhase 7 adds a **second backend** that compiles let-go code to Go (see [Self-hosting AOT](ideas/self-hosting-aot/)). It starts with an embedding tier (bytecode/consts as Go data in `Var`s), progresses to native lowering of hot functions, and preserves dynamic `eval` via shared `Var`s. This enables mixed compiled+interpreted execution and eliminates interpreter overhead.\n\n*Note: While this plan marks Phase 7 as optional, [contribution-policy.md](https://github.com/nooga/let-go/blob/main/docs/contribution-policy.md) (authoritative on direction) clarifies that the Go AOT backend (`gogen_ir` tags and native lowering) is the committed deployment path for the self-hosted compiler.*\n\n### Phases 8\u20139: Polish and experimental optimization\n\n**Phase 8** finishes `ChunkedSeq` across collections, optimizes iteration utilities with `Reducible`, and investigates specialized opcodes for common sequence ops. **Phase 9** (experimental) explores a register-based bytecode alongside the stack VM for further performance gains.\n\n## Cross-cutting: benchmarks and CI\n\nEvery phase ships microbenchmarks (call overhead, TCO, vector/map ops, numeric arithmetic, transducer pipelines) and end-to-end scenarios (image load, HTTP JSON via natives, REPL cold/warm start). CI gates enforce <10% regressions on hot paths. Risks are managed through exhaustive tests for opcode variants, property tests for data structures, and versioned image schemas with migration paths.\n\n## Immediate workboard\n\n**Phase 0** focuses on core interfaces and `MapEntry` semantics, numeric fast paths via direct `vm.Int` assertions, and initial benchmarks. **Phase 1** implements arg copies, closure TCO, frame/stack pools, and small-arity opcodes. **Phases 2\u20134** are sequential: persistent vectors + transients, then maps/sets, then transducers. **Phase 5** builds the image schema and stdlib pre-compilation. **Phase 7** (once phases 0\u20134 stabilize) adds the Go AOT backend, starting with embedding tier and progressing to native lowering and self-hosting.\n\n# Citations\n\n[1] **docs/master-plan.md**: Master plan with full phase descriptions, dependencies, and immediate workboard (status: active)  \nhttps://github.com/nooga/let-go/blob/main/docs/master-plan.md\n\n[1a] **docs/contribution-policy.md**: Design contracts, regression checkpoints, and deployment direction (supersedes master-plan.md on direction; clarifies Phase 7 as committed deployment path)  \nhttps://github.com/nooga/let-go/blob/main/docs/contribution-policy.md\n\n[2] **Self-hosting AOT** (this wiki)  \n[./self-hosting-aot.md](ideas/self-hosting-aot/)\n\n[3] **let-go** (this wiki)  \n[../entities/let-go.md](entities/let-go/)\n\n[4] **Value representation and numeric performance** (this wiki)  \n[../concepts/value-representation.md](concepts/value-representation/)\n\n[5] **Runtime image** (this wiki)  \n[../concepts/runtime-image.md](concepts/runtime-image/)\n\n---\n\nSee also: [clojure-like-refactor](ideas/clojurelike-refactor/), [jvm-compat](ideas/jvm-compat/)\n", "ideas/nrepl-in-browser": "\n# nREPL in the Browser\n\n## What It Is\n\nExpose an nREPL server from the [let-go VM](concepts/stack-vm/) running in WASM inside the browser, connected to editors via WebSocket. This allows a developer to run `lg -n` (or equivalent) on a live in-browser runtime, then connect CIDER, Calva, or Conjure over WebSocket to evaluate Clojure forms directly against that browser-hosted VM.\n\n## Why It Matters\n\nToday, let-go's nREPL server only runs locally (native process), forcing developers to choose: either native development with REPL tooling, or browser-based work without live connection. Making nREPL available over WebSocket in the browser enables:\n\n- **Live coding in the browser**: Developers can connect their editor to a running web app and iterate without page reloads.\n- **Debugging web scripts**: Inspect and modify let-go code running inside a game, canvas app, or simulator in real time.\n- **Unified workflow**: Same editor setup (Emacs, VS Code, Neovim) works whether the runtime is native or in-browser.\n- **Bridge to web workflows**: Brings REPL-driven development to pure web environments (GitHub Codespaces, Gitpod, cloud IDEs).\n\n## Building Blocks in Place\n\n- **[WASM Compilation](concepts/wasm-compilation/)**: let-go already compiles to WASM and boots the VM in the browser (~10ms). The runtime is fully functional.\n- **[nREPL Server](concepts/nrepl-server/)** (native): let-go ships an nREPL server (`lg -n`, `lgx nrepl`) that works with standard editors. The protocol layer and operations (eval, describe, completions) are proven.\n- **Browser Inspector / nREPL Bridge**: A request/response bridge from the browser JS layer to the in-WASM runtime (JSON frames, sequential form evaluation) is being designed internally; it extends the public [nREPL server](concepts/nrepl-server/) seam and can grow to stream nREPL operations.\n- **[LetGoHost Glue](https://github.com/nooga/let-go/blob/main/wasm/main.go)**: Browser-to-WASM JavaScript interop is already wired. A WebSocket layer and nREPL adapter are the main additions.\n\n## Open Questions\n\n- **WebSocket transport**: How does the browser JavaScript open a WebSocket to itself? (Answer: typically a Node.js dev server or a shared worker; or reverse: the WASM runtime pushes frames to a listener registered in JS.)\n- **Multi-tab / multi-session isolation**: Do separate browser tabs get isolated nREPL sessions, or do they share state? (Likely per-tab for simplicity in the first cut.)\n- **Backward compatibility**: Keep `LetGoHost.eval()` (the current browser eval hook) working unchanged while adding streamed nREPL ops on top.\n- **Editor discovery**: How do editors discover an in-browser nREPL? (Likely manual connection or a bookmarklet / local proxy.)\n\n## Roadmap Motivation\n\nFrom the README Goals: `[ ] nREPL in the browser (let-go VM in WASM, editor over WebSocket)`. This is a high-leverage feature for bringing Clojure REPL workflows to pure web development and single-page applications.\n\n---\n\n# Citations\n\n[1] **README Goals** \u2014 the unchecked roadmap item  \nhttps://github.com/nooga/let-go#goals\n\n[2] **docs/guide/nrepl.md** \u2014 native nREPL server  \nhttps://github.com/nooga/let-go/blob/main/docs/guide/nrepl.md\n\n[3] **pkg/nrepl/server.go** \u2014 the native nREPL server the browser bridge extends  \nhttps://github.com/nooga/let-go/blob/main/pkg/nrepl/server.go\n\n[4] **wasm/main.go** \u2014 LetGoHost browser/WASM glue the bridge builds on  \nhttps://github.com/nooga/let-go/blob/main/wasm/main.go\n\n[5] **WASM Compilation** (this wiki)  \n[wasm-compilation.md](concepts/wasm-compilation/)\n\n[6] **Stack VM** (this wiki)  \n[stack-vm.md](concepts/stack-vm/)\n\n[7] **let-go** (this wiki)  \n[let-go.md](entities/let-go/)\n\n---\n\nSee also: [nREPL Server](concepts/nrepl-server/), [let-go](entities/let-go/), [WASM Compilation](concepts/wasm-compilation/), [Stack VM](concepts/stack-vm/)\n", "ideas/self-hosting-aot": "\n# Self-hosting AOT\n\n**Self-hosting ahead-of-time (AOT) compilation** \u2014 let-go compiling itself to native Go \u2014 is a strategic goal: eliminating the interpreter's overhead and reducing the runtime to pure Go code. The path is clear: a Go AOT backend compiles bytecode to Go functions; combining that with the [Indexed-RPN IR](concepts/indexed-rpn-ir/) and [IR pipeline](concepts/ir-pipeline/) enables bootstrapping a self-hosted runtime.\n\n## Vision\n\n1. **Current state**: let-go is an interpreter (`pkg/vm`) that reads bytecode and executes it. Adding a Go backend means compiling bytecode to Go functions instead of executing them.\n\n2. **Bootstrap**: once the Go backend is mature, compile let-go's own runtime (currently written in Go and Clojure in `pkg/rt/core`) to a Go-based version. This eliminates the last dependency on the interpreter loop for core functionality.\n\n3. **Result**: a pure Go runtime with zero interpreter overhead, while maintaining full Clojure semantics and dynamic `eval` capability.\n\n## Architecture: two-tier approach\n\n### Tier 1: Embedding (quick win)\n- Compile bytecode to Go *data* (const pools, instruction arrays).\n- Register compiled functions as `NativeFn` instances in their `Var`s at `init()`.\n- Still uses the interpreter loop for execution.\n- **Benefit**: removes image I/O; Go linker can optimize; equivalent to a built-in runtime image.\n- **Timeline**: achievable in Phase 7 of the master plan.\n\n### Tier 2: Native lowering (performance)\n- Compile let-go functions to actual Go functions that implement the same logic without bytecode.\n- Each compiled function has signature `func(env *vm.Env, args []vm.Value) (vm.Value, error)` or smaller fixed-arity wrappers.\n- Implement logic via translating bytecode operations to Go control flow and direct runtime calls.\n- **Benefit**: massive performance uplift; call overhead eliminated; TCO via loops.\n- **Timeline**: follows Tier 1; incremental rollout on hot functions.\n\n## Self-hosting strategy\n\nOnce Tier 2 is working for user code, apply it to let-go's own runtime:\n\n1. **Identify hot runtime paths** (e.g., `core/map`, `core/filter`, `core/reduce`, numeric ops).\n2. **Compile to Go** using the same backend.\n3. **Register compiled functions** as `NativeFn` instances, replacing the old bytecode/interpreter invocations.\n4. **Preserve dynamic `eval`** by keeping `Var` indirection: compiled code calls through `Var` pointers, so redefined functions are observed.\n\n**Result**: a runtime that is entirely Go-generated, with no hard-coded Go functions. The bootstrap is complete: let-go's runtime compiled from let-go source.\n\n## Key properties\n\n### Semantics preserved\n- Compiled functions use the same `Value` and `Fn` interfaces as the interpreter.\n- Interpreted and compiled code interoperate through shared `Var`s.\n- Dynamic `eval` continues to compile to bytecode and install into the same `Var`s.\n- Var redefinition is observed by compiled code (unless annotated `^:const` or `^:inline` for AOT-only optimization).\n\n### Mixed execution\n- Startup: load and execute a stdlib image (or embedding tier) instantly.\n- Long-running: hot functions (identified by sampling or heuristics) are compiled to Go on demand or at build time.\n- Interop: compiled code calls interpreted functions (e.g., user-defined fns) via `Var`; interpreted code calls compiled builtins normally.\n\n### Build workflow\n```bash\n# Build let-go with self-hosted AOT runtime\n$ lg build --runtime aot --output lg-aot\n\n# Or: compile an app to Go, then build with go build\n$ lg build --target go --output myapp/main.go\n$ cd myapp && go build -o myapp\n```\n\n## Implementation phases (Phase 7 onward)\n\n### Phase 7a: Embedding tier + prototype native lowering\n- Compile bytecode to Go data + register in `Var`s.\n- Prototype: compile a few small functions (`+`, `inc`, `conj`) to Go by hand.\n- Verify: interop with interpreted code; performance gains.\n- **Acceptance**: mixed execution works; measurable speedup on call-heavy microbenchmarks.\n\n### Phase 7b: Native lowering at scale\n- Codegen for all non-variadic functions (arity 0\u20133, no closures initially).\n- Self-tail recursion elimination (to loops).\n- Calls via `Var` indirection (no devirtualization yet).\n- Error wrapping with source location.\n- **Acceptance**: real programs mixed compiled+interpreted; perf tests pass.\n\n### Phase 7c: Self-hosting bootstrap\n- Compile `core/map`, `core/filter`, `core/reduce`, numeric ops to Go.\n- Replace bytecode invocations with compiled versions.\n- Verify: stdlib tests still pass; startup and throughput improve.\n- **Acceptance**: stdlib image optional (embedding tier sufficient); performance targets hit.\n\n### Phase 8 onwards: Optimization and polish\n- Closures and variadics.\n- Direct-call devirtualization for known-final vars.\n- Inline constant/const-vars.\n- Source maps and improved error stack traces.\n\n## Relationship to runtime images\n\n- **Runtime images** (Phase 5 of master plan) pre-serialize the stdlib to `.img` format for fast boot.\n- **Self-hosting AOT** (Phase 7+) eliminates the interpreter's execution overhead entirely.\n- **Together**, they provide: fast startup (image) + fast execution (AOT). Embedding tier provides the former; native lowering tier provides the latter.\n\n## Benefits\n\n1. **Performance**: eliminate interpreter overhead; achieve native-code speed.\n2. **Redistribution**: smaller binaries (no bytecode interpreter loop); faster cold-starts.\n3. **Transparency**: stack traces and profiling see Go function names directly.\n4. **Maintainability**: runtime logic stays in Clojure source; compiler generates the Go code automatically.\n\n## Risks\n\n- **Semantic divergence**: compiled and interpreted paths must stay in sync. Mitigation: single spec; comprehensive property tests; reuse runtime helpers.\n- **Compilation complexity**: native lowering is a substantial feature. Mitigation: start with Tier 1 (embedding); prove value before going to Tier 2.\n- **Mutual recursion**: self-tail recursion has cheap solution (loops); mutual tail recursion requires trampolines or dynamic indirection. Mitigation: optimize self-recursion first; mutual recursion falls back to `Var` indirection initially.\n\n## Success criteria\n\n- **Mixed execution**: compiled functions call interpreted functions (and vice versa) via shared `Var`s; semantics and errors match.\n- **Performance**: call-heavy microbenchmarks show >25% throughput improvement and >50% alloc reduction vs. optimized interpreter.\n- **Completeness**: stdlib compiles successfully; all tests pass.\n\n# Citations\n\n[1] **docs/design/go-aot-backend.md**: Go AOT backend design  \nhttps://github.com/nooga/let-go/blob/main/docs/design/go-aot-backend.md\n\n[2] **docs/master-plan.md**: Full master plan, including Phase 7 (Go AOT backend)  \nhttps://github.com/nooga/let-go/blob/main/docs/master-plan.md\n\n[3] **Indexed-RPN IR** (this wiki)  \n[../concepts/indexed-rpn-ir.md](concepts/indexed-rpn-ir/)\n\n[4] **IR pipeline** (this wiki)  \n[../concepts/ir-pipeline.md](concepts/ir-pipeline/)\n\n[5] **Bytecode compiler** (this wiki)  \n[../concepts/bytecode-compiler.md](concepts/bytecode-compiler/)\n\n[6] **let-go** (this wiki)  \n[../entities/let-go.md](entities/let-go/)\n\n---\n\nSee also: [lg-compile](concepts/lg-compile/), [bytecode-compiler](concepts/bytecode-compiler/), [go-interop](concepts/go-interop/)\n", "projects/legmacs": "\n# legmacs\n\nlegmacs is a terminal text editor written entirely in [let-go](entities/let-go/), delivering Emacs-style editing in approximately 4,000 lines of Lisp code. The defining feature is that users configure and extend the editor using the same language that implements it\u2014no separate scripting API or plugin system exists.\n\n# Using let-go\n\nlegmacs demonstrates [let-go](entities/let-go/)'s suitability as both an implementation language and a user-facing scripting layer:\n\n- **Single-language stack** \u2014 implementation and configuration are indistinguishable; users modify behavior via `defcommand` and `bind-key!` functions identical to those the editor itself uses.\n- **In-process evaluation** \u2014 the editor includes a live REPL (`C-x C-e`, `C-j`) enabling real-time experimentation and configuration testing without restarting.\n- **Structural manipulation** \u2014 implements s-expression-aware editing (expand-region, kill-sexp) naturally in a Lisp-based editor where syntax and structure are unified.\n- **Compact footprint** \u2014 4,000 lines of let-go provide kill ring, regions, multi-buffer support, window splitting, syntax highlighting for 20+ languages, and extensible major/minor modes.\n\n# Idioms\n\n- **Homoiconicity as a feature** \u2014 because let-go code and let-go data are the same, configuration becomes a form of live programming; users don't \"configure an application\" but rather \"compose a program.\"\n- **Emacs idioms in let-go** \u2014 kill ring, regions, keymaps, and mode hierarchies (shadowing keymaps) translate directly from Emacs, showing how Lisp design patterns port cleanly across implementations.\n\n# Citations\n\n[1] [legmacs repository](https://github.com/nooga/legmacs)\n", "projects/let-go-lab": "\n# let-go-lab\n\nlet-go-lab is a collection of experimental projects exploring [let-go](entities/let-go/)'s capabilities for graphics, terminal UI, and WebAssembly. The flagship demo is an interactive Mandelbrot set visualization that renders via Sixel graphics in native terminals and via xterm.js in web browsers without any installation requirement.\n\n# Using let-go\n\nlet-go-lab showcases [let-go](entities/let-go/)'s versatility across rendering targets and interaction models:\n\n- **WASM compilation** \u2014 the Mandelbrot renderer compiles to self-contained WebAssembly, enabling real-time interactive graphics in a browser without JavaScript.\n- **Sixel graphics support** \u2014 leverages single-pass encoding to render fractals efficiently in terminal environments that support Sixel, bridging the gap between legacy terminals and modern graphical rendering.\n- **Cross-target deployment** \u2014 identical let-go code runs natively in terminals and compiles to WASM for browsers, eliminating the need for separate ports or JavaScript rewrites.\n- **Interactive I/O** \u2014 implements click/tap-to-recenter, keyboard pan/zoom, and iteration adjustment, demonstrating real-time interactivity in both terminal and browser contexts.\n\n# Idioms\n\n- **Sixel as a rendering substrate** \u2014 treating Sixel as a first-class rendering target rather than an afterthought shows how [let-go](entities/let-go/) can power tools that bridge terminal and graphical interfaces.\n- **WASM as a deployment target** \u2014 compiling graphics-heavy code to WASM keeps the implementation in a high-level language while maintaining performance in browser environments.\n\n# Citations\n\n[1] [let-go-lab repository](https://github.com/mparrett/let-go-lab)\n[2] [Mandelbrot demo (live browser)](https://mparrett.github.io/let-go-lab/)\n", "projects/lgcr": "\n# lgcr\n\nlgcr is a daemonless Linux container runtime written in [let-go](entities/let-go/), providing Docker-like command-line functionality while maintaining a remarkably compact codebase of approximately 3,000 lines. On Linux it bundles into a single executable; on macOS it acts as a native forwarder into a Lima VM, eliminating the need for wrapper scripts.\n\n# Using let-go\n\nlgcr demonstrates [let-go](entities/let-go/)'s capacity to implement systems-level programs with direct syscall access:\n\n- **Direct syscall bindings** \u2014 leverages [let-go](entities/let-go/)'s Go interop layer to bind Linux syscalls for namespace isolation, capability management, and filesystem operations without extra C code.\n- **Compact implementation** \u2014 3,000 lines of let-go code replace thousands of lines in traditional implementations, showing the language's expressiveness for low-level systems work.\n- **Single-executable deployment** \u2014 compiles to a standalone binary on Linux, simplifying distribution and eliminating runtime dependencies.\n- **Cross-platform abstraction** \u2014 the same codebase runs natively on Linux and as a forwarding client on macOS via Lima, demonstrating let-go's platform portability.\n\n# Idioms\n\n- **OCI registry integration** \u2014 lgcr pulls from Docker Hub and v2-compatible registries, implementing image authentication and partial blob resume without external libraries.\n- **Container lifecycle with init process** \u2014 manages PID 1 init process handling and signal forwarding, a critical systems-programming pattern that let-go handles cleanly via Go interop.\n\n# Citations\n\n[1] [lgcr repository](https://github.com/nooga/lgcr)\n", "projects/lgx": "\n# lgx\n\nlgx is a comprehensive project manager for [let-go](entities/let-go/) that unifies dependency management, task execution, testing, scaffolding, and REPL management into a single binary. Projects declare configuration in EDN format via `lgx.edn`, and lgx handles everything from fetching git-based dependencies to building standalone executables.\n\n# Using let-go\n\nlgx is the de facto build and dependency system for [let-go](entities/let-go/) projects, showcasing the language's practical ecosystem needs:\n\n- **EDN configuration** \u2014 projects express their structure in native let-go data literals (EDN), keeping configuration close to the language itself.\n- **Transitive dependency resolution** \u2014 implements breadth-first, first-wins dependency resolution with git URLs pinned by tag or SHA, avoiding the package manager bloat present in other ecosystems.\n- **Context-driven environments** \u2014 supports named overlays (`:dev`, `:test`) that apply environment-specific paths and dependencies automatically, enabling clean separation of development and production concerns.\n- **Integrated task system** \u2014 custom tasks combine shell commands and let-go invocations with typed positional arguments, REPL support, and reference binding.\n\n# Idioms\n\n- **Single binary, multiple roles** \u2014 lgx consolidates build, test, dependency, and task management without spawning external tools for each concern, reducing cognitive load and toolchain complexity.\n- **Git-native dependencies** \u2014 by using git repositories directly (with optional subdirectory paths) rather than a centralized registry, projects avoid package manager lock-in and can depend on unreleased work or internal repositories.\n\n# Citations\n\n[1] [lgx repository](https://github.com/abogoyavlensky/lgx)\n", "projects/xsofy": "\n# Xs of Y (xsofy)\n\nxsofy is a roguelike written in [let-go](entities/let-go/), notable because\nits magic system *is* a Lisp. Every run generates a new title (*Gazebos of\nMounting Dread*), a new quest (*retrieve the Spatula of Futility*), and a new set\nof rune mappings \u2014 the runes are secretly symbols, and spells are s-expressions.\nYou have root access to the dungeon's reality engine, but the man pages are in a\ndead language that changes every boot. The power curve is inverted: early game is\ndesperate survival, late game is applied theology. It runs\n[in the browser](https://nooga.github.io/xsofy/) and in the terminal from the\nsame source, and its main visual inspiration is\n[Brogue](https://sites.google.com/site/broguegame/).\n\n# Using let-go\n\nxsofy is a substantial real program \u2014 a complete game \u2014 which makes it a strong\n\"using let-go in anger\" case study. It leans on let-go's core properties:\n\n- **Persistent data structures all the way down** \u2014 the game state model is\n  built on immutable, structurally-shared collections.\n- **No dependencies** \u2014 the whole game is written against let-go and its standard\n  library, with no external packages.\n- **~6ms startup** \u2014 fast enough to boot inside a single frame.\n- **Same source, two targets** \u2014 compiled to self-contained **WASM** for the\n  browser and run **natively** in the terminal from the identical codebase.\n\n# Idioms\n\n- **Same-source browser + terminal via WASM.** Because let-go compiles to a\n  self-contained WASM page *and* runs natively, a single program ships to both a\n  web page and a terminal without a separate port \u2014 a repeatable pattern for\n  let-go apps.\n- **Data-as-code as a game mechanic.** Spells are s-expressions and runes are\n  symbols: the game exposes the language's own homoiconicity to the player,\n  using let-go values (symbols, lists) directly as the spell substrate rather\n  than inventing a separate scripting layer.\n\n# Citations\n\n[1] [xsofy repository](https://github.com/nooga/xsofy)\n[2] [Play xsofy in the browser](https://nooga.github.io/xsofy/)\n", "references/clojure-compat": "\n# Clojure Compatibility\n\nlet-go is a Clojure dialect, not a drop-in JVM Clojure replacement. Most idiomatic Clojure code runs unmodified, but host-interop and concurrency models differ. let-go passes **5621 / 5621 assertions** across 232 test files from the [jank-lang/clojure-test-suite](https://github.com/jank-lang/clojure-test-suite) under the `:clj` reader lens with zero failures.\n\n## Standard namespaces\n\n| Namespace | Status |\n|-----------|--------|\n| `clojure.core` | Macros, destructuring, lazy sequences, transducers, protocols, records, `deftype`, `reify`, multimethods, hierarchies, atoms, regex, metadata, BigInt, BigDecimal |\n| `clojure.string` | Full implementation |\n| `clojure.set` | Full implementation |\n| `clojure.walk` | `prewalk`, `postwalk`, `keywordize-keys`, `stringify-keys`, `walk` |\n| `clojure.edn` | `read`, `read-string` |\n| `clojure.pprint` | `pprint`, `cl-format` |\n| `clojure.test` | `deftest`, `is`, `testing`, `are`, fixtures |\n| `clojure.core.async` | Channels, `go`/`go-loop`, `alts!`, `mult`/`pub`, `pipe`/`merge`/`split` (real goroutines, not IOC) |\n| `io` | Polymorphic readers/writers, `slurp`/`spit`, lazy line-seq, encoding, URLs, `with-open`, `resource` |\n| `http` | Ring-style server and client, streaming responses |\n| `json` | `read-json`, `write-json` (float-preserving, record-aware) |\n| `transit` | transit+json codec with rolling cache |\n| `os` | `sh`, `stat`, `ls`, `cwd`, `getenv`/`setenv`, `exit`, `os-name`, `arch`, `user-name`, `hostname` |\n| `System` | JVM-shaped API: `getProperty`, `getProperties`, `getenv`, `exit`, `currentTimeMillis`, `nanoTime` |\n| `syscall` | Direct Linux syscalls (mount, unshare, mknod, prctl, capset, seccomp, AppArmor) |\n| `pods` | [Babashka pods](concepts/pods/) over JSON/EDN/transit |\n\n## Not implemented\n\n| Feature | Reason |\n|---------|--------|\n| **STM coordination** (`ref`/`dosync`) | Atom-backed compatibility aliases; not coordinated STM |\n| **Asynchronous agents** (`agent`/`send`/`send-off`) | Synchronous atom-backed compatibility aliases |\n| **Chunked sequences** | Lazy seqs are unchunked |\n| **Custom tagged literals** | Built-in `#uuid` and `#inst` work; unknown tags read as payload; `*data-readers*` / `*default-data-reader-fn*` not implemented |\n| **Java-style `deftype`/`reify` method bodies** | Protocol implementations work; JVM host methods do not |\n| **`clojure.spec`** | Not ported |\n| **`subseq`/`rsubseq`** | Sorted collections work; range queries don't |\n\n## Behavioral differences\n\n### Concurrency and async\n\n- `<!` and `<!!` are identical; same for `>!` and `>!!` (Go channels always block).\n- `go` blocks are real goroutines, not IOC state machines (cheaper, can call blocking ops directly).\n\n### Numerics\n\n- Tower includes `int64`, `float64`, `BigInt`, ratios, and `BigDecimal` without JVM's full primitive/class model.\n- Base integer `+`/`-`/`*`/`inc`/`dec` throw on overflow; use `+'`/`-'`/`*'`/`inc'`/`dec'` for BigInt-promoting exact math.\n\n### String processing and regex\n\n- Regex is Go flavor (`re2`), not Java regex.\n  - Supports most common patterns.\n  - Lacks lookaround, backreferences, named capture groups, possessive quantifiers.\n  - Linear-time execution; no ReDoS risk (unless using extended regex engine).\n\n### Sequence operations\n\n- `concat*` (used internally by quasiquote) is eager; user-facing `concat` is lazy.\n\n## Reader-level feature detection\n\nlet-go supports `:clj` and `:lg` reader conditionals (in addition to `:default`). Libraries can use `#?(:lg ... :clj ...)` to provide let-go-specific code paths.\n\nBabashka-compatible libraries using `:bb` reader branches can be loaded in let-go by matching the `:bb` feature to avoid JVM-internal assumptions.\n\n## Test suite results\n\nlet-go's implementation is verified against 232 test files from jank's clojure-test-suite:\n- **5621 / 5621 assertions pass** under the `:clj` reader lens.\n- **Zero failures, skips, or panics**.\n- Coverage includes core functions, collection operations, destructuring, lazy sequences, protocols, and multimethods.\n\n## Interop story\n\nJAR loading and dynamic class loading are not supported; instead:\n\n- **Pods** provide access to external libraries via the [Babashka pods protocol](concepts/pods/).\n- **Go embedding** allows calling Go functions from let-go via `lginterop` and gogen-generated bindings.\n- **System calls** (`os`, `syscall` namespaces) provide OS-level interop for shell, file I/O, and Linux syscalls.\n\n# Citations\n\n[1] **docs/guide/clojure-compatibility.md**: Comprehensive compatibility reference  \nhttps://github.com/nooga/let-go/blob/main/docs/guide/clojure-compatibility.md\n\n[2] **docs/clojure-compat-roadmap.md**: Compatibility roadmap and known gaps  \nhttps://github.com/nooga/let-go/blob/main/docs/clojure-compat-roadmap.md\n\n[3] **jank-lang/clojure-test-suite**: Test suite source  \nhttps://github.com/jank-lang/clojure-test-suite\n\n[4] **Pods** (this wiki)  \n[../concepts/pods.md](concepts/pods/)\n\n[5] **let-go** (this wiki)  \n[../entities/let-go.md](entities/let-go/)\n\n---\n\nSee also: [lginterop](concepts/lginterop/), [go-interop](concepts/go-interop/), [stack-vm](concepts/stack-vm/)\n", "references/clojure.core/apply": "\n`apply` takes a function and a sequence of arguments, unpacking the sequence as the final arguments to the function. Use it when you have arguments collected in a list or vector and need to pass them to a function as individual parameters.\n\n# Signature\n\n```clojure\n(apply [f args] [f x args] [f x y args] [f x y z args] [f a b c d & args])\n```\n\n# Examples\n\n```clojure\n(apply + [1 2 3])\n;; => 6\n```\n\n```clojure\n(apply list 1 [2 3])\n;; => (1 2 3)\n```\n\n```clojure\n(apply str \"Hello\" [\" \" \"World\"])\n;; => \"Hello World\"\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/comp": "\nCreates a new [fn](references/clojure.core/fn/) from multiple functions such that the resulting function applies each function to the result of the previous one, working right-to-left. Useful for building complex transformations from simpler functions.\n\n# Signature\n\n```clojure\n(comp [] [f] [f g] [f g & fs])\n```\n\n# Examples\n\n```clojure\n((comp inc inc) 1)\n;; => 3\n```\n\n```clojure\n((comp #(* 2 %) inc) 3)\n;; => 8\n```\n\n```clojure\n((comp str +) 1 2)\n;; => \"3\"\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/defn": "\n`defn` defines a named function and binds it in the current namespace. Use it to create reusable functions that can be called by name throughout your program. It combines [fn](references/clojure.core/fn/) for function creation with binding to a name in the current scope.\n\n# Signature\n\n```clojure\n(defn name doc-string? [params*] body)\n(defn name doc-string? ([params*] body)+)\n```\n\n# Examples\n\n```clojure\n(do (defn square [x] (* x x)) (square 5))\n;; => 25\n```\n\n```clojure\n(do (defn add [x y] (+ x y)) (add 2 3))\n;; => 5\n```\n\n```clojure\n(do (defn greet [name] (str \"Hello, \" name \"!\")) (greet \"World\"))\n;; => \"Hello, World!\"\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/filter": "\nSelects elements from a collection based on a predicate [fn](references/clojure.core/fn/), returning a lazy sequence of only those elements for which the predicate returns a truthy value. Use filter when you need to retain only items matching specific criteria.\n\n# Signature\n\n```clojure\n(filter [pred] [f xs])\n```\n\n# Examples\n\n```clojure\n(filter even? [1 2 3 4 5])\n;; => (2 4)\n```\n\n```clojure\n(filter #(> % 2) [1 2 3 4])\n;; => (3 4)\n```\n\n```clojure\n(filter #(not (empty? %)) [\"\" \"hello\" \"\" \"world\"])\n;; => (\"hello\" \"world\")\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/fn": "\n`fn` creates an anonymous function or named function. Use it to define functions inline without assigning them to a name (useful for higher-order functions like [apply](references/clojure.core/apply/)), or define a named function for recursion. `fn` supports both single-arity and multi-arity definitions.\n\n# Signature\n\n```clojure\n(fn [params*] body)\n(fn name [params*] body)\n(fn ([params*] body) ([params*] body) ...)\n```\n\n# Examples\n\n```clojure\n((fn [x] (+ x 1)) 5)\n;; => 6\n```\n\n```clojure\n((fn [x y] (* x y)) 3 4)\n;; => 12\n```\n\n```clojure\n(let [adder (fn [x y] (+ x y))]\n  (adder 10 20))\n;; => 30\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/inc": "\nIncrements a number by adding 1 to it. A convenience [fn](references/clojure.core/fn/) commonly used with [map](references/clojure.core/map/) and other higher-order functions to transform sequences of numbers.\n\n# Signature\n\n```clojure\n(inc [x])\n```\n\n# Examples\n\n```clojure\n(inc 5)\n;; => 6\n```\n\n```clojure\n(map inc [1 2 3 4])\n;; => (2 3 4 5)\n```\n\n```clojure\n((comp inc inc) 10)\n;; => 12\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/let": "\n`let` creates a new lexical scope and binds symbols to values for use within that scope. Use it to define intermediate variables, break down complex expressions, or avoid repeating calculations.\n\n# Signature\n\n```clojure\n(let [bindings & body])\n```\n\n# Examples\n\n```clojure\n(let [x 5] (+ x 3))\n;; => 8\n```\n\n```clojure\n(let [a 2 b 3] (* a b))\n;; => 6\n```\n\n```clojure\n(let [x 10 y 20 sum (+ x y)] sum)\n;; => 30\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/map": "\nApplies a function to corresponding elements across one or more collections, returning a lazy sequence of results. When applied to a single collection, it transforms each element; when applied to multiple collections, it applies the [fn](references/clojure.core/fn/) to one element from each collection.\n\n# Signature\n\n```clojure\n(map [f] [f coll] [f c1 c2] [f c1 c2 & colls])\n```\n\n# Examples\n\n```clojure\n(map inc [1 2 3])\n;; => (2 3 4)\n```\n\n```clojure\n(map + [1 2] [10 20])\n;; => (11 22)\n```\n\n```clojure\n(map #(* % 2) [1 2 3 4 5])\n;; => (2 4 6 8 10)\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/mapv": "\nApplies a [fn](references/clojure.core/fn/) to elements of one or more collections, returning results as a vector rather than a lazy sequence. Use mapv when you need to eagerly realize all results immediately, such as when the result will be used multiple times or when side effects during evaluation matter.\n\n# Signature\n\n```clojure\n(mapv [f coll] [f c1 & colls])\n```\n\n# Examples\n\n```clojure\n(mapv inc [1 2 3])\n;; => [2 3 4]\n```\n\n```clojure\n(mapv + [1 2 3] [10 20 30])\n;; => [11 22 33]\n```\n\n```clojure\n(mapv #(* % 2) [1 2 3 4])\n;; => [2 4 6 8]\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/partial": "\nReturns a new [fn](references/clojure.core/fn/) with some arguments pre-filled, useful for creating specialized versions of existing functions. Partial application allows you to fix certain arguments and create reusable functions that accept the remaining arguments.\n\n# Signature\n\n```clojure\n(partial [f] [f arg1] [f arg1 arg2] [f arg1 arg2 arg3] [f arg1 arg2 arg3 & more])\n```\n\n# Examples\n\n```clojure\n((partial + 10) 5)\n;; => 15\n```\n\n```clojure\n((partial * 2 3) 4)\n;; => 24\n```\n\n```clojure\n(let [add10 (partial + 10)] (map add10 [1 2 3]))\n;; => (11 12 13)\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/clojure.core/when": "\n`when` is a conditional macro that evaluates its body only when the condition is truthy. Use it for single-branch conditionals where you want to execute side effects or return a value based on a condition, with nil as the implicit else case.\n\n# Signature\n\n```clojure\n(when test & body)\n```\n\n# Examples\n\n```clojure\n(when true 42)\n;; => 42\n```\n\n```clojure\n(when false 42)\n;; => nil\n```\n\n```clojure\n(let [x 5]\n  (when (> x 3)\n    (str \"x is greater than 3\")))\n;; => \"x is greater than 3\"\n```\n\n# Citations\n\nhttps://github.com/nooga/let-go/blob/main/pkg/rt/core/core.lg\n", "references/testing-conformance": "\n## Testing and Conformance Strategy\n\n[let-go](entities/let-go/) is designed to validate correctness through a multi-layer testing approach: a `clojure.test`-compatible test layer for user code, conformance measured against the jank-lang clojure-test-suite (~230 core functions, ~5000 assertions), property testing with shrinking, and CI-gated performance benchmarks. The goal is to prove Clojure compatibility across core semantics, persistent data structures, seq behavior, and runtime stability.\n\n## Test Framework and CLI\n\nlet-go will provide a `clojure.test`-compatible API (macros like `deftest`, `testing`, `is`, `are`, `use-fixtures`) with output formats including human-readable logs, TAP, and JUnit XML for CI integration. The `lg test` command will support namespace globs, file selection, `--watch` for file changes, `--fail-fast`, and `--seed` for randomized/property tests. Implementation targets core test macros under `pkg/rt/core/test.lg` with the runner in Go (`pkg/rt/lang.go`) for performance, exposing JUnit/TAP encoders to let-go code via native functions.\n\n## Conformance: The Clojure Test Suite\n\nlet-go's conformance strategy targets running the [jank-lang/clojure-test-suite](https://github.com/jank-lang/clojure-test-suite), a cross-dialect test suite with ~105 test files and ~5000 assertions. The planned test runner (`test/zz_compat_test.go`) will compile upstream `.cljc` files through let-go and execute assertions, with safety guards: 5-second timeout per test, 512MB memory limit, and panic recovery. Portability shims in `test/compat/clojure/core-test/portability.lg` will provide predicates like `when-var-exists` and `thrown?` that the upstream tests expect. Namespace aliases (e.g., `clojure.test` \u2192 `test`) and resolver improvements (`.cljc` extension support, underscore\u2192hyphen path mapping) will enable upstream code to load transparently.\n\nThe runner will track expected failures in a `knownFailing` list; tests that pass but are listed are flagged as \"graduated\" so contributors can remove them. When complete, the suite will track 105 files with pass/fail/skipped metrics to guide priority fixes (reader issues unlock the most assertions, followed by resolver fixes, then missing builtins and behavioral corrections).\n\n## Property Testing, Fuzzing, and Guardrails\n\nlet-go is designed to include a minimal `test.check`-style property-testing library with generators and `prop/for-all` for properties like vector append/assoc invariants, HAMT idempotence, and equality/hash consistency. Planned fuzzing will occur at two levels: reader fuzzing with Go's `testing/fuzz` for literals and nested collections, and differential tests comparing VM vs Go AOT results on random inputs. Performance tests will use `go test -bench` microbenchmarks covering VM call arities, TCO recursion, vector/HAMT ops, numeric arithmetic, transducers, and image load time. Benchstat thresholds in CI will alert on >10% regressions; baselines will be stored per branch and refreshed with manual approval.\n\n## Phase 0\u20131 Acceptance Criteria\n\nThe Phase 0\u20131 goals include: a working `clojure.test`-compatible layer and `lg test` CLI with human-readable and JUnit output; a conformance seed suite running in CI for core semantics (seq coercion, `count nil`, `conj` semantics, basic equality); initial property tests for vectors and numeric operations; and a bench harness wired with call-arity and numeric microbenchmarks. CI will run a matrix across macOS/Linux/Windows and the latest two Go versions, including `go vet`, `staticcheck`, unit/integration/property/fuzz tests, and benchmarks, with artifacts (JUnit XML, TAP logs, coverage, perf CSV) published for review.\n\n# Citations\n\n**Resource (Public)**: [docs/testing-and-conformance.md](https://github.com/nooga/let-go/blob/main/docs/testing-and-conformance.md) \u2014 Testing and Conformance \u2014 framework, CI, and compatibility strategy.\n\n**Sources**:\n- `/Users/ndn/development/let-go/docs/testing-and-conformance.md` \u2014 goals, test framework, conformance strategy, property testing, performance guardrails, CI integration, and Phase 0\u20131 acceptance.\n- `/Users/ndn/development/let-go/docs/clojure-test-suite.md` \u2014 Clojure Test Suite workflow, runner architecture, safety, knownFailing list, coverage prioritization, and common pitfalls.\n"}, "types": ["Concept", "Entity", "Function", "Idea", "Macro", "Project", "Reference"], "palette": {"Entity": "#b45309", "Concept": "#877a5e", "Reference": "#10b981", "Project": "#3b82f6", "Idea": "#8b5cf6", "Function": "#877a5e", "Macro": "#877a5e", "Namespace": "#b45309", "Package": "#3b82f6"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  // Read the active theme (light/dark) from CSS variables so canvas-drawn
  // node labels match the page and stay legible against the background.
  const _css = getComputedStyle(document.documentElement);
  const _v = (name, fallback) => (_css.getPropertyValue(name).trim() || fallback);
  const THEME = {
    fg: _v("--fg", "#1d180f"),
    bg: _v("--bg", "#f4ecdb"),
    accent: _v("--accent", "#b45309"),
    rule: _v("--rule", "#d6c8a8"),
    muted: _v("--muted", "#877a5e"),
  };

  // Register the fcose force layout (self-registers in most builds; the guarded
  // use() covers builds that don't, and swallows a double-registration error).
  if (window.cytoscapeFcose) {
    try { cytoscape.use(window.cytoscapeFcose); } catch (_e) { /* already registered */ }
  }
  const _hasFcose = !!window.cytoscapeFcose;

  // Per-layout options. fcose is the default force layout: its nodeSeparation
  // and idealEdgeLength pull the graph apart so labels stop overlapping.
  function layoutOpts(name) {
    if (name === "fcose" && _hasFcose) {
      return {
        name: "fcose", animate: false, quality: "default", randomize: true,
        padding: 40, nodeSeparation: 130, idealEdgeLength: 95,
        nodeRepulsion: 6500, gravity: 0.25, numIter: 2500,
      };
    }
    if (name === "fcose") name = "cose"; // fallback if the extension failed to load
    if (name === "cose") return { name: "cose", animate: false, padding: 30 };
    return { name, animate: false, padding: 30 };
  }

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          // Foreground-colored text with a background-colored halo: readable on
          // any node fill and in both light and dark themes.
          "color": THEME.fg,
          "text-outline-color": THEME.bg,
          "text-outline-width": 2.5,
          "text-outline-opacity": 1,
          "font-size": 11,
          "font-weight": 600,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": THEME.muted,
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": THEME.accent,
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": THEME.rule,
          "target-arrow-color": THEME.rule,
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": THEME.accent,
          "target-arrow-color": THEME.accent,
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: layoutOpts("fcose"),
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout(layoutOpts(e.target.value)).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;

    // Add open-page link
    const titleContainer = document.querySelector(".detail-header");
    if (titleContainer) {
      const existingLink = titleContainer.querySelector(".open-page");
      if (existingLink) existingLink.remove();
      if (data.url) {
        const openPageLink = document.createElement("a");
        openPageLink.className = "open-page";
        openPageLink.href = data.url;
        openPageLink.target = "_top";
        openPageLink.textContent = "Open page ↗";
        titleContainer.appendChild(openPageLink);
      }
    }

    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      // For external links or rewritten MkDocs URLs (like "concepts/b/"),
      // set target="_top" so they navigate the whole window
      if (!href.startsWith("#")) {
        a.className = "external";
        if (!href.includes("://")) {
          // Rewritten internal URL (MkDocs format) - navigate away from graph
          a.setAttribute("target", "_top");
        } else {
          // External URL - open in new tab
          a.setAttribute("target", "_blank");
          a.setAttribute("rel", "noopener");
        }
      }
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
