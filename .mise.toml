# Dev tools for let-go-wiki (managed by mise — https://mise.jdx.dev).
# Provides the `lgx` task runner so contributors get it reproducibly:
#   mise trust          # trust this repo config (first use)
#   mise install        # fetch pinned tools
#   mise exec -- lgx doctor   (or, with mise activated: lgx doctor)
# NOTE: `lg` (the let-go binary, >= 1.11.1) is a prerequisite but is NOT pinned
# here — there is no mise registry entry for it yet. Install it separately:
#   brew install nooga/tap/let-go   (or a release tarball from
#   https://github.com/nooga/let-go/releases — current: v1.11.1)
[tools]
"github:abogoyavlensky/lgx" = "0.1.0-rc2"
